<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>Space Shooter</title>
  <script>
    // Inline PWA manifest via blob URL — allows "Install" / "Add to Home Screen"
    // which launches the game completely without browser chrome
    const _manifest = JSON.stringify({
      name: "Space Shooter",
      short_name: "SpaceShooter",
      start_url: location.href,
      display: "fullscreen",
      orientation: "landscape",
      background_color: "#111111",
      theme_color: "#111111",
      icons: [{
        src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111'/><polygon points='50,15 65,85 35,85' fill='%2300ffcc'/></svg>",
        sizes: "any", type: "image/svg+xml"
      }]
    });
    const _mBlob = new Blob([_manifest], { type: 'application/json' });
    const _mLink = document.createElement('link');
    _mLink.rel = 'manifest';
    _mLink.href = URL.createObjectURL(_mBlob);
    document.head.appendChild(_mLink);
  </script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #111; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 8px; left: 12px;
      color: #fff; font: 14px monospace;
      pointer-events: none; z-index: 10; line-height: 1.6;
    }
    #phaseTimer {
      position: fixed; top: 8px; right: 18px;
      color: #fff; font: bold 80px monospace;
      pointer-events: none; z-index: 10;
      text-shadow: 0 0 16px #00ffcc, 0 0 4px #fff;
      letter-spacing: 2px;
    }
    #phaseLabel {
      position: fixed; top: 96px; right: 18px;
      color: #aaa; font: 13px monospace;
      pointer-events: none; z-index: 10;
      text-align: right;
    }
  #scoreHud {
      position: fixed; bottom: 18px; right: 18px;
      color: #fff; font: bold 64px monospace;
      pointer-events: none; z-index: 10;
      text-align: right; line-height: 1;
      text-shadow: 0 0 20px #ffdd44, 0 0 6px #fff;
      letter-spacing: 2px;
    }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.82);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; z-index: 100; color: #fff;
    font-family: monospace; cursor: pointer; user-select: none;
    overflow-y: auto; padding: 10px 0;
  }
  #overlay h1 { font-size: 2rem; margin: 0 0 6px; color: #00ffcc;
    text-shadow: 0 0 18px #00ffcc; letter-spacing: 3px; }
  #overlay .sub { color: #aaa; font-size: 0.85rem; margin-bottom: 24px; }
  #overlay .click-hint { margin-top: 28px; font-size: 1.1rem; color: #00ffcc;
    animation: blink 1.1s infinite; }
  #massHud {
      position: fixed; bottom: 18px; left: 18px;
      color: #aaffcc; font: bold 28px monospace;
      pointer-events: none; z-index: 10;
      text-align: left; line-height: 1;
      text-shadow: 0 0 12px #22ffaa, 0 0 4px #fff;
      letter-spacing: 1px;
    }
  .score-popup {
    position: fixed; pointer-events: none; z-index: 50;
    font: bold 52px monospace; color: #ffdd44;
    text-shadow: 0 0 20px #ffaa00, 0 0 6px #fff;
    transform: translateX(-50%);
    transition: none;
    white-space: nowrap;
  }
  #deathExplosion {
    position: fixed; inset: 0; z-index: 90;
    pointer-events: none; display: none;
  }
  .joystick-zone {
    position: fixed; bottom: 0; width: 50%; height: 55%;
    z-index: 15; display: none; touch-action: none;
  }
  #zone-left { left: 0; }
  #zone-right { right: 0; }
  #overlay .tables { display: flex; gap: 40px; }
  #overlay table { border-collapse: collapse; font-size: 0.78rem; }
  #overlay th { color: #00ffcc; padding: 3px 12px; text-align: left;
    border-bottom: 1px solid #333; }
  #overlay td { padding: 2px 12px; color: #ccc; }
  #overlay tr:nth-child(even) td { color: #aaa; }
  #overlay .gameover-title { font-size:1.4rem; color:#ff4444;
    text-shadow:0 0 14px #ff0000; margin-bottom:8px; }
  </style>
</head>
<body>
<div id="hud">
  <span id="hFPS">cargando...</span><br>
  <span id="hInfo"></span>
</div>
<div id="phaseTimer">--</div>
<div id="phaseLabel">FASE --</div>
<div id="scoreHud"><span id="hScore">0</span></div>
<div id="massHud"><span id="hMass">MASA: 0</span></div>
<canvas id="deathExplosion"></canvas>
<div id="zone-left" class="joystick-zone"></div>
<div id="zone-right" class="joystick-zone"></div>
<div id="overlay">
  <h1>SPACE SHOOTER</h1>
  <div class="sub">Las mejores partidas</div>
  <div class="tables">
    <table>
      <thead><tr><th>#</th><th>Nombre</th><th>SCORE</th></tr></thead>
      <tbody id="tbScores"></tbody>
    </table>
    <table>
      <thead><tr><th>#</th><th>Nombre</th><th>Tiempo</th></tr></thead>
      <tbody id="tbTimes"></tbody>
    </table>
  </div>
  <div class="click-hint">CLICK para comenzar</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================================
// CONSTANTS - edita aqui para rebalancear el juego
// ================================================================
const TYPE = { ENEMY:"enemy", PLAYER:"player", WALL:"wall", BULLET:"bullet" };

// --- FASES ---
const PHASE_DURATION_MS    = 30000;  // duración por defecto de cada fase (ms)
const PHASE_DURATION = {           // override por fase (0 = usa default)
  6: 10000,                        // fase 6 dura sólo 10s antes de pasar a la 7
};
const TOTAL_PHASES         = 7;
const PHASE7_DELAY_MS      = 0;     // sin espera — spawn inmediato al inicio de fase 7
const PHASE7_REPEAT_THRESHOLD = 30; // si quedan ≤ N enemigos vivos, se repite la oleada
const PHASE7_CORNERS       = 10;    // spawners por esquina
const PHASE7_SPAWN_INTERVAL = 500;  // ms entre cada spawner
const PHASE7_CORNER_MARGIN  = 60;   // distancia de la esquina al centro del spawner

// Enemigos que se AÑADEN al inicio de cada fase (los anteriores permanecen)
const PHASE_ADD_ENEMIES = {
  1: { enemy_heavy: 5 },
  2: { enemy_heavy: 5, enemy_boss: 1 },
  3: { enemy_heavy: 5, enemy_boss: 1, enemy_spawner: 1 },
  4: { enemy_spawner: 2, enemy_follower: 5 },
  5: { enemy_hitter: 4 },
  6: { enemy_blackhole: 1 },
  7: {},  // spawners de esquina gestionados por phase7Update
};

// --- BULLETS: desvanecimiento con distancia ---
// Las balas recorren MAX_BULLET_TRAVEL antes de desaparecer por completo.
// A partir de BULLET_FADE_START_FRAC (fracción de MAX_BULLET_TRAVEL)
// empiezan a perder daño, masa y alpha.
const BULLET_MAX_TRAVEL_FRAC  = 0.667;  // fracción del ancho de pantalla
const BULLET_FADE_START_FRAC  = 0.40;   // la bala empieza a debilitarse al 40% del recorrido
// Daño y masa mínimos al llegar al límite (0 = desaparece sin hacer nada)
const BULLET_MIN_DAMAGE_FRAC  = 0.0;    // fracción del daño base al final del recorrido
const BULLET_MIN_MASS_FRAC    = 0.1;

// --- SPAWNER ---
const SPAWNER_SPAWN_INTERVAL_MS = 20000;
const SPAWNER_SPAWN_VARIANT     = "enemy_heavy";
const SPAWNER_DEATH_RELEASE     = 3;
const SPAWNER_PULSE_RADIUS      = 110;   // radio máximo de la onda expansiva
const SPAWNER_PULSE_DURATION    = 600;   // ms de duración de la onda
const SPAWNER_PULSE_COUNT       = 3;     // ondas concéntricas por evento

// --- FOLLOWER ---
const FOLLOWER_IMPULSE_INTERVAL_MS = 5000;
const FOLLOWER_BRAKE_FACTOR        = 0.08;  // conserva poco de vel anterior
let FOLLOWER_IMPULSE_SPEED       = 9;

// --- HITTER ---
const HITTER_SHOOT_INTERVAL_MS  = 2500;
let HITTER_BULLET_SPEED       = 5;
const HITTER_BULLET_DAMAGE      = 2;

// --- BLACKHOLE ---
let BLACKHOLE_BASE_RADIUS     = 520;   // radio ampliado
const BLACKHOLE_RADIUS_PER_MASS = 3.0;   // px extra de radio por masa absorbida
const BLACKHOLE_BASE_FORCE      = 2;     // fuerza a la mitad
const BLACKHOLE_FORCE_PER_MASS  = 0.04;  // crecimiento de fuerza muy lento
const BLACKHOLE_ESCAPE_FRAC     = 0.15;  // solo el 15% interior es zona de no-escape
const BLACKHOLE_DRIFT_ACCEL     = 0.018; // aceleración de deriva lenta (sin centro fijo)
let BLACKHOLE_SIZE            = 28;    // hitbox (cuadrado)
const BLACKHOLE_ORBIT_SPEED     = 0.18;  // rad/s para órbita mutua entre 2 blackholes

// --- SERPENT ---
const SERPENT_SEGMENTS   = 7;
let SERPENT_RADIUS     = 10;    // radio de cada segmento
let SERPENT_REST_LEN   = 48;   // separación entre segmentos (aumentada)
const SERPENT_SPRING_K   = 0.22; // rigidez del muelle
const SERPENT_DAMPING    = 0.88; // amortiguación de velocidad
let SERPENT_SPEED      = 2.1;  // velocidad de la cabeza (mitad)
const SERPENT_ENERGY     = 8;    // vida por segmento
const SERPENT_COLOR      = 0x22ffaa;
const SERPENT_CORE_COLOR = 0x004422;
const SERPENT_SHOOT_INTERVAL = 1800; // ms entre disparos (como hitter)

// --- BLACKHOLE WAVE COOLDOWN ---
let lastBlackholeDeathTime = -Infinity;  // timestamp of last blackhole death
const BLACKHOLE_RESPAWN_WAVES = 5;       // must wait this many waves after death
let wavesSinceBlackholeDeath = BLACKHOLE_RESPAWN_WAVES + 1;  // allow BH on first wave

// --- ENERGÍA ---
const ENERGY = {
  enemy_basic:1, enemy_heavy:5, enemy_boss:15,
  enemy_spawner:12, enemy_follower:3, enemy_hitter:7,
  enemy_blackhole: 15*10,  // mitad de vida (10x el boss en lugar de 20x)
  player:10, wall:Infinity,
  enemy_serpent: SERPENT_ENERGY,  // per-segment energy handled separately
};

// --- DAÑO de enemigos al contacto ---
const ENEMY_DAMAGE = {
  enemy_basic:1, enemy_heavy:2, enemy_boss:5,
  enemy_spawner:1, enemy_follower:3, enemy_hitter:2, enemy_blackhole:999,
  enemy_serpent: 1,
};

// --- SHIELD ---
let SHIELD_MAX_MS    = 3000;
const SHIELD_COOLDOWN  = 20000;   // recarga lenta
const SHIELD_MIN_TO_USE = 200;    // ms mínimos de carga para poder activar
let SHIELD_RADIUS    = 36;
const SHIELD_DAMAGE    = 9;
const SHIELD_HIT_CD    = 600;

// --- BALAS del jugador ---
const BULLET_DAMAGE = { normal:1, heavy:3, laser:6 };
let BULLET_SPEED  = { normal:10, heavy:7, laser:18 };
const BULLET_MASS   = { normal:0.3, heavy:1.5, laser:0.05 };
let BULLET_SIZE   = { normal:6,   heavy:12,  laser:4 };

// --- BALAS enemigas ---
const ENEMY_BULLET_COLOR  = 0xff3333;
let ENEMY_BULLET_SIZE   = 7;
const ENEMY_BULLET_MASS   = 0.3;
const ENEMY_BULLET_TRAVEL = 9999;  // balas enemigas no se desvanecen

// --- FRAGMENTOS de impacto ---
const FRAG_DURATION    = 750;
const FRAG_COUNT_MIN   = 24;   // partículas mínimas por impacto
const FRAG_COUNT_MAX   = 44;   // partículas máximas
const FRAG_SPEED_MIN   = 3.0;
const FRAG_SPEED_MAX   = 11.0;
let FRAG_SIZE_MIN    = 3.0;
let FRAG_SIZE_MAX    = 9.0;

// --- EXHAUST ---
const EXHAUST_DURATION = 420;
const EXHAUST_RATE_MS  = 18;
const ENERGY_BAR_DURATION    = 3000;
const PLAYER_HP_BAR_DURATION = 3000;

// --- FÍSICA ---
const RESTITUTION   = 0.75;
const FRICTION      = 0.08;
const SLEEP_THRESH  = 0.003;
const SLEEP_FRAMES  = 20;

// --- JUGADOR ---
let PLAYER_SPEED   = 4;
let PLAYER_ACCEL   = 0.025;
const PLAYER_DAMPING = 0.965;
let BULLET_CD_MS   = 220;
const HIT_CD_MS      = 1200;

// --- AUTO-BEAM (arma 4) ---
let AUTOBEAM_RADIUS     = 80;     // radio de búsqueda de objetivo (px)
let AUTOBEAM_DAMAGE     = 1.5;    // daño por tick (1/4 del laser)
const AUTOBEAM_TICK_MS    = 120;    // ms entre ticks de daño
const AUTOBEAM_MIN_SHOW   = 250;    // ms mínimos de rayo visible tras matar

// --- MISIL / LOCK-ON ---
const LOCK_MAX            = 5;      // máximo de objetivos simultáneos
const MISSILE_DAMAGE      = 8;
let MISSILE_SPEED       = 4;
const MISSILE_TURN_RATE   = 0.07;   // giro máximo por frame
const MISSILE_LOOP_FRAMES = 80;     // frames que dura la espiral inicial
let MISSILE_SIZE        = 8;
const MISSILE_COLOR       = 0xff8833;

// --- PAREDES INTERIORES ---
let WALL_COUNT_MIN  = 7;
let WALL_COUNT_MAX  = 11;
let WALL_MIN_SHORT  = 12;
let WALL_MAX_SHORT  = 20;
let WALL_MIN_LONG   = 45;
let WALL_MAX_LONG   = 130;
let WALL_MARGIN     = 60;
let WALL_MIN_SEP    = 55;

// --- REJILLA DE FONDO (warp grid) ---
const GRID_STEP       = 48;         // píxeles entre líneas de la malla
const GRID_ALPHA      = 0.38;       // alpha base de las líneas
const GRID_COLOR      = 0xaa44ff;   // color de las líneas
const GRID_DEFORM_DIV = 80;         // divisor para extra-alpha por deformación
const GRID_EXTRA_MAX  = 0.55;       // alpha extra máximo en zona deformada
// Parámetros de la proyección "tela con bola":
const FABRIC_DEPTH    = 420;        // hundimiento Z máximo (px virtuales)
const FABRIC_SPREAD   = 1.8;        // multiplicador del radio BH para la deformación
const FABRIC_VIEW     = 900;        // distancia virtual del ojo (perspectiva)

// --- TAMAÑOS y COLORES ---
const ENEMY_SIZE = {
  enemy_basic:   [12, 12],
  enemy_heavy:   [22, 22],
  enemy_boss:    [36, 36],
  enemy_spawner: [38, 38],
  enemy_follower:[20, 20],
  enemy_hitter:  [22, 22],
  enemy_blackhole:[BLACKHOLE_SIZE, BLACKHOLE_SIZE],
  enemy_serpent:  [SERPENT_RADIUS*2, SERPENT_RADIUS*2],
};
const ENEMY_COLOR = {
  enemy_basic:   0x4488ff,
  enemy_heavy:   0xff8800,
  enemy_boss:    0xff2222,
  enemy_spawner: 0xaa44ff,
  enemy_follower:0x44ff88,
  enemy_hitter:  0xff4466,
  enemy_blackhole:0x110022,
  enemy_serpent:  SERPENT_COLOR,
};
const COLOR = {
  player:0x00ffcc, wall:0x5577aa,
  bullet_normal:0xffff33, bullet_heavy:0xff8833, bullet_laser:0x33ffff,
};

// ================================================================
// PIXI SETUP
// ================================================================
PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
const app = new PIXI.Application({
  width: window.innerWidth, height: window.innerHeight,
  backgroundColor: 0x111111,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
document.body.appendChild(app.view);

// ================================================================
// MOBILE DETECTION, WORLD SCALING, CAMERA
// ================================================================
let MS = 1;   // mobile size scale
let isMobileControlsActive = false;
let WORLD_W = 0, WORLD_H = 0;   // set after detection
const cam = { x: 0, y: 0 };     // camera top-left in world coords
const aimVector = { x: 0, y: 0, active: false }; // right joystick aim direction

const _isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
try {
if (_isTouchDevice) {
  MS = 0.5;
  isMobileControlsActive = true;
  WORLD_W = 2500; WORLD_H = 2500;

  // --- Speed reduction (1/5 slower = 0.8×) ---
  const SPD = 0.8;
  PLAYER_SPEED   *= SPD;
  PLAYER_ACCEL   *= SPD;
  FOLLOWER_IMPULSE_SPEED *= SPD;
  HITTER_BULLET_SPEED    *= SPD;
  SERPENT_SPEED           *= SPD;
  MISSILE_SPEED           *= SPD;
  for (const k in BULLET_SPEED) BULLET_SPEED[k] *= SPD;

  // --- Size reduction ---
  for (const k in ENEMY_SIZE) {
    ENEMY_SIZE[k][0] = Math.round(ENEMY_SIZE[k][0] * MS);
    ENEMY_SIZE[k][1] = Math.round(ENEMY_SIZE[k][1] * MS);
  }
  for (const k in BULLET_SIZE) BULLET_SIZE[k] = Math.round(BULLET_SIZE[k] * MS);
  BLACKHOLE_SIZE    = Math.round(BLACKHOLE_SIZE * MS);
  SERPENT_RADIUS    = Math.round(SERPENT_RADIUS * MS);
  SERPENT_REST_LEN  = Math.round(SERPENT_REST_LEN * MS);
  ENEMY_BULLET_SIZE = Math.round(ENEMY_BULLET_SIZE * MS);
  MISSILE_SIZE      = Math.round(MISSILE_SIZE * MS);
  SHIELD_RADIUS     = Math.round(SHIELD_RADIUS * MS);
  FRAG_SIZE_MIN    *= MS;
  FRAG_SIZE_MAX    *= MS;
  BLACKHOLE_BASE_RADIUS *= MS;
  AUTOBEAM_RADIUS  = Math.round(AUTOBEAM_RADIUS * MS);

  // --- Wall scaling ---
  WALL_MIN_SHORT = Math.round(WALL_MIN_SHORT * MS);
  WALL_MAX_SHORT = Math.round(WALL_MAX_SHORT * MS);
  WALL_MIN_LONG  = Math.round(WALL_MIN_LONG * MS);
  WALL_MAX_LONG  = Math.round(WALL_MAX_LONG * MS);
  WALL_MARGIN    = Math.round(WALL_MARGIN * 2);  // more margin in big world
  WALL_MIN_SEP   = Math.round(WALL_MIN_SEP * MS * 0.6); // tighter packing for dense walls

  WALL_COUNT_MIN = 90;   // ~10x for 2500×2500
  WALL_COUNT_MAX = 130;

  // Fullscreen on first touch
  document.addEventListener('touchstart', function fs() {
    try {
      const el = document.documentElement;
      const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (rfs) rfs.call(el).catch(() => {});
      if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
    } catch(e) {}
    document.removeEventListener('touchstart', fs);
  }, { once: true });
} else {
  // Desktop: world = screen
  WORLD_W = 0; WORLD_H = 0; // sentinel: use screen size
}
} catch(err) { console.error('Mobile init error:', err); }

// World-container: all game objects live here; camera moves this container
const worldContainer = new PIXI.Container();
app.stage.addChild(worldContainer);

// World dimensions (called often)
function WW() { return WORLD_W || app.screen.width; }
function WH() { return WORLD_H || app.screen.height; }

// Camera update — dead-zone style with edge push
function updateCamera() {
  if (!_isTouchDevice || !player || !player.alive) return;
  const sw = app.screen.width, sh = app.screen.height;
  const mx = sw * 0.20, my = sh * 0.20; // 20% edge margin

  // Player screen position
  const psx = player.x - cam.x;
  const psy = player.y - cam.y;

  if (psx < mx)       cam.x = player.x - mx;
  if (psx > sw - mx)  cam.x = player.x - (sw - mx);
  if (psy < my)       cam.y = player.y - my;
  if (psy > sh - my)  cam.y = player.y - (sh - my);

  // Clamp to world bounds
  cam.x = Math.max(0, Math.min(cam.x, WW() - sw));
  cam.y = Math.max(0, Math.min(cam.y, WH() - sh));

  worldContainer.x = -cam.x;
  worldContainer.y = -cam.y;
}

// ================================================================
// ENTITY
// ================================================================
let uid = 0;
function makeEntity(type, variant, x, y, w, h, vx, vy, mass, color) {
  return {
    id: uid++, type, variant, alive: true,
    energy: ENERGY[variant] ?? 1,
    maxEnergy: ENERGY[variant] ?? 1,
    x, y, vx, vy, w, h,
    halfW: w * 0.5, halfH: h * 0.5,
    mass, baseMass: mass,
    invMass: (mass === Infinity) ? 0 : 1 / mass,
    restitution: RESTITUTION, friction: FRICTION,
    sleepN: 0, sleeping: false,
    lastHit: 0, color, gfx: null,
    lastSpawn: 0,
    lastImpulse: 0,
    lastShot: 0,
    isEnemyBullet: false,
    // bullet travel tracking
    spawnX: x, spawnY: y,
    maxTravel: 9999,    // set properly in spawnBullet
    baseDamage: 1,      // set properly in spawnBullet
    currentDamage: 1,
  };
}

// ================================================================
// POOL
// ================================================================
const pool = [];

function buildEnemyGfx(e) {
  const g = new PIXI.Graphics();
  if (e.variant === 'enemy_spawner') {
    g.beginFill(e.color);
    const hw = e.halfW, hh = e.halfH;
    g.drawPolygon([hw,0, e.w,hh*0.5, e.w,hh*1.5, hw,e.h, 0,hh*1.5, 0,hh*0.5]);
    g.endFill();
    g.beginFill(0xdd88ff, 0.8);
    g.drawCircle(hw, hh, hw * 0.42);
    g.endFill();
    g.lineStyle(3, 0xee66ff, 1);
    g.drawCircle(hw, hh, hw - 2);
  } else if (e.variant === 'enemy_follower') {
    g.beginFill(e.color);
    const hw = e.halfW, hh = e.halfH;
    g.drawPolygon([hw,0, e.w,hh, hw,e.h, 0,hh]);
    g.endFill();
    g.lineStyle(2, 0xaaffcc, 0.9);
    g.drawPolygon([hw,3, e.w-3,hh, hw,e.h-3, 3,hh]);
  } else if (e.variant === 'enemy_hitter') {
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
    g.beginFill(0xffaaaa, 0.9);
    g.drawRect(e.halfW-2, 2, 4, e.h-4);
    g.drawRect(2, e.halfH-2, e.w-4, 4);
    g.endFill();
    g.lineStyle(2, 0xff0000, 0.8);
    g.drawCircle(e.halfW, e.halfH, e.halfW - 2);
  } else if (e.variant === 'enemy_blackhole') {
    // Agujero negro: disco de acreción + horizonte de eventos
    const cx = e.halfW, cy = e.halfH, r = e.halfW;
    // Disco de acreción exterior (naranja-amarillo, degradado por capas)
    for (let layer = 0; layer < 6; layer++) {
      const t = layer / 5;
      const lr = r * (1.9 - t * 0.7);
      const col = t < 0.4
        ? PIXI.utils.rgb2hex([1.0, 0.55 + t*0.5, 0.0])   // naranja
        : PIXI.utils.rgb2hex([1.0, 0.9 + t*0.1, 0.2]);   // amarillo
      const alpha = 0.18 - t * 0.12;
      g.beginFill(col, alpha);
      g.drawCircle(cx, cy, lr);
      g.endFill();
    }
    // Horizonte de eventos: anillo naranja brillante
    g.lineStyle(2.5, 0xff9900, 0.95);
    g.drawCircle(cx, cy, r * 1.18);
    g.lineStyle(1.2, 0xffdd44, 0.55);
    g.drawCircle(cx, cy, r * 1.3);
    // Singularidad: núcleo negro absoluto
    g.lineStyle(0);
    g.beginFill(0x000000, 1.0);
    g.drawCircle(cx, cy, r * 0.78);
    g.endFill();
    // Destello central violeta muy tenue
    g.beginFill(0x3300aa, 0.18);
    g.drawCircle(cx, cy, r * 0.38);
    g.endFill();
  } else {
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
  }
  return g;
}

function addToPool(e) {
  let g;
  if (e.type === TYPE.ENEMY) {
    g = buildEnemyGfx(e);
  } else if (e.type === TYPE.PLAYER) {
    g = new PIXI.Graphics();
    const pw = e.w, ph = e.h;
    // Outer neon glow (semi-transparent, slightly larger)
    g.lineStyle(4, 0x00ffcc, 0.18);
    g.beginFill(0x00ffcc, 0.07);
    g.drawPolygon([pw*0.5,-4, pw+5,ph+4, -5,ph+4]);
    g.endFill();
    // Mid glow ring
    g.lineStyle(2, 0x88ffee, 0.35);
    g.beginFill(0x00ffcc, 0.0);
    g.drawPolygon([pw*0.5,-2, pw+3,ph+2, -3,ph+2]);
    g.endFill();
    // Main metallic body — dark teal with gradient feel via two fills
    g.lineStyle(0);
    g.beginFill(0x003322, 1.0);
    g.drawPolygon([pw*0.5,1, pw-2,ph-1, 2,ph-1]);
    g.endFill();
    // Bright inner highlight strip (top third)
    g.beginFill(0x44ffcc, 0.22);
    g.drawPolygon([pw*0.5,2, pw*0.72,ph*0.48, pw*0.28,ph*0.48]);
    g.endFill();
    // Sharp neon edge
    g.lineStyle(1.5, 0x00ffcc, 0.9);
    g.beginFill(0x0, 0);
    g.drawPolygon([pw*0.5,0, pw,ph, 0,ph]);
    g.endFill();
    // Central bright spine
    g.lineStyle(1, 0xaaffee, 0.55);
    g.moveTo(pw*0.5, 3);
    g.lineTo(pw*0.5, ph - 4);
  } else {
    g = new PIXI.Graphics();
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
  }
  g.pivot.x = e.halfW; g.pivot.y = e.halfH;
  g.x = e.x; g.y = e.y;
  worldContainer.addChild(g);
  e.gfx = g;
  pool.push(e);
  return e;
}

function purge() {
  for (let i = pool.length - 1; i >= 0; i--) {
    const e = pool[i];
    if (!e.alive) {
      if (e.gfx) { worldContainer.removeChild(e.gfx); e.gfx.destroy(); e.gfx = null; }
      if (e._ringGfx) { worldContainer.removeChild(e._ringGfx); e._ringGfx.destroy(); e._ringGfx = null; }
      pool.splice(i, 1);
    }
  }
}

// ================================================================
// SPAWN HELPERS
// ================================================================
const W = () => app.screen.width;
const H = () => app.screen.height;

function spawnWall(x, y, w, h) {
  return addToPool(makeEntity(TYPE.WALL,"wall",x,y,w,h,0,0,Infinity,COLOR.wall));
}

function spawnEnemy(variant, x, y) {
  if (!variant) variant = 'enemy_basic';
  const [ew, eh] = ENEMY_SIZE[variant] ?? [12, 12];
  const col = ENEMY_COLOR[variant] ?? 0x888888;
  let sx, sy;
  if (x !== undefined) {
    sx = x; sy = y;
  } else {
    // Spawn por todo el campo con margen de seguridad alrededor del jugador
    const margin = 40, safeR = 120;
    let attempts = 0;
    do {
      sx = margin + Math.random() * (WW() - margin * 2);
      sy = margin + Math.random() * (WH() - margin * 2);
      attempts++;
      if (attempts > 30) break;  // fallback: acepta cualquier posición
    } while (player && player.alive &&
             Math.hypot(sx - player.x, sy - player.y) < safeR);
  }
  const e = addToPool(makeEntity(
    TYPE.ENEMY, variant, sx, sy, ew, eh,
    (Math.random() - 0.3) * 4,
    (Math.random() - 0.5) * 4,
    1, col
  ));
  // Spawn burst effect
  spawnBirthEffect(sx, sy, col, Math.max(ew, eh));
  if (variant === 'enemy_spawner') e._spawnTime = performance.now();
  return e;
}

function spawnPlayer() {
  const ps = Math.round(20 * MS);
  return addToPool(makeEntity(TYPE.PLAYER,"player",WW()*0.5,WH()*0.5,ps,ps,0,0,2,COLOR.player));
}

function spawnBullet(x, y, vx, vy, btype, isEnemyBullet) {
  let col, mass, bs, baseDamage, maxTravel;
  if (isEnemyBullet) {
    col = ENEMY_BULLET_COLOR; mass = ENEMY_BULLET_MASS; bs = ENEMY_BULLET_SIZE;
    baseDamage = HITTER_BULLET_DAMAGE;
    maxTravel  = ENEMY_BULLET_TRAVEL;
    btype = "enemy";
  } else {
    col        = COLOR["bullet_" + btype] ?? 0xffff00;
    mass       = BULLET_MASS[btype] ?? 0.3;
    bs         = BULLET_SIZE[btype] ?? 6;
    baseDamage = BULLET_DAMAGE[btype] ?? 1;
    maxTravel  = WW() * BULLET_MAX_TRAVEL_FRAC;
  }
  const e = makeEntity(TYPE.BULLET,"bullet_"+btype,x,y,bs,bs,vx,vy,mass,col);
  e.isEnemyBullet = !!isEnemyBullet;
  e.spawnX = x; e.spawnY = y;
  e.maxTravel = maxTravel;
  e.baseDamage = baseDamage;
  e.currentDamage = baseDamage;
  e.baseMass = mass;
  return addToPool(e);
}

// ================================================================
// BULLET TRAVEL & FADE
// ================================================================
function updateBulletFade() {
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.alive || e.type !== TYPE.BULLET || e.isEnemyBullet) continue;

    const dx = e.x - e.spawnX, dy = e.y - e.spawnY;
    const traveled = Math.sqrt(dx*dx + dy*dy);
    const maxT = e.maxTravel;

    if (traveled >= maxT) {
      e.alive = false;
      continue;
    }

    const t = traveled / maxT;               // 0→1
    const fadeStart = BULLET_FADE_START_FRAC;

    if (t > fadeStart) {
      const f = (t - fadeStart) / (1 - fadeStart); // 0→1 dentro de la zona de fade
      const strength = 1 - f;                       // 1→0

      // Daño actual interpolado
      e.currentDamage = e.baseDamage * (BULLET_MIN_DAMAGE_FRAC + strength * (1 - BULLET_MIN_DAMAGE_FRAC));

      // Masa actual (afecta al impulso físico)
      const newMass = e.baseMass * (BULLET_MIN_MASS_FRAC + strength * (1 - BULLET_MIN_MASS_FRAC));
      e.mass    = newMass;
      e.invMass = newMass > 0 ? 1 / newMass : 0;

      // Alpha visual
      if (e.gfx) e.gfx.alpha = Math.max(0.05, strength);

    } else {
      e.currentDamage = e.baseDamage;
      e.mass    = e.baseMass;
      e.invMass = e.baseMass > 0 ? 1 / e.baseMass : 0;
      if (e.gfx) e.gfx.alpha = 1;
    }
  }
}

// --- Ondas expansivas del spawner ---
const pulses = [];
function spawnSpawnerPulse(x, y) {
  for (let wave = 0; wave < SPAWNER_PULSE_COUNT; wave++) {
    const delay = wave * 90;  // cada onda desfasada 90ms
    setTimeout(() => {
      const g = new PIXI.Graphics();
      worldContainer.addChild(g);
      pulses.push({
        gfx: g, x, y,
        life: SPAWNER_PULSE_DURATION,
        maxLife: SPAWNER_PULSE_DURATION,
        maxR: SPAWNER_PULSE_RADIUS * (0.5 + wave * 0.35),  // radios distintos
        color: wave % 2 === 0 ? 0xdd44ff : 0xff88ff,
        lineW: wave === 0 ? 3.5 : 2,
      });
    }, delay);
  }
}

function updatePulses() {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.life -= app.ticker.deltaMS;
    if (p.life <= 0) {
      worldContainer.removeChild(p.gfx); p.gfx.destroy();
      pulses.splice(i, 1); continue;
    }
    const t = 1 - p.life / p.maxLife;  // 0→1 con el tiempo
    const r = p.maxR * t;
    const alpha = (1 - t) * 0.85;
    p.gfx.clear();
    p.gfx.lineStyle(p.lineW, p.color, alpha);
    p.gfx.drawCircle(p.x, p.y, r);
    // Relleno tenue
    p.gfx.beginFill(p.color, alpha * 0.12);
    p.gfx.drawCircle(p.x, p.y, r);
    p.gfx.endFill();
  }
}

// --- Flash de impulso del follower ---
const impulseFlashes = [];
function spawnImpulseFlash(x, y) {
  // Varias líneas radiales + círculo expansivo
  const g = new PIXI.Graphics();
  worldContainer.addChild(g);
  impulseFlashes.push({ gfx:g, x, y, life:380, maxLife:380 });
}

function updateImpulseFlashes() {
  for (let i = impulseFlashes.length - 1; i >= 0; i--) {
    const f = impulseFlashes[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      worldContainer.removeChild(f.gfx); f.gfx.destroy();
      impulseFlashes.splice(i, 1); continue;
    }
    const t = f.life / f.maxLife;   // 1→0
    const r = 36 * (1 - t);
    f.gfx.clear();
    // Círculo exterior
    f.gfx.lineStyle(2.5 + t * 2, 0x44ffaa, t * 0.9);
    f.gfx.drawCircle(f.x, f.y, r);
    f.gfx.beginFill(0x44ffaa, t * 0.18);
    f.gfx.drawCircle(f.x, f.y, r);
    f.gfx.endFill();
    // Líneas radiales
    const spokes = 6;
    f.gfx.lineStyle(1.5, 0xaaffcc, t * 0.7);
    for (let s = 0; s < spokes; s++) {
      const angle = (s / spokes) * Math.PI * 2;
      const innerR = r * 0.3;
      f.gfx.moveTo(f.x + Math.cos(angle)*innerR, f.y + Math.sin(angle)*innerR);
      f.gfx.lineTo(f.x + Math.cos(angle)*r,      f.y + Math.sin(angle)*r);
    }
  }
}

// ================================================================
// SISTEMA DE FASES
// ================================================================
let currentPhase   = 0;
let phaseStartTime = 0;
let phaseActive    = false;
let phase7Started  = false;   // true once the current wave has begun
let phase7NextSpawn = 0;      // timestamp of next enemy spawn
let phase7Count    = 0;       // enemies already released this wave
let phase7Wave     = 0;       // 0 = spawners wave, 1 = hitters wave (alternates)


const elPhaseTimer = document.getElementById("phaseTimer");
const elPhaseLabel = document.getElementById("phaseLabel");

function timerColor(s) {
  if (s > 15) return "#00ffcc";
  if (s > 8)  return "#ffcc00";
  return "#ff4444";
}

function startPhase(n, now) {
  currentPhase   = n;
  phaseStartTime = now;
  phaseActive    = true;
  if (n === 7) {
    phase7Started = false; phase7Count = 0; phase7NextSpawn = 0; phase7Wave = 0;
    wavesSinceBlackholeDeath = BLACKHOLE_RESPAWN_WAVES + 1;
    s_bhMissingFrom = null; s_lastBHCheck = null; s_lastSerpentSpawn = null;
  }
  const config = PHASE_ADD_ENEMIES[n] ?? {};
  for (const [variant, count] of Object.entries(config)) {
    for (let i = 0; i < count; i++) spawnEnemy(variant);
  }
  elPhaseLabel.textContent = "FASE " + n + " / " + TOTAL_PHASES;
}

function phaseUpdate(now) {
  if (!phaseActive) return;
  // Freeze timer while paused or game over
  if (paused || gameOver) {
    phaseStartTime += app.ticker.deltaMS;
    return;
  }
  const phaseDur  = PHASE_DURATION[currentPhase] ?? PHASE_DURATION_MS;
  const remaining = Math.max(0, phaseDur - (now - phaseStartTime));
  const secsLeft  = Math.ceil(remaining / 1000);
  elPhaseTimer.textContent = secsLeft;
  elPhaseTimer.style.color = timerColor(secsLeft);
  elPhaseTimer.style.textShadow = `0 0 16px ${timerColor(secsLeft)}, 0 0 4px #fff`;
  if (remaining <= 0) {
    if (currentPhase < TOTAL_PHASES) {
      startPhase(currentPhase + 1, now);
    } else {
      // Phase 7 runs indefinitely — just freeze timer display, don't end
      elPhaseTimer.textContent = "∞";
      elPhaseTimer.style.color = "#ff4444";
      elPhaseTimer.style.textShadow = "0 0 16px #ff4444, 0 0 4px #fff";
      // Keep phaseActive = true so phase7Update/RepeatCheck keep running
      phaseStartTime = now; // reset so timer doesn't go negative
    }
  }
  // Auto-advance phases 1-6 if all enemies cleared
  if (currentPhase >= 1 && currentPhase <= 6 && phaseActive) {
    const liveEnemies = pool.filter(e => e.alive && e.type === TYPE.ENEMY).length;
    if (liveEnemies === 0 && remaining > 0) {
      startPhase(currentPhase + 1, now);
    }
  }
}

// ================================================================
// FASE 7 — spawn periódico infinito: spawners → hitters → spawners → hitters…
//          blackhole si no hay ninguno en 30 s
//          serpent cada 10 s, máximo 5 simultáneas
// ================================================================
const PHASE7_SPAWNER_COUNT    = 6;     // spawners por oleada
const PHASE7_SPAWNER_INTERVAL = 800;   // ms entre cada spawner
const PHASE7_HITTERS_PER_WAVE = 10;   // hitters por oleada
const PHASE7_HITTER_INTERVAL  = 400;  // ms entre cada hitter
const PHASE7_BH_TIMEOUT_MS    = 30000; // si no hay BH en este tiempo → spawn uno
const PHASE7_SERPENT_INTERVAL = 10000; // ms entre spawns de serpient
const PHASE7_SERPENT_MAX      = 5;    // máximo de serpientes simultáneas

// wave alternates: 0=spawners, 1=hitters
function phase7WaveType() { return phase7Wave % 2; }

function phase7StartWave(now) {
  phase7Started   = true;
  phase7Count     = 0;
  phase7NextSpawn = now + 500;
  const labels = ["SPAWNERS", "HITTERS"];
  elPhaseLabel.textContent = "FASE 7 — ¡" + labels[phase7WaveType()] + "!";
  setTimeout(() => { if (currentPhase === 7) elPhaseLabel.textContent = "FASE 7 / " + TOTAL_PHASES; }, 2500);
}

function phase7Update(now) {
  if (currentPhase !== 7 || paused || gameOver) return;
  const elapsed = now - phaseStartTime;

  // ── Iniciar primera oleada tras PHASE7_DELAY_MS ──
  if (!phase7Started) {
    if (elapsed < PHASE7_DELAY_MS) return;
    phase7StartWave(now);
    return;
  }

  // ── Spawn periódico de la oleada actual ──
  if (now >= phase7NextSpawn) {
    const type = phase7WaveType();
    const limit = type === 0 ? PHASE7_SPAWNER_COUNT : PHASE7_HITTERS_PER_WAVE;

    if (phase7Count < limit) {
      const sw = WW(), sh = WH();
      if (type === 0) {
        // SPAWNERS — distribuidos entre las 4 esquinas
        const corner = phase7Count % 4;
        const m = PHASE7_CORNER_MARGIN;
        const cx = (corner === 0 || corner === 2) ? m : sw - m;
        const cy = (corner === 0 || corner === 1) ? m : sh - m;
        spawnEnemy('enemy_spawner', cx + (Math.random()-0.5)*30, cy + (Math.random()-0.5)*30);
        phase7NextSpawn = now + PHASE7_SPAWNER_INTERVAL;
      } else {
        // HITTERS — desde los 4 bordes
        const side = phase7Count % 4;
        let hx, hy;
        if (side === 0)      { hx = Math.random()*sw; hy = -20; }
        else if (side === 1) { hx = sw+20; hy = Math.random()*sh; }
        else if (side === 2) { hx = Math.random()*sw; hy = sh+20; }
        else                 { hx = -20; hy = Math.random()*sh; }
        spawnEnemy('enemy_hitter', hx, hy);
        phase7NextSpawn = now + PHASE7_HITTER_INTERVAL;
      }
      phase7Count++;
    } else {
      // Oleada completada → pasar a la siguiente
      phase7Wave++;
      phase7StartWave(now);
    }
  }

  // ── Blackhole: spawn si lleva más de 30 s sin ninguno ──
  if (!s_lastBHCheck) s_lastBHCheck = now;
  const bhAlive = pool.some(e => e.alive && e.variant === 'enemy_blackhole');
  if (!bhAlive) {
    if (!s_bhMissingFrom) s_bhMissingFrom = now;
    if (now - s_bhMissingFrom >= PHASE7_BH_TIMEOUT_MS) {
      s_bhMissingFrom = null;
      const sw = WW(), sh = WH();
      const side = Math.floor(Math.random()*4);
      let bx, by;
      if (side === 0)      { bx = Math.random()*sw; by = -30; }
      else if (side === 1) { bx = sw+30; by = Math.random()*sh; }
      else if (side === 2) { bx = Math.random()*sw; by = sh+30; }
      else                 { bx = -30; by = Math.random()*sh; }
      spawnEnemy('enemy_blackhole', bx, by);
    }
  } else {
    s_bhMissingFrom = null; // reset timer while BH is alive
  }

  // ── Serpent: spawn cada 10 s si hay menos de 5 activas ──
  if (!s_lastSerpentSpawn) s_lastSerpentSpawn = now;
  if (now - s_lastSerpentSpawn >= PHASE7_SERPENT_INTERVAL) {
    const liveSerpents = serpents.filter(s => s.segs.length > 0).length;
    if (liveSerpents < PHASE7_SERPENT_MAX) {
      s_lastSerpentSpawn = now;
      const sw = WW(), sh = WH();
      spawnSerpent(Math.random() * sw, Math.random() * sh);
    } else {
      s_lastSerpentSpawn = now; // reset so we retry in 10 s
    }
  }
}

// State vars for phase7 timers (prefixed s_ to avoid global conflicts)
let s_bhMissingFrom   = null;
let s_lastBHCheck     = null;
let s_lastSerpentSpawn = null;

function phase7RepeatCheck(now) {
  // No longer needed — phase7Update handles wave progression directly
}

// ================================================================
// SERPENT ENEMY — segmented spring chain
// ================================================================
const serpents = []; // each entry: { segments: [{entity,vx,vy}], lineGfx }

function buildSegmentGfx(segIndex) {
  const g = new PIXI.Graphics();
  const r = SERPENT_RADIUS;
  const t = segIndex / (SERPENT_SEGMENTS - 1);  // 0=head, 1=tail
  const colG = Math.round(0xff - t * 0x99);  // ff → 66
  const colB = Math.round(0xaa - t * 0x66);  // aa → 44
  const col  = (colG << 8) | colB;
  g.beginFill(col, 0.9 - t * 0.2);
  g.drawCircle(r, r, r - 0.5);
  g.endFill();
  g.beginFill(SERPENT_CORE_COLOR, 0.7);
  g.drawCircle(r, r, r * 0.45);
  g.endFill();
  g.pivot.x = r; g.pivot.y = r;
  worldContainer.addChild(g);
  return g;
}

function spawnSerpent(sx, sy) {
  const segs = [];
  for (let i = 0; i < SERPENT_SEGMENTS; i++) {
    const x = sx - i * SERPENT_REST_LEN;
    const y = sy;
    const r = SERPENT_RADIUS;
    const e = makeEntity(TYPE.ENEMY, 'enemy_serpent', x, y, r*2, r*2, 0, 0, 1, SERPENT_COLOR);
    e.energy    = SERPENT_ENERGY;
    e.maxEnergy = SERPENT_ENERGY;
    e.restitution = 0.2;
    e.friction    = 0.3;
    e._serpentImmune = true;
    e._isSerpentSeg = true;
    e._skipPhysics  = true;  // physicsStep skips position integration; serpent handles it
    e.gfx = buildSegmentGfx(i);
    e.gfx.x = x; e.gfx.y = y;
    pool.push(e);
    segs.push({ entity: e, vx: 0, vy: 0 });
    spawnBirthEffect(x, y, SERPENT_COLOR, r * 2);
  }

  const lineGfx = new PIXI.Graphics();
  worldContainer.addChildAt(lineGfx, 0); // behind everything
  serpents.push({ segs, lineGfx });
}

function updateSerpents(now) {
  for (let si = serpents.length - 1; si >= 0; si--) {
    const s = serpents[si];

    // Remove dead segments, prune from tail first to keep chain coherent
    for (let i = s.segs.length - 1; i >= 0; i--) {
      const seg = s.segs[i];
      if (!seg.entity.alive) {
        if (seg.entity.gfx) {
          worldContainer.removeChild(seg.entity.gfx);
          seg.entity.gfx.destroy();
          seg.entity.gfx = null;
        }
        // Score only if player killed (handled in onCollision/onEnemyDeath)
        s.segs.splice(i, 1);
      }
    }

    // If all segments gone, remove serpent
    if (s.segs.length === 0) {
      worldContainer.removeChild(s.lineGfx); s.lineGfx.destroy();
      serpents.splice(si, 1);
      continue;
    }

    // ── Head AI: move toward player + shoot ──
    const head = s.segs[0];
    const he = head.entity;
    if (he.alive && player && player.alive) {
      const dx = player.x - he.x, dy = player.y - he.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      head.vx += (dx/d) * 0.35;
      head.vy += (dy/d) * 0.35;

      // Shoot hitter-style bullet toward player
      if (!s.lastShot) s.lastShot = 0;
      if (now - s.lastShot > SERPENT_SHOOT_INTERVAL) {
        s.lastShot = now;
        spawnBullet(he.x + (dx/d)*14, he.y + (dy/d)*14,
                    (dx/d)*HITTER_BULLET_SPEED, (dy/d)*HITTER_BULLET_SPEED, null, true);
      }
    }

    // ── Spring physics ──
    for (let i = 0; i < s.segs.length; i++) {
      const seg = s.segs[i];
      const e = seg.entity;
      if (!e.alive) continue;

      if (i === 0) {
        // ── HEAD: autonomous movement toward player ──
        // (velocity already applied above in Head AI block)
        // Cap head speed
        const speed = Math.sqrt(seg.vx*seg.vx + seg.vy*seg.vy);
        if (speed > SERPENT_SPEED) { seg.vx *= SERPENT_SPEED/speed; seg.vy *= SERPENT_SPEED/speed; }
        seg.vx *= SERPENT_DAMPING;
        seg.vy *= SERPENT_DAMPING;
      } else {
        // ── BODY: pulled toward previous segment only (chain drag) ──
        const prev = s.segs[i - 1].entity;
        if (prev.alive) {
          const dx = prev.x - e.x, dy = prev.y - e.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          const stretch = dist - SERPENT_REST_LEN;
          // Only pull when stretched beyond rest length (no push)
          if (stretch > 0) {
            seg.vx += (dx/dist) * stretch * SERPENT_SPRING_K;
            seg.vy += (dy/dist) * stretch * SERPENT_SPRING_K;
          }
        }
        seg.vx *= SERPENT_DAMPING;
        seg.vy *= SERPENT_DAMPING;
        // Cap body speed to slightly above head so it can keep up
        const speed = Math.sqrt(seg.vx*seg.vx + seg.vy*seg.vy);
        const maxSpd = SERPENT_SPEED * 1.6;
        if (speed > maxSpd) { seg.vx *= maxSpd/speed; seg.vy *= maxSpd/speed; }
      }

      // Apply velocity
      e.x += seg.vx;
      e.y += seg.vy;

      // Bounce off screen edges
      const sw = WW(), sh = WH(), r = SERPENT_RADIUS;
      if (e.x - r < 0)    { e.x = r;    seg.vx = Math.abs(seg.vx); }
      if (e.x + r > sw)   { e.x = sw-r; seg.vx = -Math.abs(seg.vx); }
      if (e.y - r < 0)    { e.y = r;    seg.vy = Math.abs(seg.vy); }
      if (e.y + r > sh)   { e.y = sh-r; seg.vy = -Math.abs(seg.vy); }

      // Collide with interior walls
      for (let wi = 0; wi < pool.length; wi++) {
        const w = pool[wi];
        if (!w.alive || w.type !== TYPE.WALL) continue;
        // AABB overlap between circle (approx square) and wall rect
        const ox = (r + w.halfW) - Math.abs(e.x - w.x);
        const oy = (r + w.halfH) - Math.abs(e.y - w.y);
        if (ox <= 0 || oy <= 0) continue;
        // Push out along the axis of least overlap
        if (ox < oy) {
          const sign = e.x < w.x ? -1 : 1;
          e.x += ox * sign;
          seg.vx = Math.abs(seg.vx) * sign * 0.6;
        } else {
          const sign = e.y < w.y ? -1 : 1;
          e.y += oy * sign;
          seg.vy = Math.abs(seg.vy) * sign * 0.6;
        }
      }

      // Sync gfx
      if (e.gfx) { e.gfx.x = e.x; e.gfx.y = e.y; }
    }

    // ── Draw elastic line connecting segments ──
    s.lineGfx.clear();
    if (s.segs.length >= 2) {
      for (let i = 0; i < s.segs.length - 1; i++) {
        const a = s.segs[i].entity, b = s.segs[i+1].entity;
        if (!a.alive || !b.alive) continue;
        // Stretch factor for color/thickness
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const stretch = Math.max(0, dist / SERPENT_REST_LEN - 1);
        const thick = Math.max(1.5, 4 - i * 0.3);
        const alpha = 0.85 - i * 0.06;
        // Shift from green→red as segment stretches beyond rest length
        const gr = Math.round(255 * Math.max(0, 1 - stretch * 2.5));
        const rb = Math.round(180 * Math.max(0, 1 - stretch * 1.5));
        const lineCol = (Math.min(255, Math.round(stretch * 3 * 255)) << 16) | (gr << 8) | rb;
        s.lineGfx.lineStyle(thick, lineCol || SERPENT_COLOR, alpha);
        s.lineGfx.moveTo(a.x, a.y);
        s.lineGfx.lineTo(b.x, b.y);
      }
    }
  }
}

// ================================================================
// IA DE ENEMIGOS ESPECIALES
// ================================================================
function enemyAI(now) {
  if (!player || !player.alive) return;
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.alive || e.type !== TYPE.ENEMY) continue;

    // ---- SPAWNER ----
    if (e.variant === 'enemy_spawner') {
      if (now - e.lastSpawn >= SPAWNER_SPAWN_INTERVAL_MS) {
        e.lastSpawn = now;

        // Onda expansiva triple muy visible
        spawnSpawnerPulse(e.x, e.y);

        // Parpadeo intenso del propio spawner
        if (e.gfx) {
          let blink = 0;
          const blinkInterval = setInterval(() => {
            if (!e.gfx) { clearInterval(blinkInterval); return; }
            e.gfx.alpha = blink % 2 === 0 ? 0.2 : 1.0;
            blink++;
            if (blink > 5) { e.gfx.alpha = 1; clearInterval(blinkInterval); }
          }, 80);
        }

        // Spawn del enemigo en desfase para que coincida con la onda
        setTimeout(() => {
          const angle = Math.random() * Math.PI * 2;
          const dist  = 40 + Math.random() * 25;
          const sx = Math.max(30, Math.min(WW()-30, e.x + Math.cos(angle) * dist));
          const sy = Math.max(30, Math.min(WH()-30, e.y + Math.sin(angle) * dist));
          spawnEnemy(SPAWNER_SPAWN_VARIANT, sx, sy);
        }, 150);
      }

      // Pulso de escala continuo
      if (e.gfx) {
        const sc = 1 + 0.07 * Math.sin(now / 380 + e.id);
        e.gfx.scale.set(sc);
      }

      // Espera 4s antes de atacar — da tiempo al jugador a reaccionar
      if (!e._spawnTime) e._spawnTime = now;
      if (now - e._spawnTime < 4000) {
        // Deriva suave aleatoria durante los primeros 4 segundos
        if (!e._roamAngle) e._roamAngle = Math.random() * Math.PI * 2;
        if (!e._roamNext || now > e._roamNext) {
          e._roamAngle += (Math.random() - 0.5) * 1.5;
          e._roamNext = now + 700 + Math.random() * 600;
        }
        e.vx += Math.cos(e._roamAngle) * 0.04;
        e.vy += Math.sin(e._roamAngle) * 0.04;
        e.vx *= 0.97; e.vy *= 0.97;
        e.sleeping = false; e.sleepN = 0;
      } else {
        // Perseguir jugador
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        e.vx += (dx/dist) * 0.12;
        e.vy += (dy/dist) * 0.12;
        e.vx *= 0.94; e.vy *= 0.94;
        e.sleeping = false; e.sleepN = 0;
      }
    }

    // ---- FOLLOWER ----
    if (e.variant === 'enemy_follower') {
      if (!e._spawnTime) e._spawnTime = now;
      const followerReady = (now - e._spawnTime) >= 4000;
      if (followerReady && now - e.lastImpulse >= FOLLOWER_IMPULSE_INTERVAL_MS) {
        e.lastImpulse = now;
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = dx/dist, ny = dy/dist;
        // Frena velocidad previa casi del todo, luego lanza directo al player
        e.vx = e.vx * FOLLOWER_BRAKE_FACTOR + nx * FOLLOWER_IMPULSE_SPEED;
        e.vy = e.vy * FOLLOWER_BRAKE_FACTOR + ny * FOLLOWER_IMPULSE_SPEED;
        e.sleeping = false; e.sleepN = 0;
        spawnImpulseFlash(e.x, e.y);
      }
      if (e.gfx) e.gfx.alpha = 0.65 + 0.35 * Math.sin(now / 250 + e.id);
    }

    // ---- BASIC / HEAVY / BOSS: timer drift ----
    if (e.variant === 'enemy_basic' || e.variant === 'enemy_heavy' || e.variant === 'enemy_boss') {
      if (!e._spawnTime) e._spawnTime = now;
      // Drift activates after 5s or when hit by a bullet (_hitActivated set in collision)
      const driftActive = e._hitActivated || (now - e._spawnTime >= 5000);
      if (driftActive) {
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        // Slow drift: gentle constant acceleration toward player
        const driftAcc = e.variant === 'enemy_boss' ? 0.025
                       : e.variant === 'enemy_heavy' ? 0.032 : 0.04;
        e.vx += (dx/dist) * driftAcc;
        e.vy += (dy/dist) * driftAcc;
        e.vx *= 0.97; e.vy *= 0.97;  // light damping so they don't overspeed
        e.sleeping = false; e.sleepN = 0;
      }
    }

    // ---- BLACKHOLE ----
    if (e.variant === 'enemy_blackhole') {
      // Deriva lenta y suave — no persigue al jugador ni va al centro
      // Si hay otro blackhole cerca, orbitan uno alrededor del otro
      const others = pool.filter(o => o.alive && o !== e && o.variant === 'enemy_blackhole');
      if (others.length > 0) {
        // Atracción gravitatoria mutua → órbita
        for (const o of others) {
          const dx = o.x - e.x, dy = o.y - e.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          // Fuerza centrípeta suave
          const f = BLACKHOLE_ORBIT_SPEED * 0.8 / Math.max(dist, 60);
          e.vx += (dx / dist) * f;
          e.vy += (dy / dist) * f;
          // Añadir componente perpendicular para que orbiten en lugar de chocar
          e.vx += (-dy / dist) * f * 0.6;
          e.vy += ( dx / dist) * f * 0.6;
        }
      } else {
        // Deriva suave: pequeña aceleración aleatoria cada cierto tiempo
        if (!e._driftAngle) { e._driftAngle = Math.random() * Math.PI * 2; e._driftNext = now; }
        if (now > e._driftNext) {
          e._driftAngle += (Math.random() - 0.5) * 1.2;
          e._driftNext = now + 2000 + Math.random() * 3000;
        }
        e.vx += Math.cos(e._driftAngle) * BLACKHOLE_DRIFT_ACCEL;
        e.vy += Math.sin(e._driftAngle) * BLACKHOLE_DRIFT_ACCEL;
      }
      // Repulsión suave de bordes — evita que se atasque en esquinas
      const edgeMargin = 120;
      if (e.x < edgeMargin)        e.vx += (edgeMargin - e.x) * 0.003;
      if (e.x > WW() - edgeMargin)  e.vx -= (e.x - (WW() - edgeMargin)) * 0.003;
      if (e.y < edgeMargin)        e.vy += (edgeMargin - e.y) * 0.003;
      if (e.y > WH() - edgeMargin)  e.vy -= (e.y - (WH() - edgeMargin)) * 0.003;
      e.vx *= 0.992; e.vy *= 0.992;
      e.sleeping = false; e.sleepN = 0;

      // Radio y fuerza crecen con masa absorbida (almacenada en e._massAbsorbed)
      if (!e._massAbsorbed) e._massAbsorbed = 0;
      const bhRadius = BLACKHOLE_BASE_RADIUS + e._massAbsorbed * BLACKHOLE_RADIUS_PER_MASS;

      // El efecto visual de malla deformada se dibuja en drawWarpGrid() (global)
      // Solo dibujamos el pequeño halo de núcleo en un gfx propio
      if (!e._ringGfx) {
        e._ringGfx = new PIXI.Graphics();
        worldContainer.addChild(e._ringGfx);
      }
      e._ringGfx.clear();
      // Halo tenue — el efecto principal lo hace la malla deformada
      e._ringGfx.lineStyle(1, 0xff9900, 0.22);
      e._ringGfx.drawCircle(e.x, e.y, (e._visualSize ?? BLACKHOLE_SIZE) * 1.35);
      e._ringGfx.lineStyle(0.5, 0x6600aa, 0.12);
      e._ringGfx.drawCircle(e.x, e.y, (e._visualSize ?? BLACKHOLE_SIZE) * 2.0);
      // Tamaño visual con interpolación suave hacia _targetSize
      if (!e._visualSize) e._visualSize = BLACKHOLE_SIZE;
      if (!e._targetSize) e._targetSize = BLACKHOLE_SIZE;
      e._visualSize += (e._targetSize - e._visualSize) * 0.03;  // lerp suave
      if (e.gfx) {
        const baseScale = e._visualSize / BLACKHOLE_SIZE;
        const pulse = 1 + 0.08 * Math.sin(now / 160);
        e.gfx.scale.set(baseScale * pulse);
      }
    }

    // ---- HITTER ----
    if (e.variant === 'enemy_hitter') {
      if (now - e.lastShot >= HITTER_SHOOT_INTERVAL_MS) {
        e.lastShot = now;
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = dx/dist, ny = dy/dist;
        const offset = Math.max(e.halfW, e.halfH) + ENEMY_BULLET_SIZE + 2;
        spawnBullet(e.x + nx*offset, e.y + ny*offset, nx*HITTER_BULLET_SPEED, ny*HITTER_BULLET_SPEED, null, true);
        e.vx -= nx * 1.5 * e.invMass;
        e.vy -= ny * 1.5 * e.invMass;
        e.sleeping = false; e.sleepN = 0;
        if (e.gfx) {
          e.gfx.tint = 0xffffff;
          setTimeout(()=>{ if(e.gfx) e.gfx.tint = 0xffffff; }, 100);
        }
      }
      if (e.gfx) e.gfx.rotation = (now / 2000) % (Math.PI * 2);
    }
  }
}

// ================================================================
// EFECTOS AMBIENTALES POR TIPO DE ENEMIGO
// ================================================================
// Cada tipo de enemigo emite partículas ambientales distintas.
// Se renderizan como PIXI.Graphics temporales igual que exhaust.
const ENEMY_FX_RATE = {
  enemy_basic:    400,   // ms entre partículas (más = menos frecuente)
  enemy_heavy:    220,
  enemy_boss:      80,
  enemy_spawner:  150,
  enemy_follower: 180,
  enemy_hitter:   200,
  enemy_blackhole: 60,
  enemy_serpent:  180,
};

const enemyParticles = [];

function emitEnemyFx(e, now) {
  const rate = ENEMY_FX_RATE[e.variant];
  if (!rate) return;
  if (!e._lastFx) e._lastFx = 0;
  if (now - e._lastFx < rate) return;
  e._lastFx = now;

  let col, sz, vx, vy, life, shape;

  switch (e.variant) {
    case 'enemy_basic':
      // Pequeñas chispas azules que caen
      col = 0x66aaff; sz = 1.5 + Math.random()*1.5;
      vx = (Math.random()-0.5)*0.8; vy = 0.3 + Math.random()*0.5;
      life = 500; shape = 'circle';
      break;

    case 'enemy_heavy':
      // Brasas naranja que flotan hacia arriba
      col = Math.random()>0.5 ? 0xff8800 : 0xffcc00;
      sz = 2 + Math.random()*2;
      vx = (Math.random()-0.5)*1.2; vy = -(0.8 + Math.random()*1.2);
      life = 600; shape = 'circle';
      break;

    case 'enemy_boss':
      // Partículas rojas grandes con drift angular
      col = Math.random()>0.4 ? 0xff2222 : 0xff8844;
      sz = 3 + Math.random()*3;
      const ang = Math.random()*Math.PI*2;
      vx = Math.cos(ang)*(0.5+Math.random()*1.5); vy = Math.sin(ang)*(0.5+Math.random()*1.5);
      life = 800; shape = Math.random()>0.5 ? 'circle' : 'rect';
      break;

    case 'enemy_spawner':
      // Chispas violeta que salen en arco
      col = Math.random()>0.5 ? 0xcc44ff : 0xff88ff;
      sz = 1.5 + Math.random()*2;
      const sa = -Math.PI*0.5 + (Math.random()-0.5)*Math.PI*0.8;
      vx = Math.cos(sa)*(1+Math.random()*2); vy = Math.sin(sa)*(1+Math.random()*2) - 0.5;
      life = 700; shape = 'circle';
      break;

    case 'enemy_follower':
      // Estela verde tenue que se disipa rápido
      col = 0x44ff88; sz = 1.5 + Math.random()*2;
      vx = -e.vx*0.15 + (Math.random()-0.5)*0.5;
      vy = -e.vy*0.15 + (Math.random()-0.5)*0.5;
      life = 300; shape = 'circle';
      break;

    case 'enemy_hitter':
      // Destellos rojos en forma de cruz que parpadean
      col = Math.random()>0.5 ? 0xff4466 : 0xffaaaa;
      sz = 2 + Math.random()*2;
      vx = (Math.random()-0.5)*0.6; vy = (Math.random()-0.5)*0.6;
      life = 400; shape = 'rect';
      break;

    case 'enemy_serpent':
      col = Math.random() > 0.5 ? 0x22ffaa : 0x00cc88;
      sz = 1.5 + Math.random()*2;
      vx = (Math.random()-0.5)*1.5; vy = (Math.random()-0.5)*1.5;
      life = 350; shape = 'circle';
      break;
      // Partículas violeta oscuro que espiralan hacia adentro
      col = Math.random()>0.5 ? 0xcc00ff : 0x440066;
      sz = 1.5 + Math.random()*2.5;
      { const a = Math.random()*Math.PI*2, r = 20+Math.random()*60;
        vx = -Math.sin(a)*1.2 - (Math.random()-0.5)*0.5;
        vy =  Math.cos(a)*1.2 - (Math.random()-0.5)*0.5; }
      life = 900; shape = 'circle';
      break;
  }

  const g = new PIXI.Graphics();
  if (shape === 'circle') {
    g.beginFill(col, 0.85); g.drawCircle(0,0,sz); g.endFill();
  } else {
    g.beginFill(col, 0.85); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill();
  }
  // Offset aleatorio desde el centro del sprite
  g.x = e.x + (Math.random()-0.5)*e.w*0.7;
  g.y = e.y + (Math.random()-0.5)*e.h*0.7;
  worldContainer.addChild(g);
  enemyParticles.push({ gfx:g, vx, vy, life, maxLife:life });
}

function updateEnemyParticles(dt) {
  for (let i = enemyParticles.length-1; i >= 0; i--) {
    const p = enemyParticles[i];
    p.life -= app.ticker.deltaMS;
    if (p.life <= 0) {
      worldContainer.removeChild(p.gfx); p.gfx.destroy();
      enemyParticles.splice(i,1); continue;
    }
    p.gfx.x += p.vx * dt;
    p.gfx.y += p.vy * dt;
    const t = p.life / p.maxLife;
    p.gfx.alpha = t * t;
    p.vx *= 0.94; p.vy *= 0.94;
  }
}

// Call from enemy AI loop — emit fx for each live enemy each frame
function emitAllEnemyFx(now) {
  for (let i=0; i<pool.length; i++) {
    const e = pool[i];
    if (e.alive && e.type === TYPE.ENEMY) emitEnemyFx(e, now);
  }
}

// ================================================================
// SPAWN BIRTH EFFECT
// ================================================================
const birthEffects = [];
function spawnBirthEffect(x, y, color, size) {
  const g = new PIXI.Graphics();
  worldContainer.addChild(g);
  birthEffects.push({ gfx:g, x, y, color, size, life:400, maxLife:400 });
}
function updateBirthEffects() {
  for (let i = birthEffects.length-1; i >= 0; i--) {
    const b = birthEffects[i];
    b.life -= app.ticker.deltaMS;
    if (b.life <= 0) {
      worldContainer.removeChild(b.gfx); b.gfx.destroy();
      birthEffects.splice(i, 1); continue;
    }
    const t = b.life / b.maxLife;   // 1→0
    const r = b.size * (1.0 + (1-t) * 2.5);
    b.gfx.clear();
    b.gfx.lineStyle(3 * t, b.color, t * 0.9);
    b.gfx.drawCircle(b.x, b.y, r);
    b.gfx.beginFill(b.color, t * t * 0.3);
    b.gfx.drawCircle(b.x, b.y, r * 0.55);
    b.gfx.endFill();
    if (t > 0.55) {
      const arm = r * 0.55 * ((t-0.55)/0.45);
      b.gfx.lineStyle(2, 0xffffff, ((t-0.55)/0.45) * 0.8);
      b.gfx.moveTo(b.x-arm, b.y); b.gfx.lineTo(b.x+arm, b.y);
      b.gfx.moveTo(b.x, b.y-arm); b.gfx.lineTo(b.x, b.y+arm);
    }
  }
}

// ================================================================
// LOCK-ON & MISSILE SYSTEM
// ================================================================
const lockTargets = [];
const missiles    = [];

// SVG overlay for lock-on reticles — lives in DOM, not PixiJS world
const lockSVG = document.createElementNS("http://www.w3.org/2000/svg","svg");
lockSVG.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;";
document.body.appendChild(lockSVG);

function makeLockReticle(x, y) {
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  const ring = document.createElementNS("http://www.w3.org/2000/svg","circle");
  ring.setAttribute("r","18"); ring.setAttribute("fill","none");
  ring.setAttribute("stroke","#ff4400"); ring.setAttribute("stroke-width","2.5");
  ring.setAttribute("stroke-dasharray","7 4");
  g.appendChild(ring);
  const corners = [[-1,-1],[1,-1],[1,1],[-1,1]];
  for (const [sx,sy] of corners) {
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    const bx=sx*14, by=sy*14;
    p.setAttribute("d",`M${bx},${by-sy*7} L${bx},${by} L${bx-sx*7},${by}`);
    p.setAttribute("fill","none"); p.setAttribute("stroke","#ff6600"); p.setAttribute("stroke-width","2");
    g.appendChild(p);
  }
  const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
  dot.setAttribute("r","3"); dot.setAttribute("fill","#ff4400"); dot.setAttribute("fill-opacity","0.85");
  g.appendChild(dot);
  lockSVG.appendChild(g);
  return g;
}

function updateLockReticles(now) {
  for (let i = lockTargets.length-1; i >= 0; i--) {
    const lt = lockTargets[i];
    if (!lt.entity || !lt.entity.alive) {
      lockSVG.removeChild(lt.gfx);
      lockTargets.splice(i, 1);
    }
  }
  const rot = (now / 700) * (180/Math.PI);
  for (const lt of lockTargets) {
    lt.gfx.setAttribute("transform",`translate(${lt.entity.x},${lt.entity.y}) rotate(${rot})`);
  }
}

function removeLockFor(entityId) {
  const idx = lockTargets.findIndex(lt => lt.entity.id === entityId);
  if (idx >= 0) { lockSVG.removeChild(lockTargets[idx].gfx); lockTargets.splice(idx,1); }
}

function clearAllLocks() {
  for (const lt of lockTargets) lockSVG.removeChild(lt.gfx);
  lockTargets.length = 0;
}

function addLockTarget() {
  if (!player || !player.alive) return;
  if (lockTargets.length >= LOCK_MAX) { clearAllLocks(); return; }
  const enemies = pool.filter(e => e.alive && e.type === TYPE.ENEMY);
  if (enemies.length === 0) return;
  const lockedIds = new Set(lockTargets.map(lt => lt.entity.id));
  let best = null, bestDist = Infinity;
  for (const e of enemies) {
    if (lockedIds.has(e.id)) continue;
    const dx=e.x-player.x, dy=e.y-player.y;
    const d=dx*dx+dy*dy;
    if (d < bestDist) { bestDist=d; best=e; }
  }
  if (!best) return;
  const g = makeLockReticle(best.x, best.y);
  lockTargets.push({ entity:best, gfx:g });
}

// Missile exhaust
const missileExhaust = [];
function emitMissileExhaust(m) {
  const g = new PIXI.Graphics();
  const col = Math.random()>0.5 ? 0xffaa00 : 0xff5500;
  const sz  = 2 + Math.random()*2.5;
  g.beginFill(col, 0.9); g.drawCircle(0,0,sz); g.endFill();
  g.x = m.x - Math.cos(m.angle)*MISSILE_SIZE*0.7 + (Math.random()-0.5)*4;
  g.y = m.y - Math.sin(m.angle)*MISSILE_SIZE*0.7 + (Math.random()-0.5)*4;
  worldContainer.addChild(g);
  missileExhaust.push({ gfx:g, life:280, maxLife:280, vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.6 });
}
function updateMissileExhaust(dt) {
  for (let i=missileExhaust.length-1; i>=0; i--) {
    const p=missileExhaust[i];
    p.life-=app.ticker.deltaMS;
    if (p.life<=0) { worldContainer.removeChild(p.gfx); p.gfx.destroy(); missileExhaust.splice(i,1); continue; }
    p.gfx.x+=p.vx*dt; p.gfx.y+=p.vy*dt;
    const t=p.life/p.maxLife; p.gfx.alpha=t*t; p.gfx.scale.set(t*0.8+0.2);
  }
}

function fireMissile() {
  if (!player || !player.alive || lockTargets.length === 0) return;
  const activeTgts = new Set(missiles.filter(m=>m.alive).map(m=>m.targetId));
  if (activeTgts.size >= LOCK_MAX) return;  // max missiles in flight
  const lock = lockTargets.find(lt => !activeTgts.has(lt.entity.id));
  if (!lock) return;

  const startAngle = Math.atan2(lock.entity.y-player.y, lock.entity.x-player.x);
  const g = new PIXI.Graphics();
  g.beginFill(MISSILE_COLOR);
  g.drawEllipse(0, 0, MISSILE_SIZE, MISSILE_SIZE*0.42);
  g.endFill();
  g.beginFill(0xffffff,0.7);
  g.drawEllipse(MISSILE_SIZE*0.25, 0, MISSILE_SIZE*0.3, MISSILE_SIZE*0.18);
  g.endFill();
  g.x=player.x; g.y=player.y; g.rotation=startAngle;
  worldContainer.addChild(g);

  missiles.push({
    alive:true, x:player.x, y:player.y,
    vx:Math.cos(startAngle)*MISSILE_SPEED,
    vy:Math.sin(startAngle)*MISSILE_SPEED,
    angle:startAngle,
    targetId:lock.entity.id,
    gfx:g,
    loopFrame:0,
    loopDir: Math.random()>0.5?1:-1,
    currentDamage:MISSILE_DAMAGE,
  });
}

function updateMissiles(dt, now) {
  for (let i=missiles.length-1; i>=0; i--) {
    const m=missiles[i];
    if (!m.alive) { missiles.splice(i,1); continue; }

    if (Math.random()>0.35) emitMissileExhaust(m);

    const target = pool.find(e=>e.alive && e.id===m.targetId);

    // Spiral-then-home: apply a decaying angular offset on top of homing turn.
    // The offset is a full rotation (2π) spread over MISSILE_LOOP_FRAMES,
    // decaying to 0 so the spiral tightens naturally into a straight homing path.
    const spiralStrength = Math.max(0, 1 - m.loopFrame / MISSILE_LOOP_FRAMES);
    const spiralDelta    = m.loopDir * (Math.PI * 2 / MISSILE_LOOP_FRAMES) * spiralStrength;
    if (m.loopFrame < MISSILE_LOOP_FRAMES) m.loopFrame++;

    if (target) {
      const dx=target.x-m.x, dy=target.y-m.y;
      const desired=Math.atan2(dy,dx);
      let diff=desired-m.angle;
      while(diff>Math.PI)  diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      // Homing turn + decaying spiral offset
      m.angle += Math.sign(diff)*Math.min(Math.abs(diff), MISSILE_TURN_RATE) + spiralDelta;
    } else {
      // Target dead: fly straight with fading spiral
      m.angle += spiralDelta;
    }
    m.vx=Math.cos(m.angle)*MISSILE_SPEED;
    m.vy=Math.sin(m.angle)*MISSILE_SPEED;

    m.x+=m.vx*dt; m.y+=m.vy*dt;
    if (m.gfx) { m.gfx.x=m.x; m.gfx.y=m.y; m.gfx.rotation=m.angle; }

    // Out of bounds
    if (m.x<-60||m.x>WW()+60||m.y<-60||m.y>WH()+60) {
      removeLockFor(m.targetId);
      if (m.gfx) { worldContainer.removeChild(m.gfx); m.gfx.destroy(); m.gfx=null; }
      missiles.splice(i,1); continue;
    }

    // Collision: missile vs enemies and walls (never player)
    const mR = MISSILE_SIZE;
    let hit=false;
    for (let j=0; j<pool.length; j++) {
      const e=pool[j];
      if (!e.alive || e.type===TYPE.PLAYER || e.type===TYPE.BULLET) continue;
      const dx=Math.abs(m.x-e.x), dy=Math.abs(m.y-e.y);
      if (dx>mR+e.halfW || dy>mR+e.halfH) continue;
      // Hit!
      spawnFragments(m.x, m.y, m.vx*2, m.vy*2, MISSILE_COLOR, 22);
      spawnSpawnerPulse(m.x, m.y);
      if (e.type===TYPE.ENEMY) {
        e.energy-=m.currentDamage; showEnergyBar(e,now);
        if (e.energy<=0){e.alive=false;onEnemyDeath(e, true);}
        const spd=Math.sqrt(m.vx*m.vx+m.vy*m.vy)||1;
        e.vx+=(m.vx/spd)*7*e.invMass; e.vy+=(m.vy/spd)*7*e.invMass;
        e.sleeping=false; e.sleepN=0;
      }
      removeLockFor(m.targetId);
      hit=true; break;
    }
    if (hit) {
      m.alive=false;
      if (m.gfx){worldContainer.removeChild(m.gfx);m.gfx.destroy();m.gfx=null;}
      missiles.splice(i,1);
    }
  }
}

const fragments  = [];
const exhaust    = [];
let   lastExhaust = 0;

function spawnFragments(x, y, bvx, bvy, color, count) {
  const n = count ?? (FRAG_COUNT_MIN + Math.floor(Math.random() * (FRAG_COUNT_MAX - FRAG_COUNT_MIN + 1)));
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = FRAG_SPEED_MIN + Math.random() * (FRAG_SPEED_MAX - FRAG_SPEED_MIN);
    const sz    = FRAG_SIZE_MIN + Math.random() * (FRAG_SIZE_MAX - FRAG_SIZE_MIN);
    const g = new PIXI.Graphics();
    // Mix: algunos cuadrados, algunos círculos para variedad
    if (Math.random() > 0.5) {
      g.beginFill(color); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill();
    } else {
      g.beginFill(color); g.drawCircle(0,0,sz*0.55); g.endFill();
    }
    // Partícula luminosa central
    if (Math.random() > 0.7) {
      g.beginFill(0xffffff, 0.8); g.drawCircle(0,0,sz*0.25); g.endFill();
    }
    g.x = x + (Math.random()-0.5)*6; g.y = y + (Math.random()-0.5)*6;
    worldContainer.addChild(g);
    fragments.push({
      gfx: g,
      vx: Math.cos(angle)*spd + bvx*0.2,
      vy: Math.sin(angle)*spd + bvy*0.2,
      x: g.x, y: g.y,
      life: FRAG_DURATION * (0.6 + Math.random()*0.8),
      maxLife: FRAG_DURATION,
      rotSpeed: (Math.random()-0.5)*0.3,
    });
  }
}

function updateFragments(dt) {
  for (let i = fragments.length - 1; i >= 0; i--) {
    const f = fragments[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      worldContainer.removeChild(f.gfx); f.gfx.destroy();
      fragments.splice(i, 1); continue;
    }
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.gfx.x = f.x; f.gfx.y = f.y;
    f.gfx.rotation += f.rotSpeed;
    const t = f.life / f.maxLife;
    f.gfx.alpha = t * t;
    f.vx *= 0.86; f.vy *= 0.86;
  }
}

function spawnExhaust(now) {
  if (!player || !player.alive) return;
  // Dirección del exhaust: opuesta a las teclas pulsadas (no a la velocidad)
  let ix = 0, iy = 0;
  if (keys["KeyW"]) iy -= 1;
  if (keys["KeyS"]) iy += 1;
  if (keys["KeyA"]) ix -= 1;
  if (keys["KeyD"]) ix += 1;
  if (ix === 0 && iy === 0) return;
  if (now - lastExhaust < EXHAUST_RATE_MS) return;
  lastExhaust = now;
  // Normalizar dirección de entrada → el exhaust sale en la dirección opuesta
  const ilen = Math.sqrt(ix*ix + iy*iy);
  const nx = ix/ilen, ny = iy/ilen;  // dirección de movimiento
  const ox = -nx*(player.halfW+2), oy = -ny*(player.halfH+2);
  const spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  const count = spd > 3 ? 6 : spd > 1.5 ? 4 : 2;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random()-0.5)*1.8;
    const evx = -nx*(3+Math.random()*4) + ny*spread*1.5;
    const evy = -ny*(3+Math.random()*4) - nx*spread*1.5;
    const g = new PIXI.Graphics();
    const hot = Math.random() > 0.4;
    const col = hot ? 0xffffff : (Math.random()>0.5 ? 0xffcc00 : 0xff6600);
    const sz = 2 + Math.random()*3.5;
    if (Math.random() > 0.4) { g.beginFill(col); g.drawCircle(0,0,sz*0.6); g.endFill(); }
    else { g.beginFill(col); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill(); }
    g.x = player.x + ox + (Math.random()-0.5)*4;
    g.y = player.y + oy + (Math.random()-0.5)*4;
    worldContainer.addChild(g);
    exhaust.push({ gfx:g, vx:evx, vy:evy, life:EXHAUST_DURATION, maxLife:EXHAUST_DURATION });
  }
}

function updateExhaust(dt) {
  for (let i = exhaust.length - 1; i >= 0; i--) {
    const f = exhaust[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      worldContainer.removeChild(f.gfx); f.gfx.destroy();
      exhaust.splice(i, 1); continue;
    }
    f.gfx.x += f.vx*dt; f.gfx.y += f.vy*dt;
    const t = f.life / f.maxLife;
    f.gfx.alpha = t * t;
    f.vx *= 0.92; f.vy *= 0.92;
  }
}

// ================================================================
// ENERGY BARS
// ================================================================
const energyBars = new Map();
const BAR_YOFF = 10;

function showEnergyBar(entity, now) {
  let bar = energyBars.get(entity.id);
  if (!bar) {
    const g = new PIXI.Graphics();
    worldContainer.addChild(g);
    bar = { entity, gfx:g };
    energyBars.set(entity.id, bar);
  }
  bar.expireAt = now + ENERGY_BAR_DURATION;
}

function updateEnergyBars(now) {
  for (const [id, bar] of energyBars) {
    const e = bar.entity;
    if (!e.alive || now >= bar.expireAt) {
      worldContainer.removeChild(bar.gfx); bar.gfx.destroy();
      energyBars.delete(id); continue;
    }
    const frac     = Math.max(0, e.energy / e.maxEnergy);
    const timeLeft = (bar.expireAt - now) / ENERGY_BAR_DURATION;
    const alpha    = timeLeft < 0.3 ? timeLeft/0.3 : 1.0;
    const bw       = Math.max(36, e.w);
    const g = bar.gfx; g.clear();
    g.beginFill(0x222222, 0.7*alpha);
    g.drawRect(e.x-bw/2, e.y+e.halfH+BAR_YOFF, bw, 4); g.endFill();
    const r = Math.round(255*(1-frac)), gv = Math.round(200*frac);
    g.beginFill((r<<16)|(gv<<8), alpha);
    g.drawRect(e.x-bw/2, e.y+e.halfH+BAR_YOFF, bw*frac, 4); g.endFill();
  }
}

// SYNC
