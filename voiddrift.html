<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Game Engine - Fases</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #hud {
      position: fixed; top: 8px; left: 12px;
      color: #fff; font: 14px monospace;
      pointer-events: none; z-index: 10; line-height: 1.6;
    }
    #phaseTimer {
      position: fixed; top: 8px; right: 18px;
      color: #fff; font: bold 48px monospace;
      pointer-events: none; z-index: 10;
      text-shadow: 0 0 16px #00ffcc, 0 0 4px #fff;
      letter-spacing: 2px;
    }
    #phaseLabel {
      position: fixed; top: 62px; right: 18px;
      color: #aaa; font: 13px monospace;
      pointer-events: none; z-index: 10;
      text-align: right;
    }
  </style>
</head>
<body>
<div id="hud">
  <span id="hFPS">cargando...</span><br>
  <span id="hInfo"></span>
</div>
<div id="phaseTimer">--</div>
<div id="phaseLabel">FASE --</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================================
// CONSTANTS - edita aqui para rebalancear el juego
// ================================================================
const TYPE = { ENEMY:"enemy", PLAYER:"player", WALL:"wall", BULLET:"bullet" };

// --- FASES ---
const PHASE_DURATION_MS   = 30000;   // duración de cada fase (ms)
const TOTAL_PHASES        = 5;

// Enemigos que se AÑADEN al inicio de cada fase (los anteriores permanecen)
const PHASE_ADD_ENEMIES = {
  1: { enemy_heavy: 5 },
  2: { enemy_heavy: 5, enemy_boss: 1 },
  3: { enemy_heavy: 5, enemy_boss: 1, enemy_spawner: 1 },
  4: { enemy_spawner: 2, enemy_follower: 5 },
  5: { enemy_hitter: 4 },
};

// --- BULLETS: desvanecimiento con distancia ---
// Las balas recorren MAX_BULLET_TRAVEL antes de desaparecer por completo.
// A partir de BULLET_FADE_START_FRAC (fracción de MAX_BULLET_TRAVEL)
// empiezan a perder daño, masa y alpha.
const BULLET_MAX_TRAVEL_FRAC  = 0.667;  // fracción del ancho de pantalla
const BULLET_FADE_START_FRAC  = 0.40;   // la bala empieza a debilitarse al 40% del recorrido
// Daño y masa mínimos al llegar al límite (0 = desaparece sin hacer nada)
const BULLET_MIN_DAMAGE_FRAC  = 0.0;    // fracción del daño base al final del recorrido
const BULLET_MIN_MASS_FRAC    = 0.1;

// --- SPAWNER ---
const SPAWNER_SPAWN_INTERVAL_MS = 20000;
const SPAWNER_SPAWN_VARIANT     = "enemy_heavy";
const SPAWNER_DEATH_RELEASE     = 3;
const SPAWNER_PULSE_RADIUS      = 110;   // radio máximo de la onda expansiva
const SPAWNER_PULSE_DURATION    = 600;   // ms de duración de la onda
const SPAWNER_PULSE_COUNT       = 3;     // ondas concéntricas por evento

// --- FOLLOWER ---
const FOLLOWER_IMPULSE_INTERVAL_MS = 5000;
const FOLLOWER_BRAKE_FACTOR        = 0.08;  // conserva poco de vel anterior
const FOLLOWER_IMPULSE_SPEED       = 9;

// --- HITTER ---
const HITTER_SHOOT_INTERVAL_MS  = 2500;
const HITTER_BULLET_SPEED       = 5;
const HITTER_BULLET_DAMAGE      = 2;

// --- ENERGÍA ---
const ENERGY = {
  enemy_basic:1, enemy_heavy:5, enemy_boss:15,
  enemy_spawner:12, enemy_follower:3, enemy_hitter:7,
  player:10, wall:Infinity
};

// --- DAÑO de enemigos al contacto ---
const ENEMY_DAMAGE = {
  enemy_basic:1, enemy_heavy:2, enemy_boss:5,
  enemy_spawner:1, enemy_follower:3, enemy_hitter:2
};

// --- SHIELD ---
const SHIELD_MAX_MS    = 3000;
const SHIELD_COOLDOWN  = 20000;   // recarga lenta
const SHIELD_MIN_TO_USE = 200;    // ms mínimos de carga para poder activar
const SHIELD_RADIUS    = 36;
const SHIELD_DAMAGE    = 3;
const SHIELD_HIT_CD    = 600;

// --- BALAS del jugador ---
const BULLET_DAMAGE = { normal:1, heavy:3, laser:6 };
const BULLET_SPEED  = { normal:10, heavy:7, laser:18 };
const BULLET_MASS   = { normal:0.3, heavy:1.5, laser:0.05 };
const BULLET_SIZE   = { normal:6,   heavy:12,  laser:4 };

// --- BALAS enemigas ---
const ENEMY_BULLET_COLOR  = 0xff3333;
const ENEMY_BULLET_SIZE   = 7;
const ENEMY_BULLET_MASS   = 0.3;
const ENEMY_BULLET_TRAVEL = 9999;  // balas enemigas no se desvanecen

// --- FRAGMENTOS de impacto ---
const FRAG_DURATION    = 500;
const FRAG_COUNT_MIN   = 10;   // partículas mínimas por impacto
const FRAG_COUNT_MAX   = 18;   // partículas máximas
const FRAG_SPEED_MIN   = 2.0;
const FRAG_SPEED_MAX   = 6.0;
const FRAG_SIZE_MIN    = 1.5;
const FRAG_SIZE_MAX    = 4.0;

// --- EXHAUST ---
const EXHAUST_DURATION = 280;
const EXHAUST_RATE_MS  = 30;
const ENERGY_BAR_DURATION    = 3000;
const PLAYER_HP_BAR_DURATION = 3000;

// --- FÍSICA ---
const RESTITUTION   = 0.75;
const FRICTION      = 0.08;
const SLEEP_THRESH  = 0.003;
const SLEEP_FRAMES  = 20;

// --- JUGADOR ---
const PLAYER_SPEED   = 4;
const PLAYER_ACCEL   = 0.025;
const PLAYER_DAMPING = 0.965;
const BULLET_CD_MS   = 220;
const HIT_CD_MS      = 1200;

// --- TAMAÑOS y COLORES ---
const ENEMY_SIZE = {
  enemy_basic:   [12, 12],
  enemy_heavy:   [22, 22],
  enemy_boss:    [36, 36],
  enemy_spawner: [38, 38],
  enemy_follower:[20, 20],
  enemy_hitter:  [22, 22],
};
const ENEMY_COLOR = {
  enemy_basic:   0x4488ff,
  enemy_heavy:   0xff8800,
  enemy_boss:    0xff2222,
  enemy_spawner: 0xaa44ff,
  enemy_follower:0x44ff88,
  enemy_hitter:  0xff4466,
};
const COLOR = {
  player:0x00ffcc, wall:0x5577aa,
  bullet_normal:0xffff33, bullet_heavy:0xff8833, bullet_laser:0x33ffff,
};

// ================================================================
// PIXI SETUP
// ================================================================
PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
const app = new PIXI.Application({
  width: window.innerWidth, height: window.innerHeight,
  backgroundColor: 0x111111,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
document.body.appendChild(app.view);

// ================================================================
// ENTITY
// ================================================================
let uid = 0;
function makeEntity(type, variant, x, y, w, h, vx, vy, mass, color) {
  return {
    id: uid++, type, variant, alive: true,
    energy: ENERGY[variant] ?? 1,
    maxEnergy: ENERGY[variant] ?? 1,
    x, y, vx, vy, w, h,
    halfW: w * 0.5, halfH: h * 0.5,
    mass, baseMass: mass,
    invMass: (mass === Infinity) ? 0 : 1 / mass,
    restitution: RESTITUTION, friction: FRICTION,
    sleepN: 0, sleeping: false,
    lastHit: 0, color, gfx: null,
    lastSpawn: 0,
    lastImpulse: 0,
    lastShot: 0,
    isEnemyBullet: false,
    // bullet travel tracking
    spawnX: x, spawnY: y,
    maxTravel: 9999,    // set properly in spawnBullet
    baseDamage: 1,      // set properly in spawnBullet
    currentDamage: 1,
  };
}

// ================================================================
// POOL
// ================================================================
const pool = [];

function buildEnemyGfx(e) {
  const g = new PIXI.Graphics();
  if (e.variant === 'enemy_spawner') {
    g.beginFill(e.color);
    const hw = e.halfW, hh = e.halfH;
    g.drawPolygon([hw,0, e.w,hh*0.5, e.w,hh*1.5, hw,e.h, 0,hh*1.5, 0,hh*0.5]);
    g.endFill();
    g.beginFill(0xdd88ff, 0.8);
    g.drawCircle(hw, hh, hw * 0.42);
    g.endFill();
    g.lineStyle(3, 0xee66ff, 1);
    g.drawCircle(hw, hh, hw - 2);
  } else if (e.variant === 'enemy_follower') {
    g.beginFill(e.color);
    const hw = e.halfW, hh = e.halfH;
    g.drawPolygon([hw,0, e.w,hh, hw,e.h, 0,hh]);
    g.endFill();
    g.lineStyle(2, 0xaaffcc, 0.9);
    g.drawPolygon([hw,3, e.w-3,hh, hw,e.h-3, 3,hh]);
  } else if (e.variant === 'enemy_hitter') {
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
    g.beginFill(0xffaaaa, 0.9);
    g.drawRect(e.halfW-2, 2, 4, e.h-4);
    g.drawRect(2, e.halfH-2, e.w-4, 4);
    g.endFill();
    g.lineStyle(2, 0xff0000, 0.8);
    g.drawCircle(e.halfW, e.halfH, e.halfW - 2);
  } else {
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
  }
  return g;
}

function addToPool(e) {
  let g;
  if (e.type === TYPE.ENEMY) {
    g = buildEnemyGfx(e);
  } else {
    g = new PIXI.Graphics();
    g.beginFill(e.color);
    g.drawRect(0, 0, e.w, e.h);
    g.endFill();
  }
  g.pivot.x = e.halfW; g.pivot.y = e.halfH;
  g.x = e.x; g.y = e.y;
  app.stage.addChild(g);
  e.gfx = g;
  pool.push(e);
  return e;
}

function purge() {
  for (let i = pool.length - 1; i >= 0; i--) {
    const e = pool[i];
    if (!e.alive) {
      if (e.gfx) { app.stage.removeChild(e.gfx); e.gfx.destroy(); e.gfx = null; }
      pool.splice(i, 1);
    }
  }
}

// ================================================================
// SPAWN HELPERS
// ================================================================
const W = () => app.screen.width;
const H = () => app.screen.height;

function spawnWall(x, y, w, h) {
  return addToPool(makeEntity(TYPE.WALL,"wall",x,y,w,h,0,0,Infinity,COLOR.wall));
}

function spawnEnemy(variant, x, y) {
  if (!variant) variant = 'enemy_basic';
  const [ew, eh] = ENEMY_SIZE[variant] ?? [12, 12];
  const col = ENEMY_COLOR[variant] ?? 0x888888;
  const sx = (x !== undefined) ? x : (20 + Math.random() * (W() * 0.35));
  const sy = (y !== undefined) ? y : (30 + Math.random() * (H() - 60));
  const e = addToPool(makeEntity(
    TYPE.ENEMY, variant, sx, sy, ew, eh,
    (Math.random() - 0.3) * 4,
    (Math.random() - 0.5) * 4,
    1, col
  ));
  // Spawn burst effect
  spawnBirthEffect(sx, sy, col, Math.max(ew, eh));
  return e;
}

function spawnPlayer() {
  return addToPool(makeEntity(TYPE.PLAYER,"player",W()*0.75,H()*0.5,20,20,0,0,2,COLOR.player));
}

function spawnBullet(x, y, vx, vy, btype, isEnemyBullet) {
  let col, mass, bs, baseDamage, maxTravel;
  if (isEnemyBullet) {
    col = ENEMY_BULLET_COLOR; mass = ENEMY_BULLET_MASS; bs = ENEMY_BULLET_SIZE;
    baseDamage = HITTER_BULLET_DAMAGE;
    maxTravel  = ENEMY_BULLET_TRAVEL;
    btype = "enemy";
  } else {
    col        = COLOR["bullet_" + btype] ?? 0xffff00;
    mass       = BULLET_MASS[btype] ?? 0.3;
    bs         = BULLET_SIZE[btype] ?? 6;
    baseDamage = BULLET_DAMAGE[btype] ?? 1;
    maxTravel  = W() * BULLET_MAX_TRAVEL_FRAC;
  }
  const e = makeEntity(TYPE.BULLET,"bullet_"+btype,x,y,bs,bs,vx,vy,mass,col);
  e.isEnemyBullet = !!isEnemyBullet;
  e.spawnX = x; e.spawnY = y;
  e.maxTravel = maxTravel;
  e.baseDamage = baseDamage;
  e.currentDamage = baseDamage;
  e.baseMass = mass;
  return addToPool(e);
}

// ================================================================
// BULLET TRAVEL & FADE
// ================================================================
function updateBulletFade() {
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.alive || e.type !== TYPE.BULLET || e.isEnemyBullet) continue;

    const dx = e.x - e.spawnX, dy = e.y - e.spawnY;
    const traveled = Math.sqrt(dx*dx + dy*dy);
    const maxT = e.maxTravel;

    if (traveled >= maxT) {
      e.alive = false;
      continue;
    }

    const t = traveled / maxT;               // 0→1
    const fadeStart = BULLET_FADE_START_FRAC;

    if (t > fadeStart) {
      const f = (t - fadeStart) / (1 - fadeStart); // 0→1 dentro de la zona de fade
      const strength = 1 - f;                       // 1→0

      // Daño actual interpolado
      e.currentDamage = e.baseDamage * (BULLET_MIN_DAMAGE_FRAC + strength * (1 - BULLET_MIN_DAMAGE_FRAC));

      // Masa actual (afecta al impulso físico)
      const newMass = e.baseMass * (BULLET_MIN_MASS_FRAC + strength * (1 - BULLET_MIN_MASS_FRAC));
      e.mass    = newMass;
      e.invMass = newMass > 0 ? 1 / newMass : 0;

      // Alpha visual
      if (e.gfx) e.gfx.alpha = Math.max(0.05, strength);

    } else {
      e.currentDamage = e.baseDamage;
      e.mass    = e.baseMass;
      e.invMass = e.baseMass > 0 ? 1 / e.baseMass : 0;
      if (e.gfx) e.gfx.alpha = 1;
    }
  }
}

// ================================================================
// EFECTOS VISUALES ESPECIALES
// ================================================================

// --- Ondas expansivas del spawner ---
const pulses = [];
function spawnSpawnerPulse(x, y) {
  for (let wave = 0; wave < SPAWNER_PULSE_COUNT; wave++) {
    const delay = wave * 90;  // cada onda desfasada 90ms
    setTimeout(() => {
      const g = new PIXI.Graphics();
      app.stage.addChild(g);
      pulses.push({
        gfx: g, x, y,
        life: SPAWNER_PULSE_DURATION,
        maxLife: SPAWNER_PULSE_DURATION,
        maxR: SPAWNER_PULSE_RADIUS * (0.5 + wave * 0.35),  // radios distintos
        color: wave % 2 === 0 ? 0xdd44ff : 0xff88ff,
        lineW: wave === 0 ? 3.5 : 2,
      });
    }, delay);
  }
}

function updatePulses() {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.life -= app.ticker.deltaMS;
    if (p.life <= 0) {
      app.stage.removeChild(p.gfx); p.gfx.destroy();
      pulses.splice(i, 1); continue;
    }
    const t = 1 - p.life / p.maxLife;  // 0→1 con el tiempo
    const r = p.maxR * t;
    const alpha = (1 - t) * 0.85;
    p.gfx.clear();
    p.gfx.lineStyle(p.lineW, p.color, alpha);
    p.gfx.drawCircle(p.x, p.y, r);
    // Relleno tenue
    p.gfx.beginFill(p.color, alpha * 0.12);
    p.gfx.drawCircle(p.x, p.y, r);
    p.gfx.endFill();
  }
}

// --- Flash de impulso del follower ---
const impulseFlashes = [];
function spawnImpulseFlash(x, y) {
  // Varias líneas radiales + círculo expansivo
  const g = new PIXI.Graphics();
  app.stage.addChild(g);
  impulseFlashes.push({ gfx:g, x, y, life:380, maxLife:380 });
}

function updateImpulseFlashes() {
  for (let i = impulseFlashes.length - 1; i >= 0; i--) {
    const f = impulseFlashes[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      app.stage.removeChild(f.gfx); f.gfx.destroy();
      impulseFlashes.splice(i, 1); continue;
    }
    const t = f.life / f.maxLife;   // 1→0
    const r = 36 * (1 - t);
    f.gfx.clear();
    // Círculo exterior
    f.gfx.lineStyle(2.5 + t * 2, 0x44ffaa, t * 0.9);
    f.gfx.drawCircle(f.x, f.y, r);
    f.gfx.beginFill(0x44ffaa, t * 0.18);
    f.gfx.drawCircle(f.x, f.y, r);
    f.gfx.endFill();
    // Líneas radiales
    const spokes = 6;
    f.gfx.lineStyle(1.5, 0xaaffcc, t * 0.7);
    for (let s = 0; s < spokes; s++) {
      const angle = (s / spokes) * Math.PI * 2;
      const innerR = r * 0.3;
      f.gfx.moveTo(f.x + Math.cos(angle)*innerR, f.y + Math.sin(angle)*innerR);
      f.gfx.lineTo(f.x + Math.cos(angle)*r,      f.y + Math.sin(angle)*r);
    }
  }
}

// ================================================================
// SISTEMA DE FASES
// ================================================================
let currentPhase   = 0;
let phaseStartTime = 0;
let phaseActive    = false;

const elPhaseTimer = document.getElementById("phaseTimer");
const elPhaseLabel = document.getElementById("phaseLabel");

function timerColor(s) {
  if (s > 15) return "#00ffcc";
  if (s > 8)  return "#ffcc00";
  return "#ff4444";
}

function startPhase(n, now) {
  currentPhase   = n;
  phaseStartTime = now;
  phaseActive    = true;
  const config = PHASE_ADD_ENEMIES[n] ?? {};
  for (const [variant, count] of Object.entries(config)) {
    for (let i = 0; i < count; i++) spawnEnemy(variant);
  }
  elPhaseLabel.textContent = "FASE " + n + " / " + TOTAL_PHASES;
}

function phaseUpdate(now) {
  if (!phaseActive) return;
  // Freeze timer while paused: shift phaseStartTime forward each paused frame
  if (paused) {
    phaseStartTime += app.ticker.deltaMS;
    return;
  }
  const remaining = Math.max(0, PHASE_DURATION_MS - (now - phaseStartTime));
  const secsLeft  = Math.ceil(remaining / 1000);
  elPhaseTimer.textContent = secsLeft;
  elPhaseTimer.style.color = timerColor(secsLeft);
  elPhaseTimer.style.textShadow = `0 0 16px ${timerColor(secsLeft)}, 0 0 4px #fff`;
  if (remaining <= 0) {
    if (currentPhase < TOTAL_PHASES) {
      startPhase(currentPhase + 1, now);
    } else {
      phaseActive = false;
      elPhaseTimer.textContent = "FIN";
      elPhaseTimer.style.color = "#ffcc00";
      elPhaseLabel.textContent = "¡COMPLETADO!";
    }
  }
}

// ================================================================
// IA DE ENEMIGOS ESPECIALES
// ================================================================
function enemyAI(now) {
  if (!player || !player.alive) return;
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.alive || e.type !== TYPE.ENEMY) continue;

    // ---- SPAWNER ----
    if (e.variant === 'enemy_spawner') {
      if (now - e.lastSpawn >= SPAWNER_SPAWN_INTERVAL_MS) {
        e.lastSpawn = now;

        // Onda expansiva triple muy visible
        spawnSpawnerPulse(e.x, e.y);

        // Parpadeo intenso del propio spawner
        if (e.gfx) {
          let blink = 0;
          const blinkInterval = setInterval(() => {
            if (!e.gfx) { clearInterval(blinkInterval); return; }
            e.gfx.alpha = blink % 2 === 0 ? 0.2 : 1.0;
            blink++;
            if (blink > 5) { e.gfx.alpha = 1; clearInterval(blinkInterval); }
          }, 80);
        }

        // Spawn del enemigo en desfase para que coincida con la onda
        setTimeout(() => {
          const angle = Math.random() * Math.PI * 2;
          const dist  = 40 + Math.random() * 25;
          const sx = Math.max(30, Math.min(W()-30, e.x + Math.cos(angle) * dist));
          const sy = Math.max(30, Math.min(H()-30, e.y + Math.sin(angle) * dist));
          spawnEnemy(SPAWNER_SPAWN_VARIANT, sx, sy);
        }, 150);
      }

      // Pulso de escala continuo
      if (e.gfx) {
        const sc = 1 + 0.07 * Math.sin(now / 380 + e.id);
        e.gfx.scale.set(sc);
      }

      // Deriva si se queda quieto
      if (Math.abs(e.vx) < 0.4 && Math.abs(e.vy) < 0.4) {
        e.vx = (Math.random()-0.5) * 1.8;
        e.vy = (Math.random()-0.5) * 1.8;
        e.sleeping = false; e.sleepN = 0;
      }
    }

    // ---- FOLLOWER ----
    if (e.variant === 'enemy_follower') {
      if (now - e.lastImpulse >= FOLLOWER_IMPULSE_INTERVAL_MS) {
        e.lastImpulse = now;
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = dx/dist, ny = dy/dist;
        // Frena velocidad previa casi del todo, luego lanza directo al player
        e.vx = e.vx * FOLLOWER_BRAKE_FACTOR + nx * FOLLOWER_IMPULSE_SPEED;
        e.vy = e.vy * FOLLOWER_BRAKE_FACTOR + ny * FOLLOWER_IMPULSE_SPEED;
        e.sleeping = false; e.sleepN = 0;
        spawnImpulseFlash(e.x, e.y);
      }
      if (e.gfx) e.gfx.alpha = 0.65 + 0.35 * Math.sin(now / 250 + e.id);
    }

    // ---- HITTER ----
    if (e.variant === 'enemy_hitter') {
      if (now - e.lastShot >= HITTER_SHOOT_INTERVAL_MS) {
        e.lastShot = now;
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = dx/dist, ny = dy/dist;
        const offset = Math.max(e.halfW, e.halfH) + ENEMY_BULLET_SIZE + 2;
        spawnBullet(e.x + nx*offset, e.y + ny*offset, nx*HITTER_BULLET_SPEED, ny*HITTER_BULLET_SPEED, null, true);
        e.vx -= nx * 1.5 * e.invMass;
        e.vy -= ny * 1.5 * e.invMass;
        e.sleeping = false; e.sleepN = 0;
        if (e.gfx) {
          e.gfx.tint = 0xffffff;
          setTimeout(()=>{ if(e.gfx) e.gfx.tint = 0xffffff; }, 100);
        }
      }
      if (e.gfx) e.gfx.rotation = (now / 2000) % (Math.PI * 2);
    }
  }
}

// ================================================================
// EFECTOS AMBIENTALES POR TIPO DE ENEMIGO
// ================================================================
// Cada tipo de enemigo emite partículas ambientales distintas.
// Se renderizan como PIXI.Graphics temporales igual que exhaust.
const ENEMY_FX_RATE = {
  enemy_basic:    400,   // ms entre partículas (más = menos frecuente)
  enemy_heavy:    220,
  enemy_boss:      80,
  enemy_spawner:  150,
  enemy_follower: 180,
  enemy_hitter:   200,
};

const enemyParticles = [];

function emitEnemyFx(e, now) {
  const rate = ENEMY_FX_RATE[e.variant];
  if (!rate) return;
  if (!e._lastFx) e._lastFx = 0;
  if (now - e._lastFx < rate) return;
  e._lastFx = now;

  let col, sz, vx, vy, life, shape;

  switch (e.variant) {
    case 'enemy_basic':
      // Pequeñas chispas azules que caen
      col = 0x66aaff; sz = 1.5 + Math.random()*1.5;
      vx = (Math.random()-0.5)*0.8; vy = 0.3 + Math.random()*0.5;
      life = 500; shape = 'circle';
      break;

    case 'enemy_heavy':
      // Brasas naranja que flotan hacia arriba
      col = Math.random()>0.5 ? 0xff8800 : 0xffcc00;
      sz = 2 + Math.random()*2;
      vx = (Math.random()-0.5)*1.2; vy = -(0.8 + Math.random()*1.2);
      life = 600; shape = 'circle';
      break;

    case 'enemy_boss':
      // Partículas rojas grandes con drift angular
      col = Math.random()>0.4 ? 0xff2222 : 0xff8844;
      sz = 3 + Math.random()*3;
      const ang = Math.random()*Math.PI*2;
      vx = Math.cos(ang)*(0.5+Math.random()*1.5); vy = Math.sin(ang)*(0.5+Math.random()*1.5);
      life = 800; shape = Math.random()>0.5 ? 'circle' : 'rect';
      break;

    case 'enemy_spawner':
      // Chispas violeta que salen en arco
      col = Math.random()>0.5 ? 0xcc44ff : 0xff88ff;
      sz = 1.5 + Math.random()*2;
      const sa = -Math.PI*0.5 + (Math.random()-0.5)*Math.PI*0.8;
      vx = Math.cos(sa)*(1+Math.random()*2); vy = Math.sin(sa)*(1+Math.random()*2) - 0.5;
      life = 700; shape = 'circle';
      break;

    case 'enemy_follower':
      // Estela verde tenue que se disipa rápido
      col = 0x44ff88; sz = 1.5 + Math.random()*2;
      vx = -e.vx*0.15 + (Math.random()-0.5)*0.5;
      vy = -e.vy*0.15 + (Math.random()-0.5)*0.5;
      life = 300; shape = 'circle';
      break;

    case 'enemy_hitter':
      // Destellos rojos en forma de cruz que parpadean
      col = Math.random()>0.5 ? 0xff4466 : 0xffaaaa;
      sz = 2 + Math.random()*2;
      vx = (Math.random()-0.5)*0.6; vy = (Math.random()-0.5)*0.6;
      life = 400; shape = 'rect';
      break;
  }

  const g = new PIXI.Graphics();
  if (shape === 'circle') {
    g.beginFill(col, 0.85); g.drawCircle(0,0,sz); g.endFill();
  } else {
    g.beginFill(col, 0.85); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill();
  }
  // Offset aleatorio desde el centro del sprite
  g.x = e.x + (Math.random()-0.5)*e.w*0.7;
  g.y = e.y + (Math.random()-0.5)*e.h*0.7;
  app.stage.addChild(g);
  enemyParticles.push({ gfx:g, vx, vy, life, maxLife:life });
}

function updateEnemyParticles(dt) {
  for (let i = enemyParticles.length-1; i >= 0; i--) {
    const p = enemyParticles[i];
    p.life -= app.ticker.deltaMS;
    if (p.life <= 0) {
      app.stage.removeChild(p.gfx); p.gfx.destroy();
      enemyParticles.splice(i,1); continue;
    }
    p.gfx.x += p.vx * dt;
    p.gfx.y += p.vy * dt;
    const t = p.life / p.maxLife;
    p.gfx.alpha = t * t;
    p.vx *= 0.94; p.vy *= 0.94;
  }
}

// Call from enemy AI loop — emit fx for each live enemy each frame
function emitAllEnemyFx(now) {
  for (let i=0; i<pool.length; i++) {
    const e = pool[i];
    if (e.alive && e.type === TYPE.ENEMY) emitEnemyFx(e, now);
  }
}

}

// ================================================================
// LOCK-ON & MISSILE SYSTEM
// ================================================================
const LOCK_MAX             = 5;
const MISSILE_DAMAGE       = 8;
const MISSILE_SPEED        = 4;
const MISSILE_TURN_RATE    = 0.07;   // max turn per frame during homing
const MISSILE_LOOP_FRAMES  = 80;     // frames over which spiral decays (1 full loop)
const MISSILE_SIZE         = 8;
const MISSILE_COLOR        = 0xff8833;

const lockTargets = [];
const missiles    = [];

// SVG overlay for lock-on reticles — lives in DOM, not PixiJS world
const lockSVG = document.createElementNS("http://www.w3.org/2000/svg","svg");
lockSVG.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;";
document.body.appendChild(lockSVG);

function makeLockReticle(x, y) {
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  const ring = document.createElementNS("http://www.w3.org/2000/svg","circle");
  ring.setAttribute("r","18"); ring.setAttribute("fill","none");
  ring.setAttribute("stroke","#ff4400"); ring.setAttribute("stroke-width","2.5");
  ring.setAttribute("stroke-dasharray","7 4");
  g.appendChild(ring);
  const corners = [[-1,-1],[1,-1],[1,1],[-1,1]];
  for (const [sx,sy] of corners) {
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    const bx=sx*14, by=sy*14;
    p.setAttribute("d",`M${bx},${by-sy*7} L${bx},${by} L${bx-sx*7},${by}`);
    p.setAttribute("fill","none"); p.setAttribute("stroke","#ff6600"); p.setAttribute("stroke-width","2");
    g.appendChild(p);
  }
  const dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
  dot.setAttribute("r","3"); dot.setAttribute("fill","#ff4400"); dot.setAttribute("fill-opacity","0.85");
  g.appendChild(dot);
  lockSVG.appendChild(g);
  return g;
}

function updateLockReticles(now) {
  for (let i = lockTargets.length-1; i >= 0; i--) {
    const lt = lockTargets[i];
    if (!lt.entity || !lt.entity.alive) {
      lockSVG.removeChild(lt.gfx);
      lockTargets.splice(i, 1);
    }
  }
  const rot = (now / 700) * (180/Math.PI);
  for (const lt of lockTargets) {
    lt.gfx.setAttribute("transform",`translate(${lt.entity.x},${lt.entity.y}) rotate(${rot})`);
  }
}

function removeLockFor(entityId) {
  const idx = lockTargets.findIndex(lt => lt.entity.id === entityId);
  if (idx >= 0) { lockSVG.removeChild(lockTargets[idx].gfx); lockTargets.splice(idx,1); }
}

function clearAllLocks() {
  for (const lt of lockTargets) lockSVG.removeChild(lt.gfx);
  lockTargets.length = 0;
}

function addLockTarget() {
  if (!player || !player.alive) return;
  if (lockTargets.length >= LOCK_MAX) { clearAllLocks(); return; }
  const enemies = pool.filter(e => e.alive && e.type === TYPE.ENEMY);
  if (enemies.length === 0) return;
  const lockedIds = new Set(lockTargets.map(lt => lt.entity.id));
  let best = null, bestDist = Infinity;
  for (const e of enemies) {
    if (lockedIds.has(e.id)) continue;
    const dx=e.x-player.x, dy=e.y-player.y;
    const d=dx*dx+dy*dy;
    if (d < bestDist) { bestDist=d; best=e; }
  }
  if (!best) return;
  const g = makeLockReticle(best.x, best.y);
  lockTargets.push({ entity:best, gfx:g });
}

// Missile exhaust
const missileExhaust = [];
function emitMissileExhaust(m) {
  const g = new PIXI.Graphics();
  const col = Math.random()>0.5 ? 0xffaa00 : 0xff5500;
  const sz  = 2 + Math.random()*2.5;
  g.beginFill(col, 0.9); g.drawCircle(0,0,sz); g.endFill();
  g.x = m.x - Math.cos(m.angle)*MISSILE_SIZE*0.7 + (Math.random()-0.5)*4;
  g.y = m.y - Math.sin(m.angle)*MISSILE_SIZE*0.7 + (Math.random()-0.5)*4;
  app.stage.addChild(g);
  missileExhaust.push({ gfx:g, life:280, maxLife:280, vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.6 });
}
function updateMissileExhaust(dt) {
  for (let i=missileExhaust.length-1; i>=0; i--) {
    const p=missileExhaust[i];
    p.life-=app.ticker.deltaMS;
    if (p.life<=0) { app.stage.removeChild(p.gfx); p.gfx.destroy(); missileExhaust.splice(i,1); continue; }
    p.gfx.x+=p.vx*dt; p.gfx.y+=p.vy*dt;
    const t=p.life/p.maxLife; p.gfx.alpha=t*t; p.gfx.scale.set(t*0.8+0.2);
  }
}

function fireMissile() {
  if (!player || !player.alive || lockTargets.length === 0) return;
  const activeTgts = new Set(missiles.filter(m=>m.alive).map(m=>m.targetId));
  if (activeTgts.size >= LOCK_MAX) return;  // max missiles in flight
  const lock = lockTargets.find(lt => !activeTgts.has(lt.entity.id));
  if (!lock) return;

  const startAngle = Math.atan2(lock.entity.y-player.y, lock.entity.x-player.x);
  const g = new PIXI.Graphics();
  g.beginFill(MISSILE_COLOR);
  g.drawEllipse(0, 0, MISSILE_SIZE, MISSILE_SIZE*0.42);
  g.endFill();
  g.beginFill(0xffffff,0.7);
  g.drawEllipse(MISSILE_SIZE*0.25, 0, MISSILE_SIZE*0.3, MISSILE_SIZE*0.18);
  g.endFill();
  g.x=player.x; g.y=player.y; g.rotation=startAngle;
  app.stage.addChild(g);

  missiles.push({
    alive:true, x:player.x, y:player.y,
    vx:Math.cos(startAngle)*MISSILE_SPEED,
    vy:Math.sin(startAngle)*MISSILE_SPEED,
    angle:startAngle,
    targetId:lock.entity.id,
    gfx:g,
    loopFrame:0,
    loopDir: Math.random()>0.5?1:-1,
    currentDamage:MISSILE_DAMAGE,
  });
}

function updateMissiles(dt, now) {
  for (let i=missiles.length-1; i>=0; i--) {
    const m=missiles[i];
    if (!m.alive) { missiles.splice(i,1); continue; }

    if (Math.random()>0.35) emitMissileExhaust(m);

    const target = pool.find(e=>e.alive && e.id===m.targetId);

    // Spiral-then-home: apply a decaying angular offset on top of homing turn.
    // The offset is a full rotation (2π) spread over MISSILE_LOOP_FRAMES,
    // decaying to 0 so the spiral tightens naturally into a straight homing path.
    const spiralStrength = Math.max(0, 1 - m.loopFrame / MISSILE_LOOP_FRAMES);
    const spiralDelta    = m.loopDir * (Math.PI * 2 / MISSILE_LOOP_FRAMES) * spiralStrength;
    if (m.loopFrame < MISSILE_LOOP_FRAMES) m.loopFrame++;

    if (target) {
      const dx=target.x-m.x, dy=target.y-m.y;
      const desired=Math.atan2(dy,dx);
      let diff=desired-m.angle;
      while(diff>Math.PI)  diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      // Homing turn + decaying spiral offset
      m.angle += Math.sign(diff)*Math.min(Math.abs(diff), MISSILE_TURN_RATE) + spiralDelta;
    } else {
      // Target dead: fly straight with fading spiral
      m.angle += spiralDelta;
    }
    m.vx=Math.cos(m.angle)*MISSILE_SPEED;
    m.vy=Math.sin(m.angle)*MISSILE_SPEED;

    m.x+=m.vx*dt; m.y+=m.vy*dt;
    if (m.gfx) { m.gfx.x=m.x; m.gfx.y=m.y; m.gfx.rotation=m.angle; }

    // Out of bounds
    if (m.x<-60||m.x>W()+60||m.y<-60||m.y>H()+60) {
      removeLockFor(m.targetId);
      if (m.gfx) { app.stage.removeChild(m.gfx); m.gfx.destroy(); m.gfx=null; }
      missiles.splice(i,1); continue;
    }

    // Collision: missile vs enemies and walls (never player)
    const mR = MISSILE_SIZE;
    let hit=false;
    for (let j=0; j<pool.length; j++) {
      const e=pool[j];
      if (!e.alive || e.type===TYPE.PLAYER || e.type===TYPE.BULLET) continue;
      const dx=Math.abs(m.x-e.x), dy=Math.abs(m.y-e.y);
      if (dx>mR+e.halfW || dy>mR+e.halfH) continue;
      // Hit!
      spawnFragments(m.x, m.y, m.vx*2, m.vy*2, MISSILE_COLOR, 22);
      spawnSpawnerPulse(m.x, m.y);
      if (e.type===TYPE.ENEMY) {
        e.energy-=m.currentDamage; showEnergyBar(e,now);
        if (e.energy<=0){e.alive=false;onEnemyDeath(e);score+=10;}
        const spd=Math.sqrt(m.vx*m.vx+m.vy*m.vy)||1;
        e.vx+=(m.vx/spd)*7*e.invMass; e.vy+=(m.vy/spd)*7*e.invMass;
        e.sleeping=false; e.sleepN=0;
      }
      removeLockFor(m.targetId);
      hit=true; break;
    }
    if (hit) {
      m.alive=false;
      if (m.gfx){app.stage.removeChild(m.gfx);m.gfx.destroy();m.gfx=null;}
      missiles.splice(i,1);
    }
  }
}

const fragments  = [];
const exhaust    = [];
let   lastExhaust = 0;

function spawnFragments(x, y, bvx, bvy, color, count) {
  const n = count ?? (FRAG_COUNT_MIN + Math.floor(Math.random() * (FRAG_COUNT_MAX - FRAG_COUNT_MIN + 1)));
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = FRAG_SPEED_MIN + Math.random() * (FRAG_SPEED_MAX - FRAG_SPEED_MIN);
    const sz    = FRAG_SIZE_MIN + Math.random() * (FRAG_SIZE_MAX - FRAG_SIZE_MIN);
    const g = new PIXI.Graphics();
    // Mix: algunos cuadrados, algunos círculos para variedad
    if (Math.random() > 0.5) {
      g.beginFill(color); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill();
    } else {
      g.beginFill(color); g.drawCircle(0,0,sz*0.55); g.endFill();
    }
    // Partícula luminosa central
    if (Math.random() > 0.7) {
      g.beginFill(0xffffff, 0.8); g.drawCircle(0,0,sz*0.25); g.endFill();
    }
    g.x = x + (Math.random()-0.5)*6; g.y = y + (Math.random()-0.5)*6;
    app.stage.addChild(g);
    fragments.push({
      gfx: g,
      vx: Math.cos(angle)*spd + bvx*0.2,
      vy: Math.sin(angle)*spd + bvy*0.2,
      x: g.x, y: g.y,
      life: FRAG_DURATION * (0.6 + Math.random()*0.8),
      maxLife: FRAG_DURATION,
      rotSpeed: (Math.random()-0.5)*0.3,
    });
  }
}

function updateFragments(dt) {
  for (let i = fragments.length - 1; i >= 0; i--) {
    const f = fragments[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      app.stage.removeChild(f.gfx); f.gfx.destroy();
      fragments.splice(i, 1); continue;
    }
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.gfx.x = f.x; f.gfx.y = f.y;
    f.gfx.rotation += f.rotSpeed;
    const t = f.life / f.maxLife;
    f.gfx.alpha = t * t;
    f.vx *= 0.86; f.vy *= 0.86;
  }
}

function spawnExhaust(now) {
  if (!player || !player.alive) return;
  const spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  if (spd < 0.4 || now - lastExhaust < EXHAUST_RATE_MS) return;
  lastExhaust = now;
  const nx = player.vx/spd, ny = player.vy/spd;
  const ox = -nx*(player.halfW+2), oy = -ny*(player.halfH+2);
  const count = spd > 3 ? 3 : spd > 1.5 ? 2 : 1;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random()-0.5)*1.8;
    const evx = -nx*(2+Math.random()*2) + ny*spread + player.vx*0.1;
    const evy = -ny*(2+Math.random()*2) - nx*spread + player.vy*0.1;
    const g = new PIXI.Graphics();
    const hot = Math.random() > 0.4;
    const col = hot ? 0xffffff : (Math.random()>0.5 ? 0xffcc00 : 0xff6600);
    const sz = 1 + Math.random()*1.5;
    g.beginFill(col); g.drawRect(-sz/2,-sz/2,sz,sz); g.endFill();
    g.x = player.x + ox + (Math.random()-0.5)*4;
    g.y = player.y + oy + (Math.random()-0.5)*4;
    app.stage.addChild(g);
    exhaust.push({ gfx:g, vx:evx, vy:evy, life:EXHAUST_DURATION, maxLife:EXHAUST_DURATION });
  }
}

function updateExhaust(dt) {
  for (let i = exhaust.length - 1; i >= 0; i--) {
    const f = exhaust[i];
    f.life -= app.ticker.deltaMS;
    if (f.life <= 0) {
      app.stage.removeChild(f.gfx); f.gfx.destroy();
      exhaust.splice(i, 1); continue;
    }
    f.gfx.x += f.vx*dt; f.gfx.y += f.vy*dt;
    const t = f.life / f.maxLife;
    f.gfx.alpha = t * t;
    f.vx *= 0.92; f.vy *= 0.92;
  }
}

// ================================================================
// ENERGY BARS
// ================================================================
const energyBars = new Map();
const BAR_YOFF = 10;

function showEnergyBar(entity, now) {
  let bar = energyBars.get(entity.id);
  if (!bar) {
    const g = new PIXI.Graphics();
    app.stage.addChild(g);
    bar = { entity, gfx:g };
    energyBars.set(entity.id, bar);
  }
  bar.expireAt = now + ENERGY_BAR_DURATION;
}

function updateEnergyBars(now) {
  for (const [id, bar] of energyBars) {
    const e = bar.entity;
    if (!e.alive || now >= bar.expireAt) {
      app.stage.removeChild(bar.gfx); bar.gfx.destroy();
      energyBars.delete(id); continue;
    }
    const frac     = Math.max(0, e.energy / e.maxEnergy);
    const timeLeft = (bar.expireAt - now) / ENERGY_BAR_DURATION;
    const alpha    = timeLeft < 0.3 ? timeLeft/0.3 : 1.0;
    const bw       = Math.max(36, e.w);
    const g = bar.gfx; g.clear();
    g.beginFill(0x222222, 0.7*alpha);
    g.drawRect(e.x-bw/2, e.y+e.halfH+BAR_YOFF, bw, 4); g.endFill();
    const r = Math.round(255*(1-frac)), gv = Math.round(200*frac);
    g.beginFill((r<<16)|(gv<<8), alpha);
    g.drawRect(e.x-bw/2, e.y+e.halfH+BAR_YOFF, bw*frac, 4); g.endFill();
  }
}

function syncGraphics() {

// ================================================================
// COLLISION LOGIC
// ================================================================
let score = 0;
let playerHPBarExpiry   = 0;
let shieldBarExpiry     = 0;
let shieldActive        = false;
let shieldUsedMs        = 0;
let shieldCooldownUntil = 0;
const shieldHitMap      = new Map();

function onEnemyDeath(enemy) {
  score += 10;
  if (enemy.variant === 'enemy_boss') {
    for (let i=0;i<4;i++) spawnEnemy('enemy_heavy',enemy.x+(Math.random()-.5)*30,enemy.y+(Math.random()-.5)*30);
  } else if (enemy.variant === 'enemy_heavy') {
    for (let i=0;i<2;i++) spawnEnemy('enemy_basic',enemy.x+(Math.random()-.5)*20,enemy.y+(Math.random()-.5)*20);
  } else if (enemy.variant === 'enemy_spawner') {
    spawnSpawnerPulse(enemy.x, enemy.y);
    setTimeout(()=> spawnSpawnerPulse(enemy.x, enemy.y), 180);
    for (let i=0;i<SPAWNER_DEATH_RELEASE;i++) spawnEnemy('enemy_heavy',enemy.x+(Math.random()-.5)*50,enemy.y+(Math.random()-.5)*50);
  }
}

function onCollision(a, b, ox, oy, now) {
  if (a.type === TYPE.BULLET || b.type === TYPE.BULLET) {
    const bullet = a.type===TYPE.BULLET ? a : b;
    const other  = a.type===TYPE.BULLET ? b : a;
    if (!bullet.alive) return;

    if (bullet.isEnemyBullet) {
      if (other.type === TYPE.WALL) { bullet.alive = false; return; }
      if (other.type === TYPE.PLAYER) {
        // Shield blocks enemy bullets — deflect and destroy
        if (shieldActive) {
          spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0x88ffff, 8);
          bullet.alive = false;
          return;
        }
        if (now - other.lastHit > HIT_CD_MS) {
          other.lastHit = now;
          other.energy -= bullet.currentDamage;
          if (other.energy <= 0) other.alive = false;
          playerHPBarExpiry = now + PLAYER_HP_BAR_DURATION;
          shieldBarExpiry   = now + PLAYER_HP_BAR_DURATION;
        }
        spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0xff4444);
        applyBulletImpulse(bullet, other);
        bullet.alive = false;
      }
      if (other.type === TYPE.ENEMY) { bullet.alive = false; }
      return;
    }

    // Bala del jugador
    if (other.type === TYPE.WALL) {
      spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0x888888, 5);
      bullet.alive = false; return;
    }
    if (other.type === TYPE.ENEMY) {
      other.energy -= bullet.currentDamage;
      if (other.energy <= 0) { other.alive = false; onEnemyDeath(other); }
      showEnergyBar(other, now);
      spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, ENEMY_COLOR[other.variant] ?? 0xffffff);
      applyBulletImpulse(bullet, other);
      bullet.alive = false; return;
    }
    bullet.alive = false; return;
  }

  if ((a.type===TYPE.ENEMY && b.type===TYPE.PLAYER)||
      (a.type===TYPE.PLAYER && b.type===TYPE.ENEMY)) {
    const pl    = a.type===TYPE.PLAYER ? a : b;
    const enemy = a.type===TYPE.ENEMY  ? a : b;
    // Shield absorbs melee contact too
    if (!shieldActive && now - pl.lastHit > HIT_CD_MS) {
      pl.lastHit = now;
      pl.energy -= ENEMY_DAMAGE[enemy.variant] ?? 1;
      if (pl.energy <= 0) pl.alive = false;
      playerHPBarExpiry = now + PLAYER_HP_BAR_DURATION;
      shieldBarExpiry   = now + PLAYER_HP_BAR_DURATION;
    }
  }
  applyImpulse(a, b, ox, oy);
}

function applyBulletImpulse(bullet, other) {
  const speed = Math.sqrt(bullet.vx*bullet.vx + bullet.vy*bullet.vy) || 1;
  const nx = bullet.vx/speed, ny = bullet.vy/speed;
  const dvx = other.vx-bullet.vx, dvy = other.vy-bullet.vy;
  const vn  = Math.min(dvx*nx+dvy*ny, -speed*0.5);
  const invSum = bullet.invMass + other.invMass;
  if (invSum === 0) return;
  other.sleeping = false; other.sleepN = 0;
  const j = -(1 + Math.min(bullet.restitution,other.restitution)) * vn / invSum;
  other.vx += j*nx*other.invMass; other.vy += j*ny*other.invMass;
}

function applyImpulse(a, b, ox, oy) {
  let nx=0, ny=0;
  if (ox < oy) nx = b.x>a.x ? 1:-1; else ny = b.y>a.y ? 1:-1;
  const dvx=b.vx-a.vx, dvy=b.vy-a.vy, vn=dvx*nx+dvy*ny;
  if (vn > 0) return;
  const invSum=a.invMass+b.invMass;
  if (invSum===0) return;
  a.sleeping=b.sleeping=false; a.sleepN=b.sleepN=0;
  const rest=Math.min(a.restitution,b.restitution);
  const j=-(1+rest)*vn/invSum;
  a.vx-=j*nx*a.invMass; a.vy-=j*ny*a.invMass;
  b.vx+=j*nx*b.invMass; b.vy+=j*ny*b.invMass;
  const tx=-ny,ty=nx,vt=dvx*tx+dvy*ty;
  const mu=Math.sqrt(a.friction*b.friction);
  const jt=Math.abs(vt)<j*mu?-vt/invSum:-j*mu*Math.sign(vt);
  a.vx+=jt*tx*a.invMass; a.vy+=jt*ty*a.invMass;
  b.vx-=jt*tx*b.invMass; b.vy-=jt*ty*b.invMass;
  const corr=Math.max(Math.min(ox,oy)-0.5,0)/invSum*0.4;
  a.x-=corr*nx*a.invMass; a.y-=corr*ny*a.invMass;
  b.x+=corr*nx*b.invMass; b.y+=corr*ny*b.invMass;
}

// ================================================================
// PHYSICS STEP
// ================================================================
function physicsStep(dt, now) {
  const sw=W(), sh=H();
  for (let i=0; i<pool.length; i++) {
    const e=pool[i];
    if (!e.alive||e.invMass===0||e.sleeping) continue;
    e.x+=e.vx*dt; e.y+=e.vy*dt;
    if (e.type===TYPE.BULLET) {
      if (e.x<-40||e.x>sw+40||e.y<-40||e.y>sh+40) e.alive=false;
      continue;
    }
    if (e.x-e.halfW<0)  {e.x=e.halfW;     e.vx= Math.abs(e.vx);}
    if (e.x+e.halfW>sw) {e.x=sw-e.halfW;  e.vx=-Math.abs(e.vx);}
    if (e.y-e.halfH<0)  {e.y=e.halfH;     e.vy= Math.abs(e.vy);}
    if (e.y+e.halfH>sh) {e.y=sh-e.halfH;  e.vy=-Math.abs(e.vy);}
    const v2=e.vx*e.vx+e.vy*e.vy;
    if (v2<SLEEP_THRESH) { if(++e.sleepN>SLEEP_FRAMES){e.vx=e.vy=0;e.sleeping=true;} }
    else { e.sleepN=0; }
  }
  // Shield force field — repels enemies and destroys incoming enemy bullets
  if (player && player.alive && shieldActive) {
    for (let i=0; i<pool.length; i++) {
      const e=pool[i];
      if (!e.alive) continue;

      // Intercept enemy bullets that enter shield radius
      if (e.type===TYPE.BULLET && e.isEnemyBullet) {
        const bdx=e.x-player.x, bdy=e.y-player.y;
        if (Math.sqrt(bdx*bdx+bdy*bdy) < SHIELD_RADIUS + e.halfW) {
          spawnFragments(e.x, e.y, e.vx, e.vy, 0x88ffff, 6);
          e.alive = false;
        }
        continue;
      }

      if (e.type!==TYPE.ENEMY) continue;
      const sdx=e.x-player.x, sdy=e.y-player.y;
      const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      const minD=SHIELD_RADIUS+Math.max(e.halfW,e.halfH);
      if (sdist<minD&&sdist>0.01) {
        const snx=sdx/sdist, sny=sdy/sdist;
        e.vx+=snx*8*e.invMass; e.vy+=sny*8*e.invMass;
        e.x+=snx*(minD-sdist); e.y+=sny*(minD-sdist);
        e.sleeping=false; e.sleepN=0;
        const lastSH=shieldHitMap.get(e.id)??0;
        if (now-lastSH>SHIELD_HIT_CD) {
          shieldHitMap.set(e.id,now);
          e.energy-=SHIELD_DAMAGE; showEnergyBar(e,now);
          if (e.energy<=0){e.alive=false;onEnemyDeath(e);}
        }
      }
    }
  }
  // Broadphase
  const alive=pool.filter(e=>e.alive);
  alive.sort((a,b)=>a.x-a.halfW-(b.x-b.halfW));
  for (let i=0; i<alive.length; i++) {
    const a=alive[i], aRight=a.x+a.halfW;
    for (let j=i+1; j<alive.length; j++) {
      const b=alive[j];
      if (b.x-b.halfW>aRight) break;
      const ox=(a.halfW+b.halfW)-Math.abs(b.x-a.x);
      const oy=(a.halfH+b.halfH)-Math.abs(b.y-a.y);
      if (ox<=0||oy<=0) continue;
      onCollision(a,b,ox,oy,now);
    }
  }
}

// ================================================================
// INPUT
// ================================================================
const keys  = {};
const mouse = { x:0, y:0, down:false };
let player = null, lastShot = 0, currentWeapon = "normal";
let gameOver = false, paused = false;

window.addEventListener("keydown", e => {
  if (e.code==="KeyP") { paused=!paused; elInfo.textContent=paused?"[PAUSA] - press P to continue":""; return; }
  if (e.code==="Digit1") { currentWeapon="normal"; return; }
  if (e.code==="Digit2") { currentWeapon="heavy";  return; }
  if (e.code==="Digit3") { currentWeapon="laser";  return; }
  if (e.code==="Space")  { keys["Space"]=true; return; }
  if (e.code==="KeyQ") { addLockTarget(); return; }
  if (e.code==="KeyE") { fireMissile(); return; }
  // Spawn manual de enemigos
  if (e.code==="KeyZ") { spawnEnemy("enemy_basic");   return; }
  if (e.code==="KeyX") { spawnEnemy("enemy_heavy");   return; }
  if (e.code==="KeyC") { spawnEnemy("enemy_boss");    return; }
  if (e.code==="KeyV") { spawnEnemy("enemy_spawner"); return; }
  if (e.code==="KeyB") { spawnEnemy("enemy_follower");return; }
  if (e.code==="KeyN") { spawnEnemy("enemy_hitter");  return; }
  keys[e.code]=true; e.preventDefault();
});
window.addEventListener("keyup",     e => { keys[e.code]=false; });
window.addEventListener("mousemove", e => { mouse.x=e.clientX; mouse.y=e.clientY; });
window.addEventListener("mousedown", e => { if(e.button===0) mouse.down=true;  });
window.addEventListener("mouseup",   e => { if(e.button===0) mouse.down=false; });

function inputUpdate(now) {
  if (!player||!player.alive) return;
  let tx=0, ty=0;
  const left=keys.KeyA||keys.ArrowLeft, right=keys.KeyD||keys.ArrowRight;
  const up=keys.KeyW||keys.ArrowUp,     down=keys.KeyS||keys.ArrowDown;
  if(left)  tx-=PLAYER_SPEED; if(right) tx+=PLAYER_SPEED;
  if(up)    ty-=PLAYER_SPEED; if(down)  ty+=PLAYER_SPEED;
  if(left||right||up||down){
    player.vx+=(tx-player.vx)*PLAYER_ACCEL;
    player.vy+=(ty-player.vy)*PLAYER_ACCEL;
  } else { player.vx*=PLAYER_DAMPING; player.vy*=PLAYER_DAMPING; }
  player.sleeping=false; player.sleepN=0;

  // --- SHIELD ---
  // - Se activa con SPACE siempre que haya carga Y no esté en cooldown (cooldown solo si se agota del todo).
  // - Soltar el escudo NO inicia cooldown. La carga se mantiene y se recarga pasado un momento.
  // - La carga se recupera automáticamente cuando el escudo NO está activo y NO está en cooldown,
  //   a razón de SHIELD_REGEN_MS por ms (inverso de SHIELD_COOLDOWN).
  // - El cooldown SOLO ocurre si la carga se agota por completo (shieldUsedMs >= SHIELD_MAX_MS).
  const spDown     = keys["Space"];
  const inCooldown = now < shieldCooldownUntil;
  const hasCharge  = shieldUsedMs < SHIELD_MAX_MS;

  if (spDown && hasCharge && !inCooldown) {
    shieldActive = true;
    shieldUsedMs = Math.min(SHIELD_MAX_MS, shieldUsedMs + app.ticker.deltaMS);
    shieldBarExpiry = now + 3500;
    if (shieldUsedMs >= SHIELD_MAX_MS) {
      shieldActive = false;
      shieldCooldownUntil = now + SHIELD_COOLDOWN;
      shieldBarExpiry = now + SHIELD_COOLDOWN + 500;
    }
  } else {
    shieldActive = false;
    // Fin de cooldown: resetear medidor
    if (!inCooldown && shieldUsedMs >= SHIELD_MAX_MS) {
      shieldUsedMs = 0;
    }
    // Regeneración pasiva: siempre que no esté en cooldown y haya algo gastado
    if (!inCooldown && shieldUsedMs > 0) {
      shieldUsedMs = Math.max(0, shieldUsedMs - app.ticker.deltaMS * (SHIELD_MAX_MS / SHIELD_COOLDOWN));
      shieldBarExpiry = now + 2000;
    }
  }

  const weaponCD = currentWeapon==="laser"?80:currentWeapon==="heavy"?450:BULLET_CD_MS;
  if (mouse.down && now-lastShot>=weaponCD) {
    lastShot=now;
    const dx=mouse.x-player.x, dy=mouse.y-player.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/len, ny=dy/len;
    const spd=BULLET_SPEED[currentWeapon]??BULLET_SPEED.normal;
    const offset=Math.max(player.halfW,player.halfH)+4;
    spawnBullet(player.x+nx*offset, player.y+ny*offset, nx*spd, ny*spd, currentWeapon, false);
  }
}

// ================================================================
// HUD
// ================================================================
const elFPS  = document.getElementById("hFPS");
const elInfo = document.getElementById("hInfo");
let hudMs = 0;

function hudUpdate(now) {
  hudMs += app.ticker.deltaMS;
  if (hudMs < 600) return;
  hudMs = 0;
  elFPS.textContent = "FPS: "+app.ticker.FPS.toFixed(0)+"  objs: "+pool.length;
  if (gameOver) {
    elInfo.textContent = "GAME OVER - reload to play again";
    elPhaseTimer.textContent="✕"; elPhaseTimer.style.color="#ff4444";
    return;
  }
  if (paused) return;
  if (player) {
    const wNames={normal:"1-Basic",heavy:"2-Heavy",laser:"3-Laser"};
    const wColors={normal:"#ffff33",heavy:"#ff8833",laser:"#33ffff"};
    const cdLeft = shieldCooldownUntil>now ? ((shieldCooldownUntil-now)/1000).toFixed(1) : null;
    const shieldInfo = shieldActive
      ? ' <span style="color:#88ffff">[SHIELD ACTIVE]</span>'
      : shieldUsedMs===0
        ? ' <span style="color:#88ffff">[SPACE: shield]</span>'
        : cdLeft
          ? ' <span style="color:#999">shield recharge: '+cdLeft+'s</span>'
          : ' <span style="color:#88ffff">[shield ready]</span>';
    elInfo.innerHTML = "score: "+score+
      '  weapon: <span style="color:'+wColors[currentWeapon]+'">'+wNames[currentWeapon]+'</span>'+
      shieldInfo+
      '  <span style="color:#888">Z/X/C/V/B/N: spawn</span>'+
      "   WASD-click-1/2/3-SPACE";
  }
}

// ================================================================
// GRÁFICOS
// ================================================================
const aimLine = new PIXI.Graphics();
app.stage.addChild(aimLine);

function drawAimLine() {
  aimLine.clear();
  if (!player||!player.alive||gameOver) return;
  const dx=mouse.x-player.x, dy=mouse.y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dx/dist, ny=dy/dist;
  const lineLen = Math.min(dist, 120);

  // Línea discontinua: segmentos alternados
  const dashLen = 8, gapLen = 6, total = dashLen + gapLen;
  let traveled = 14;  // arranca un poco más allá del sprite
  aimLine.lineStyle(1, 0xffffff, 0.55);
  while (traveled < lineLen) {
    const segEnd = Math.min(traveled + dashLen, lineLen);
    aimLine.moveTo(player.x + nx*traveled, player.y + ny*traveled);
    aimLine.lineTo(player.x + nx*segEnd,   player.y + ny*segEnd);
    traveled += total;
  }

  // Pequeño círculo en el cursor
  aimLine.lineStyle(1, 0xffffff, 0.55);
  aimLine.drawCircle(mouse.x, mouse.y, 5);
  // Cruz interior del cursor
  aimLine.moveTo(mouse.x-3, mouse.y); aimLine.lineTo(mouse.x+3, mouse.y);
  aimLine.moveTo(mouse.x, mouse.y-3); aimLine.lineTo(mouse.x, mouse.y+3);
}

const playerBarsGfx = new PIXI.Graphics();
app.stage.addChild(playerBarsGfx);

function drawPlayerBars(now) {
  playerBarsGfx.clear();
  if (!player||gameOver) return;
  const hpActive = now < playerHPBarExpiry;
  const shActive = now < shieldBarExpiry;
  if (!hpActive && !shActive) return;
  const longestT = Math.max(
    hpActive ? (playerHPBarExpiry - now) / PLAYER_HP_BAR_DURATION : 0,
    shActive ? (shieldBarExpiry   - now) / PLAYER_HP_BAR_DURATION : 0
  );
  const alpha = longestT < 0.25 ? longestT / 0.25 : 1.0;
  const BW=80, BH=6, GAP=3, bx=player.x-BW/2;
  const byHP=player.y-player.halfH-18, bySH=byHP+BH+GAP;

  // HP bar
  const hpFrac=Math.max(0,player.energy/player.maxEnergy);
  playerBarsGfx.beginFill(0x1a0000, 0.75*alpha);
  playerBarsGfx.drawRect(bx,byHP,BW,BH); playerBarsGfx.endFill();
  const hpR=Math.round(255*(1-hpFrac)), hpG=Math.round(255*hpFrac);
  playerBarsGfx.beginFill((hpR<<16)|(hpG<<8), alpha);
  playerBarsGfx.drawRect(bx,byHP,BW*hpFrac,BH); playerBarsGfx.endFill();
  playerBarsGfx.lineStyle(1,0xff6666,0.6*alpha);
  playerBarsGfx.drawRect(bx,byHP,BW,BH);

  // Shield bar
  const inCD = now < shieldCooldownUntil;
  let shFrac, shColor;
  if (inCD) {
    const elapsed = SHIELD_COOLDOWN - (shieldCooldownUntil - now);
    shFrac  = Math.max(0, Math.min(1, elapsed / SHIELD_COOLDOWN));
    shColor = 0x336699;
  } else {
    shFrac  = Math.max(0, 1 - shieldUsedMs / SHIELD_MAX_MS);
    shColor = shieldActive ? 0x00ffff : 0x0088ff;
  }
  playerBarsGfx.lineStyle(0);
  playerBarsGfx.beginFill(0x001a33, 0.75*alpha);
  playerBarsGfx.drawRect(bx,bySH,BW,BH); playerBarsGfx.endFill();
  playerBarsGfx.beginFill(shColor, alpha);
  playerBarsGfx.drawRect(bx,bySH,BW*shFrac,BH); playerBarsGfx.endFill();
  playerBarsGfx.lineStyle(1,0x44ccff,0.6*alpha);
  playerBarsGfx.drawRect(bx,bySH,BW,BH);
}

const shieldGfx = new PIXI.Graphics();
app.stage.addChild(shieldGfx);

function drawShield(now) {
  shieldGfx.clear();
  if (!player||!player.alive||!shieldActive) return;
  const pulse=0.18+0.12*Math.sin(now/80);
  shieldGfx.lineStyle(2,0x88ffff,0.85);
  shieldGfx.drawCircle(player.x,player.y,SHIELD_RADIUS);
  shieldGfx.beginFill(0x44aaff,pulse);
  shieldGfx.drawCircle(player.x,player.y,SHIELD_RADIUS);
  shieldGfx.endFill();
}

// ================================================================
// SETUP  —  paredes interiores generadas aleatoriamente
// ================================================================

// Parámetros para la generación aleatoria de paredes interiores
const WALL_COUNT_MIN  = 7;    // mínimo de paredes interiores
const WALL_COUNT_MAX  = 11;   // máximo de paredes interiores
const WALL_MIN_SHORT  = 12;   // lado corto mínimo (px)
const WALL_MAX_SHORT  = 20;   // lado corto máximo
const WALL_MIN_LONG   = 45;   // lado largo mínimo
const WALL_MAX_LONG   = 130;  // lado largo máximo
const WALL_MARGIN     = 60;   // distancia mínima a los bordes del escenario
const WALL_MIN_SEP    = 55;   // separación mínima entre centros de paredes

function randBetween(a, b) { return a + Math.random() * (b - a); }

function wallsOverlap(ax, ay, aw, ah, bx, by, bw, bh, margin) {
  // AABB con margen de seguridad
  return Math.abs(ax-bx) < (aw+bw)/2 + margin &&
         Math.abs(ay-by) < (ah+bh)/2 + margin;
}

function generateInteriorWalls(sw, sh) {
  const count   = WALL_COUNT_MIN + Math.floor(Math.random()*(WALL_COUNT_MAX - WALL_COUNT_MIN + 1));
  const placed  = [];  // { x, y, w, h }
  const maxTries = 200;

  for (let i = 0; i < count; i++) {
    let tries = 0;
    while (tries++ < maxTries) {
      // Orientación aleatoria: horizontal o vertical
      const horizontal = Math.random() > 0.5;
      const ww = horizontal
        ? randBetween(WALL_MIN_LONG,  WALL_MAX_LONG)
        : randBetween(WALL_MIN_SHORT, WALL_MAX_SHORT);
      const wh = horizontal
        ? randBetween(WALL_MIN_SHORT, WALL_MAX_SHORT)
        : randBetween(WALL_MIN_LONG,  WALL_MAX_LONG);

      const x = randBetween(WALL_MARGIN + ww/2, sw - WALL_MARGIN - ww/2);
      const y = randBetween(WALL_MARGIN + wh/2, sh - WALL_MARGIN - wh/2);

      // Verificar separación respecto a paredes ya colocadas
      const ok = placed.every(p => !wallsOverlap(x,y,ww,wh, p.x,p.y,p.w,p.h, WALL_MIN_SEP));
      if (ok) {
        placed.push({ x, y, w: ww, h: wh });
        break;
      }
    }
  }
  return placed;
}

function setup() {
  const sw=W(), sh=H(), WS=14;
  // Paredes perimetrales
  spawnWall(sw/2,    WS/2,    sw, WS);
  spawnWall(sw/2,    sh-WS/2, sw, WS);
  spawnWall(WS/2,    sh/2,    WS, sh);
  spawnWall(sw-WS/2, sh/2,    WS, sh);

  // Paredes interiores aleatorias
  const walls = generateInteriorWalls(sw, sh);
  for (const w of walls) spawnWall(w.x, w.y, w.w, w.h);

  player = spawnPlayer();
}

// ================================================================
// GAME LOOP
// ================================================================
let prevTime = null;
app.ticker.add(() => {
  const now = performance.now();
  if (prevTime===null) { prevTime=now; return; }
  const dt = Math.min((now-prevTime)/16.6667, 3);
  prevTime = now;

  if (currentPhase===0 && !gameOver) startPhase(1, now);

  phaseUpdate(now);
  if (!gameOver && !paused) {
    enemyAI(now);
    emitAllEnemyFx(now);
    inputUpdate(now);
    updateBulletFade();
    physicsStep(dt, now);
    purge();
    syncGraphics();
    updateEnergyBars(now);
    updateFragments(dt);
    updateEnemyParticles(dt);
    updateBirthEffects();
    updateMissiles(dt, now);
    updateMissileExhaust(dt);
    updateLockReticles(now);
    updatePulses();
    updateImpulseFlashes();
    spawnExhaust(now);
    updateExhaust(dt);
    drawShield(now);
    drawAimLine();
    drawPlayerBars(now);
    if (player && !player.alive) gameOver = true;
  }
  hudUpdate(now);
});

window.addEventListener("resize", () => { app.renderer.resize(window.innerWidth, window.innerHeight); });
setup();
