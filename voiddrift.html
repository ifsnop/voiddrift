function syncGraphics() {
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.gfx) continue;
    e.gfx.x = e.x; e.gfx.y = e.y;
    if (e.type === TYPE.PLAYER) {
      const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
      if (spd > 0.3) e.gfx.rotation = Math.atan2(e.vy, e.vx) - Math.PI * 0.5;
    }
  }
}

// ================================================================
// SCORE SYSTEM — animated counter + popups
// ================================================================
let displayedScore = 0;
let targetScore = 0;
let scoreAnimInterval = null;

const SCORE_MULTIPLIER = 50;  // points per mass unit (big numbers!)

function addScore(mass, ex, ey) {
  const pts = mass * SCORE_MULTIPLIER;
  targetScore += pts;
  // Start animating counter if not running
  if (!scoreAnimInterval) {
    scoreAnimInterval = setInterval(() => {
      if (displayedScore < targetScore) {
        const step = Math.max(1, Math.ceil((targetScore - displayedScore) / 8));
        displayedScore = Math.min(targetScore, displayedScore + step);
        document.getElementById('hScore').textContent = displayedScore;
      } else {
        clearInterval(scoreAnimInterval);
        scoreAnimInterval = null;
      }
    }, 16);
  }
  // Show floating popup at death position
  spawnScorePopup(ex, ey, pts);
}

function spawnScorePopup(x, y, pts, label) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = label || ('+' + pts);
  // Convert world coords to screen coords
  el.style.left = (x - cam.x) + 'px';
  el.style.top  = (y - cam.y - 20) + 'px';
  document.body.appendChild(el);
  let vy = -1.5, life = 1400, last = performance.now();
  function step(now) {
    const dt = now - last; last = now;
    life -= dt;
    if (life <= 0) { el.remove(); return; }
    const t = life / 1400;
    el.style.top = (parseFloat(el.style.top) + vy) + 'px';
    el.style.opacity = Math.min(1, t * 3);
    vy *= 0.97;
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}


let score = 0;
let playerHPBarExpiry   = 0;
let shieldBarExpiry     = 0;
let shieldActive        = false;
let shieldUsedMs        = 0;
const shieldHitMap = new Map();
let shieldPowerupActive = false;  // keeps shield on without Space key

// ================================================================
// POWERUP SYSTEM
// ================================================================
let killCount       = 0;
let nextPowerupAt   = 5;     // first powerup after 5 kills
const powerups      = [];    // active powerup pickups on the field
let missileAutoEnd  = 0;     // timestamp when missile powerup expires
let missileAutoLast = 0;     // last auto-missile fire time

// Progressive powerup levels (0-7, max 8 modes each)
let missileLevel    = 0;
let laserLevel      = 0;
let shieldLevel     = 0;
const MISSILE_CADENCE   = [5000, 4000, 3000, 2000, 1500, 1000, 500, 200]; // ms between shots per level
const SHIELD_BASE_MS    = 3000;   // base shield duration
const AUTOBEAM_BASE_RAD = AUTOBEAM_RADIUS; // store base (already scaled by MS)
const AUTOBEAM_BASE_DMG = AUTOBEAM_DAMAGE;

const POWERUP_TYPES = ['S','M','L','F'];
const POWERUP_COLORS = { S: 0x4488ff, M: 0xff8833, L: 0x44ffff, F: 0xffff33 };
const POWERUP_LABELS = { S: 'ESCUDO', M: 'MISILES', L: 'LÁSER', F: 'POTENCIA' };
const POWERUP_PICKUP_RADIUS = 35;

function spawnPowerup(spawnX, spawnY) {
  // Pick a random type
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  const col = POWERUP_COLORS[type];

  // Use provided position (dead enemy location)
  const px = spawnX, py = spawnY;

  // Create visual: glowing circle + letter
  const container = new PIXI.Container();
  container.x = px; container.y = py;

  const glow = new PIXI.Graphics();
  glow.beginFill(col, 0.15); glow.drawCircle(0, 0, 28); glow.endFill();
  glow.beginFill(col, 0.08); glow.drawCircle(0, 0, 42); glow.endFill();
  container.addChild(glow);

  const ring = new PIXI.Graphics();
  ring.lineStyle(2, col, 0.7);
  ring.drawCircle(0, 0, 22);
  container.addChild(ring);

  const txt = new PIXI.Text(type, {
    fontFamily: 'monospace', fontSize: 22, fontWeight: 'bold',
    fill: col, align: 'center',
  });
  txt.anchor.set(0.5, 0.5);
  container.addChild(txt);

  worldContainer.addChild(container);

  powerups.push({
    type, x: px, y: py, gfx: container, glow, ring,
    spawnTime: performance.now(),
  });
}

function applyPowerup(type) {
  if (type === 'S') {
    // Shield: recharge fully + increase max duration (up to 8 levels)
    shieldLevel = Math.min(7, shieldLevel + 1);
    SHIELD_MAX_MS = SHIELD_BASE_MS + shieldLevel * 1500; // 3s → 13.5s at max
    shieldUsedMs = 0;
    shieldActive = true;
    shieldPowerupActive = true;
    shieldBarExpiry = performance.now() + 60000;
  } else if (type === 'M') {
    // Missiles: +30s duration, faster cadence per level (up to 8 levels)
    missileLevel = Math.min(7, missileLevel + 1);
    const remaining = Math.max(0, missileAutoEnd - performance.now());
    missileAutoEnd = performance.now() + remaining + 30000;
    // Fire first one immediately on activation
    if (remaining === 0) {
      missileAutoLast = performance.now();
      addLockTarget();
      fireMissile();
    }
  } else if (type === 'L') {
    // Laser beam: increase range + damage per level (up to 8 levels)
    laserLevel = Math.min(7, laserLevel + 1);
    AUTOBEAM_RADIUS = Math.round(AUTOBEAM_BASE_RAD * (1 + laserLevel * 0.5)); // +50% per level
    AUTOBEAM_DAMAGE = AUTOBEAM_BASE_DMG * (1 + laserLevel * 0.4);             // +40% per level
    autoBeamOn = true;
    autoBeamTarget = null;
  } else if (type === 'F') {
    // Firepower: increase spread (cumulative)
    if (currentWeapon !== 'normal') { currentWeapon = 'normal'; }
    weaponSpread = Math.min(7, weaponSpread + 1);
  }
}

function updatePowerups(now) {
  if (!player || !player.alive) return;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    // Pulse animation
    const t = (now - p.spawnTime) / 1000;
    const scale = 1 + Math.sin(t * 3) * 0.15;
    p.gfx.scale.set(scale);
    p.ring.rotation = t * 1.5;
    p.glow.alpha = 0.6 + Math.sin(t * 2) * 0.3;

    // Check pickup
    const dx = player.x - p.x, dy = player.y - p.y;
    if (Math.sqrt(dx*dx + dy*dy) < POWERUP_PICKUP_RADIUS) {
      applyPowerup(p.type);
      // Pickup flash effect
      spawnFragments(p.x, p.y, 0, 0, POWERUP_COLORS[p.type], 20);
      // Show label popup with current level
      const lvl = p.type==='S' ? shieldLevel : p.type==='M' ? missileLevel :
                  p.type==='L' ? laserLevel : weaponSpread;
      const lvlText = POWERUP_LABELS[p.type] + (lvl > 0 ? ' ×' + (lvl+1) : '');
      spawnScorePopup(p.x, p.y, 0, lvlText);
      // Remove
      worldContainer.removeChild(p.gfx);
      p.gfx.destroy();
      powerups.splice(i, 1);
    }
  }
}

function updateMissileAuto(now) {
  if (now >= missileAutoEnd) return;
  const cadence = MISSILE_CADENCE[Math.min(missileLevel - 1, 7)] || 5000;
  if (now - missileAutoLast >= cadence) {
    missileAutoLast = now;
    addLockTarget();
    fireMissile();
  }
}

function clearPowerups() {
  for (const p of powerups) {
    worldContainer.removeChild(p.gfx);
    p.gfx.destroy();
  }
  powerups.length = 0;
  killCount = 0;
  nextPowerupAt = 5;
  shieldPowerupActive = false;
  missileAutoEnd = 0;
  missileAutoLast = 0;
  // Reset progressive levels
  missileLevel = 0;
  laserLevel   = 0;
  shieldLevel  = 0;
  SHIELD_MAX_MS   = SHIELD_BASE_MS;
  AUTOBEAM_RADIUS = AUTOBEAM_BASE_RAD;
  AUTOBEAM_DAMAGE = AUTOBEAM_BASE_DMG;
}

// --- BLACKHOLE / GRID state ---

// Malla de fondo permanente deformada por blackholes
const warpGridGfx  = new PIXI.Graphics();  // se añade al stage en setup()
const autoBeamGfx  = new PIXI.Graphics();  // rayo autobeam — HUD layer

function applyExplosionDamage(ex, ey, radius, damage, source) {
  const now = performance.now();
  for (let i = 0; i < pool.length; i++) {
    const e = pool[i];
    if (!e.alive || e === source) continue;
    if (e.type === TYPE.BULLET || e.type === TYPE.WALL) continue;
    const dx = e.x - ex, dy = e.y - ey;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > radius) continue;
    const falloff = 1 - dist / radius;
    const dmg = damage * falloff;
    if (e.type === TYPE.PLAYER) {
      if (now - e.lastHit > 200) {
        e.lastHit = now;
        e.energy -= dmg;
        if (e.energy <= 0) e.alive = false;
        playerHPBarExpiry = now + PLAYER_HP_BAR_DURATION;
        shieldBarExpiry   = now + PLAYER_HP_BAR_DURATION;
      }
    } else if (e.type === TYPE.ENEMY) {
      e.energy -= dmg;
      showEnergyBar(e, now);
      if (e.energy <= 0) { e.alive = false; onEnemyDeath(e, false); }
      // Knockback
      if (dist > 0.1) {
        const nx = dx/dist, ny = dy/dist;
        const kb = falloff * 4 * e.invMass;
        e.vx += nx * kb; e.vy += ny * kb;
        e.sleeping = false; e.sleepN = 0;
      }
    }
  }
}

function onEnemyDeath(enemy, playerKill = false) {
  const mass = ENERGY[enemy.variant] ?? 1;
  if (playerKill) {
    score += mass * SCORE_MULTIPLIER;
    addScore(mass, enemy.x, enemy.y);
    // Powerup spawning (mobile only)
    if (isMobileControlsActive) {
      killCount++;
      if (killCount >= nextPowerupAt) {
        spawnPowerup(enemy.x, enemy.y);
        nextPowerupAt = Math.ceil(nextPowerupAt + nextPowerupAt * 0.5);
      }
    }
  }

  // Per-type death explosion — size and count scale with enemy mass
  const col  = enemy.color ?? 0xffffff;
  const ex   = enemy.x, ey = enemy.y;
  const evx  = enemy.vx * 0.3, evy = enemy.vy * 0.3;

  // Explosion splash damage — radius and damage scale with mass
  const splashRadius = 30 + Math.sqrt(mass) * 18;
  const splashDamage = 0.5 + mass * 0.08;
  applyExplosionDamage(ex, ey, splashRadius, splashDamage, enemy);

  if (enemy.variant === 'enemy_basic') {
    spawnFragments(ex, ey, evx, evy, col, 30);
  } else if (enemy.variant === 'enemy_heavy') {
    spawnFragments(ex, ey, evx, evy, col, 50);
    spawnFragments(ex, ey, evx, evy, 0xffcc44, 20);
    for (let i=0;i<2;i++) spawnEnemy('enemy_basic',ex+(Math.random()-.5)*20,ey+(Math.random()-.5)*20);
  } else if (enemy.variant === 'enemy_boss') {
    spawnFragments(ex, ey, evx, evy, col, 70);
    spawnFragments(ex, ey, evx, evy, 0xff8800, 30);
    spawnFragments(ex, ey, evx, evy, 0xffffff, 15);
    spawnSpawnerPulse(ex, ey);
    for (let i=0;i<4;i++) spawnEnemy('enemy_heavy',ex+(Math.random()-.5)*30,ey+(Math.random()-.5)*30);
  } else if (enemy.variant === 'enemy_spawner') {
    spawnFragments(ex, ey, evx, evy, col, 60);
    spawnFragments(ex, ey, evx, evy, 0xdd44ff, 25);
    spawnSpawnerPulse(ex, ey);
    setTimeout(()=> spawnSpawnerPulse(ex, ey), 180);
    for (let i=0;i<SPAWNER_DEATH_RELEASE;i++) spawnEnemy('enemy_heavy',ex+(Math.random()-.5)*50,ey+(Math.random()-.5)*50);
  } else if (enemy.variant === 'enemy_follower') {
    spawnFragments(ex, ey, evx, evy, col, 40);
    spawnFragments(ex, ey, evx, evy, 0x44ffaa, 15);
  } else if (enemy.variant === 'enemy_hitter') {
    spawnFragments(ex, ey, evx, evy, col, 45);
    spawnFragments(ex, ey, evx, evy, 0xff2244, 20);
  } else if (enemy.variant === 'enemy_blackhole') {
    lastBlackholeDeathTime = performance.now();
    wavesSinceBlackholeDeath = 0;
    // Massive implosion-explosion
    spawnFragments(ex, ey, evx, evy, 0xcc00ff, 80);
    spawnFragments(ex, ey, evx, evy, 0xff9900, 50);
    spawnFragments(ex, ey, evx, evy, 0xffffff, 30);
    spawnSpawnerPulse(ex, ey);
    setTimeout(()=> spawnSpawnerPulse(ex, ey), 120);
    setTimeout(()=> spawnSpawnerPulse(ex, ey), 280);
  } else if (enemy.variant === 'enemy_serpent') {
    spawnFragments(ex, ey, evx, evy, SERPENT_COLOR, 20);
    spawnFragments(ex, ey, evx, evy, 0x004422, 8);
  } else {
    spawnFragments(ex, ey, evx, evy, col, 28);
  }
}

function onCollision(a, b, ox, oy, now) {
  if (a.type === TYPE.BULLET || b.type === TYPE.BULLET) {
    const bullet = a.type===TYPE.BULLET ? a : b;
    const other  = a.type===TYPE.BULLET ? b : a;
    if (!bullet.alive) return;

    if (bullet.isEnemyBullet) {
      if (other.type === TYPE.WALL) { bullet.alive = false; return; }
      if (other.type === TYPE.PLAYER) {
        // Shield blocks enemy bullets — deflect and destroy
        if (shieldActive) {
          spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0x88ffff, 8);
          bullet.alive = false;
          return;
        }
        if (now - other.lastHit > HIT_CD_MS) {
          other.lastHit = now;
          other.energy -= bullet.currentDamage;
          if (other.energy <= 0) other.alive = false;
          playerHPBarExpiry = now + PLAYER_HP_BAR_DURATION;
          shieldBarExpiry   = now + PLAYER_HP_BAR_DURATION;
        }
        spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0xff4444);
        applyBulletImpulse(bullet, other);
        bullet.alive = false;
      }
      if (other.type === TYPE.ENEMY) {
        other.energy -= bullet.currentDamage;
        if (other.energy <= 0) { other.alive = false; onEnemyDeath(other, false); }  // bala enemiga — no puntúa
        showEnergyBar(other, now);
        spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, ENEMY_COLOR[other.variant] ?? 0xff3333, 6);
        applyBulletImpulse(bullet, other);
        bullet.alive = false;
      }
      return;
    }

    // Bala del jugador
    if (other.type === TYPE.BULLET) {
      if (other.isEnemyBullet) {
        // bala del jugador destruye bala enemiga
        spawnFragments(bullet.x, bullet.y, bullet.vx*0.3, bullet.vy*0.3, 0xffaa00, 5);
        other.alive = false;
        bullet.alive = false;
      }
      // balas del jugador entre sí: ignorar siempre
      return;
    }
    if (other.type === TYPE.WALL) {
      spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, 0x888888, 5);
      bullet.alive = false; return;
    }
    if (other.type === TYPE.ENEMY) {
      other.energy -= bullet.currentDamage;
      if (other.energy <= 0) { other.alive = false; onEnemyDeath(other, true); }
      showEnergyBar(other, now);
      spawnFragments(bullet.x, bullet.y, bullet.vx, bullet.vy, ENEMY_COLOR[other.variant] ?? 0xffffff);
      applyBulletImpulse(bullet, other);
      // Bullet hit activates drift for basic/heavy/boss
      if (other.variant === 'enemy_basic' || other.variant === 'enemy_heavy' || other.variant === 'enemy_boss') {
        other._hitActivated = true;
      }
      bullet.alive = false; return;
    }
    bullet.alive = false; return;
  }

  if ((a.type===TYPE.ENEMY && b.type===TYPE.PLAYER)||
      (a.type===TYPE.PLAYER && b.type===TYPE.ENEMY)) {
    const pl    = a.type===TYPE.PLAYER ? a : b;
    const enemy = a.type===TYPE.ENEMY  ? a : b;
    // Shield absorbs melee contact too
    if (!shieldActive && now - pl.lastHit > HIT_CD_MS) {
      pl.lastHit = now;
      pl.energy -= ENEMY_DAMAGE[enemy.variant] ?? 1;
      if (pl.energy <= 0) pl.alive = false;
      playerHPBarExpiry = now + PLAYER_HP_BAR_DURATION;
      shieldBarExpiry   = now + PLAYER_HP_BAR_DURATION;
    }
  }
  applyImpulse(a, b, ox, oy);
}

function applyBulletImpulse(bullet, other) {
  if (other.variant === 'enemy_blackhole') return;  // masa infinita, no se mueve
  const speed = Math.sqrt(bullet.vx*bullet.vx + bullet.vy*bullet.vy) || 1;
  const nx = bullet.vx/speed, ny = bullet.vy/speed;
  const dvx = other.vx-bullet.vx, dvy = other.vy-bullet.vy;
  const vn  = Math.min(dvx*nx+dvy*ny, -speed*0.5);
  const invSum = bullet.invMass + other.invMass;
  if (invSum === 0) return;
  other.sleeping = false; other.sleepN = 0;
  const j = -(1 + Math.min(bullet.restitution,other.restitution)) * vn / invSum;
  other.vx += j*nx*other.invMass; other.vy += j*ny*other.invMass;
}

function applyImpulse(a, b, ox, oy) {
  if (a.variant === 'enemy_blackhole' || b.variant === 'enemy_blackhole') return;
  let nx=0, ny=0;
  if (ox < oy) nx = b.x>a.x ? 1:-1; else ny = b.y>a.y ? 1:-1;
  const dvx=b.vx-a.vx, dvy=b.vy-a.vy, vn=dvx*nx+dvy*ny;
  if (vn > 0) return;
  const invSum=a.invMass+b.invMass;
  if (invSum===0) return;
  a.sleeping=b.sleeping=false; a.sleepN=b.sleepN=0;
  const rest=Math.min(a.restitution,b.restitution);
  const j=-(1+rest)*vn/invSum;
  a.vx-=j*nx*a.invMass; a.vy-=j*ny*a.invMass;
  b.vx+=j*nx*b.invMass; b.vy+=j*ny*b.invMass;
  const tx=-ny,ty=nx,vt=dvx*tx+dvy*ty;
  const mu=Math.sqrt(a.friction*b.friction);
  const jt=Math.abs(vt)<j*mu?-vt/invSum:-j*mu*Math.sign(vt);
  a.vx+=jt*tx*a.invMass; a.vy+=jt*ty*a.invMass;
  b.vx-=jt*tx*b.invMass; b.vy-=jt*ty*b.invMass;
  const corr=Math.max(Math.min(ox,oy)-0.5,0)/invSum*0.4;
  if (!a._skipPhysics) { a.x-=corr*nx*a.invMass; a.y-=corr*ny*a.invMass; }
  if (!b._skipPhysics) { b.x+=corr*nx*b.invMass; b.y+=corr*ny*b.invMass; }
}

// ================================================================
// PHYSICS STEP
// ================================================================
function physicsStep(dt, now) {
  const sw=WW(), sh=WH();
  for (let i=0; i<pool.length; i++) {
    const e=pool[i];
    if (!e.alive||e.invMass===0||e.sleeping||e._skipPhysics) continue;
    e.x+=e.vx*dt; e.y+=e.vy*dt;
    if (e.type===TYPE.BULLET) {
      if (e.x<-40||e.x>sw+40||e.y<-40||e.y>sh+40) e.alive=false;
      continue;
    }
    if (e.x-e.halfW<0)  {e.x=e.halfW;     e.vx= Math.abs(e.vx);}
    if (e.x+e.halfW>sw) {e.x=sw-e.halfW;  e.vx=-Math.abs(e.vx);}
    if (e.y-e.halfH<0)  {e.y=e.halfH;     e.vy= Math.abs(e.vy);}
    if (e.y+e.halfH>sh) {e.y=sh-e.halfH;  e.vy=-Math.abs(e.vy);}
    const v2=e.vx*e.vx+e.vy*e.vy;
    if (v2<SLEEP_THRESH) { if(++e.sleepN>SLEEP_FRAMES){e.vx=e.vy=0;e.sleeping=true;} }
    else { e.sleepN=0; }
  }
  // Shield force field — repels enemies and destroys incoming enemy bullets
  if (player && player.alive && shieldActive) {
    for (let i=0; i<pool.length; i++) {
      const e=pool[i];
      if (!e.alive) continue;

      // Intercept enemy bullets that enter shield radius
      if (e.type===TYPE.BULLET && e.isEnemyBullet) {
        const bdx=e.x-player.x, bdy=e.y-player.y;
        if (Math.sqrt(bdx*bdx+bdy*bdy) < SHIELD_RADIUS + e.halfW) {
          spawnFragments(e.x, e.y, e.vx, e.vy, 0x88ffff, 6);
          e.alive = false;
        }
        continue;
      }

      if (e.type!==TYPE.ENEMY) continue;
      const sdx=e.x-player.x, sdy=e.y-player.y;
      const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      const minD=SHIELD_RADIUS+Math.max(e.halfW,e.halfH);
      if (sdist<minD&&sdist>0.01) {
        const snx=sdx/sdist, sny=sdy/sdist;
        e.vx+=snx*8*e.invMass; e.vy+=sny*8*e.invMass;
        e.x+=snx*(minD-sdist); e.y+=sny*(minD-sdist);
        e.sleeping=false; e.sleepN=0;
        const lastSH=shieldHitMap.get(e.id)??0;
        if (now-lastSH>SHIELD_HIT_CD) {
          shieldHitMap.set(e.id,now);
          e.energy-=SHIELD_DAMAGE; showEnergyBar(e,now);
          if (e.energy<=0){e.alive=false;onEnemyDeath(e, true);}
        }
      }
    }
  }
  // Blackhole gravity fields (puede haber varios)
  const blackholes = pool.filter(e => e.alive && e.variant === 'enemy_blackhole');
  for (const bh of blackholes) {
    if (!bh._massAbsorbed) bh._massAbsorbed = 0;
    const bhRadius = BLACKHOLE_BASE_RADIUS + bh._massAbsorbed * BLACKHOLE_RADIUS_PER_MASS;
    const bhForce  = BLACKHOLE_BASE_FORCE  + bh._massAbsorbed * BLACKHOLE_FORCE_PER_MASS;
    const noEscapeR = bhRadius * BLACKHOLE_ESCAPE_FRAC;

    for (let i = 0; i < pool.length; i++) {
      const e = pool[i];
      if (!e.alive || e === bh || e.invMass === 0) continue;
      // Blackholes no se atraen entre sí en la fase de gravedad (lo hace el AI)
      if (e.variant === 'enemy_blackhole') continue;
      // Serpientes inmunes a la gravedad del agujero negro
      if (e._serpentImmune) continue;

      const dx = bh.x - e.x, dy = bh.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      if (dist >= bhRadius) continue;

      // Fuerza lineal con distancia — suave y escapable en toda la zona exterior
      const inNoEscape = dist < noEscapeR;
      // Zona exterior: caída lineal de 1→0. Zona de no-escape: fuerza constante máxima.
      const strength = inNoEscape ? 1.0 : (1 - dist / bhRadius);
      const acc = bhForce * strength * dt / 16;

      e.vx += (dx / dist) * acc * e.invMass;
      e.vy += (dy / dist) * acc * e.invMass;
      e.sleeping = false; e.sleepN = 0;

      // Bala del jugador: sólo daña al BH si está en la zona interior (antes de ser absorbida)
      if (e.type === TYPE.BULLET && !e.isEnemyBullet) {
        if (inNoEscape) {
          // Zona de daño — bala impacta al BH y desaparece
          bh.energy -= e.currentDamage;
          showEnergyBar(bh, now);
          if (bh.energy <= 0) { bh.alive = false; onEnemyDeath(bh, true); }
          spawnFragments(e.x, e.y, e.vx * 0.2, e.vy * 0.2, 0xcc00ff, 6);
          e.alive = false;
        }
        // En la zona exterior: la gravedad la curva pero no se destruye ni daña al BH
        continue;
      }

      // Núcleo: destrucción de otras entidades
      if (dist < bh.halfW + Math.max(e.halfW, e.halfH)) {
        // El blackhole absorbe la entidad — su masa infinita no se ve afectada en posición
        const absorbedMass = ENERGY[e.variant] ?? 1;
        bh._massAbsorbed = Math.min((bh._massAbsorbed||0) + absorbedMass, 4*15);  // cap: 4 x enemy_boss
        // Crecer visualmente (solo tamaño visual del núcleo, no afecta hitbox de forma relevante)
        // El tamaño real crece inmediatamente para hitbox, pero _targetSize
        // se interpola suavemente en el AI para el render visual
        bh._targetSize = BLACKHOLE_SIZE + bh._massAbsorbed * 0.3;
        if (!bh._visualSize) bh._visualSize = BLACKHOLE_SIZE;
        bh.w = bh.h = bh._targetSize;
        bh.halfW = bh.halfH = bh.w * 0.5;
        if (e.type === TYPE.PLAYER) {
          e.energy = 0; e.alive = false;
        } else {
              e.alive = false;  // absorbed — no player score
        }
        // El blackhole no recibe impulso — masa infinita
        spawnFragments(e.x, e.y, 0, 0, e.color ?? 0xffffff, 8);
      }
    }
  }
  // Broadphase
  const alive=pool.filter(e=>e.alive);
  alive.sort((a,b)=>a.x-a.halfW-(b.x-b.halfW));
  for (let i=0; i<alive.length; i++) {
    const a=alive[i], aRight=a.x+a.halfW;
    for (let j=i+1; j<alive.length; j++) {
      const b=alive[j];
      if (b.x-b.halfW>aRight) break;
      const ox=(a.halfW+b.halfW)-Math.abs(b.x-a.x);
      const oy=(a.halfH+b.halfH)-Math.abs(b.y-a.y);
      if (ox<=0||oy<=0) continue;
      onCollision(a,b,ox,oy,now);
    }
  }
}

const keys  = {};
const mouse = { x:0, y:0, down:false };
let player = null, lastShot = 0, currentWeapon = "normal";
let autoBeamOn = false;        // arma 4: toggle
let autoBeamTarget = null;     // entidad objetivo actual
let autoBeamLastTick = 0;      // último momento de daño
let autoBeamDeathTime = 0;     // cuando murió el último objetivo
let autoBeamLastPos = null;    // última posición conocida del objetivo (para el fade)
let weaponSpread = 0;  // 0..7: 8 modos de disparo para cada arma
let gameOver = false, paused = false;
let gameStarted = false;
let sessionStartTime = 0;

window.addEventListener("keydown", e => {
  if (e.code==="KeyP") { paused=!paused; elInfo.textContent=paused?"[PAUSA] - press P to continue":""; return; }
  if (gameOver) return;
  if (e.code==="Digit1") { if (currentWeapon==="normal") { weaponSpread=(weaponSpread+1)%8; } else { currentWeapon="normal"; weaponSpread=0; } return; }
  if (e.code==="Digit2") { if (currentWeapon==="heavy")  { weaponSpread=(weaponSpread+1)%8; } else { currentWeapon="heavy";  weaponSpread=0; } return; }
  if (e.code==="Digit3") { if (currentWeapon==="laser")  { weaponSpread=(weaponSpread+1)%8; } else { currentWeapon="laser";  weaponSpread=0; } return; }
  if (e.code==="Digit4") { autoBeamOn = !autoBeamOn; autoBeamTarget = null; return; }
  if (e.code==="Digit6") { startPhase(6, performance.now()); return; }
  if (e.code==="Digit7") { startPhase(7, performance.now()); return; }
  if (e.code==="KeyZ") { spawnEnemy("enemy_basic");   return; }
  if (e.code==="KeyX") { spawnEnemy("enemy_heavy");   return; }
  if (e.code==="KeyC") { spawnEnemy("enemy_boss");    return; }
  if (e.code==="KeyV") { spawnEnemy("enemy_spawner"); return; }
  if (e.code==="KeyB") { spawnEnemy("enemy_follower");return; }
  if (e.code==="KeyN") { spawnEnemy("enemy_hitter");  return; }
  if (e.code==="KeyM") { spawnEnemy("enemy_blackhole"); return; }
  if (e.code==="Comma") { spawnSerpent(Math.random()*WW(), Math.random()*WH()); return; }
  if (e.code==="Space")  { keys["Space"]=true; return; }
  if (e.code==="KeyQ") { addLockTarget(); return; }
  if (e.code==="KeyE") { fireMissile(); return; }
  keys[e.code]=true; e.preventDefault();
});
window.addEventListener("keyup",     e => { keys[e.code]=false; });
window.addEventListener("mousemove", e => { if(!isMobileControlsActive) { mouse.x=e.clientX+cam.x; mouse.y=e.clientY+cam.y; } });
window.addEventListener("mousedown", e => { if(!isMobileControlsActive && e.button===0) mouse.down=true;  });
window.addEventListener("mouseup",   e => { if(!isMobileControlsActive && e.button===0) mouse.down=false; });

function inputUpdate(now) {
  if (!player||!player.alive) return;
  let tx=0, ty=0;
  const left=keys.KeyA||keys.ArrowLeft, right=keys.KeyD||keys.ArrowRight;
  const up=keys.KeyW||keys.ArrowUp,     down=keys.KeyS||keys.ArrowDown;
  if(left)  tx-=PLAYER_SPEED; if(right) tx+=PLAYER_SPEED;
  if(up)    ty-=PLAYER_SPEED; if(down)  ty+=PLAYER_SPEED;
  if(left||right||up||down){
    player.vx+=(tx-player.vx)*PLAYER_ACCEL;
    player.vy+=(ty-player.vy)*PLAYER_ACCEL;
  } else { player.vx*=PLAYER_DAMPING; player.vy*=PLAYER_DAMPING; }
  player.sleeping=false; player.sleepN=0;

  // --- SHIELD ---
  // SHIELD: active while SPACE held and charge > 0. Recharges when inactive.
  const spDown = keys["Space"];

  if (shieldActive) {
    // Gastar carga
    shieldUsedMs = Math.min(SHIELD_MAX_MS, shieldUsedMs + app.ticker.deltaMS);
    shieldBarExpiry = now + 3500;
    if (shieldUsedMs >= SHIELD_MAX_MS) {
      // Se agoto
      shieldActive = false;
      shieldPowerupActive = false;
    } else if (!spDown && !shieldPowerupActive) {
      // El jugador solto SPACE (no aplica si fue powerup)
      shieldActive = false;
    }
  } else {
    // Recargar siempre que el escudo este desactivado
    if (shieldUsedMs > 0) {
      shieldUsedMs = Math.max(0, shieldUsedMs - app.ticker.deltaMS * (SHIELD_MAX_MS / SHIELD_COOLDOWN));
      shieldBarExpiry = now + 2000;
    }
    // Activar si SPACE pulsado y hay carga suficiente
    if (spDown && shieldUsedMs <= SHIELD_MAX_MS - SHIELD_MIN_TO_USE) {
      shieldActive = true;
      shieldBarExpiry = now + 3500;
    }
  }

  const weaponCD = currentWeapon==="laser"?80:currentWeapon==="heavy"?450:BULLET_CD_MS;
  if (mouse.down && now-lastShot>=weaponCD) {
    lastShot=now;
    const dx=mouse.x-player.x, dy=mouse.y-player.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/len, ny=dy/len;
    const spd=BULLET_SPEED[currentWeapon]??BULLET_SPEED.normal;
    const offset=Math.max(player.halfW,player.halfH)+4;

    // 8 modos de disparo compartidos por las 3 armas
    const spreadAngles = [
      [0],                          // modo 1: 1 bala frontal
      [-5, 5],                      // modo 2: 2 balas
      [-5, 0, 5],                   // modo 3: 3 balas
      [-7.5, -2.5, 2.5, 7.5],      // modo 4: 4 balas
      [-10, -5, 0, 5, 10],         // modo 5: 5 balas
      [-10, -5, 0, 5, 10, 180],                   // modo 6: 5 frontales + 1 trasera
      [-10, -5, 0, 5, 10, 175, 185],              // modo 7: 5 frontales + 2 traseras
      [-10, -5, 0, 5, 10, 175, 180, 185],         // modo 8: 5 frontales + 3 traseras
    ];
    const angles = spreadAngles[weaponSpread];
    for (const deg of angles) {
      const rad = deg * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const bx = nx*cos - ny*sin;
      const by = nx*sin + ny*cos;
      spawnBullet(player.x+bx*offset, player.y+by*offset, bx*spd, by*spd, currentWeapon, false);
    }
  }
}

const elFPS  = document.getElementById("hFPS");
const elInfo = document.getElementById("hInfo");
let hudMs = 0;

function hudUpdate(now) {
  hudMs += app.ticker.deltaMS;
  if (hudMs < 600) return;
  hudMs = 0;
  elFPS.textContent = "FPS: "+app.ticker.FPS.toFixed(0)+"  objs: "+pool.length;

  // Total mass on field (every alive enemy contributes its ENERGY value as mass)
  const totalMass = pool.reduce((acc, e) => {
    if (!e.alive || e.type !== TYPE.ENEMY) return acc;
    const m = ENERGY[e.variant] ?? 1;
    // Serpent: count each segment individually
    return acc + (isFinite(m) ? m : 0);
  }, 0);
  document.getElementById('hMass').textContent = 'MASA: ' + totalMass;

  if (gameOver) {
    elPhaseTimer.textContent="✕"; elPhaseTimer.style.color="#ff4444";
    return;
  }
  if (paused) return;
  if (player) {
    const wNames={normal:"1-Basic",heavy:"2-Heavy",laser:"3-Laser"};
    const beamInfo = autoBeamOn ? ' <span style="color:#44aaff;text-shadow:0 0 6px #44aaff">[4-BEAM ON]</span>' : ' <span style="color:#445566">[4-beam off]</span>';
    const wColors={normal:"#ffff33",heavy:"#ff8833",laser:"#33ffff"};
    const recharging = !shieldActive && shieldUsedMs > 0;
    const shieldInfo = shieldActive
      ? ' <span style="color:#88ffff">[SHIELD ACTIVE]</span>'
      : recharging
        ? ' <span style="color:#999">shield recharge: '+(((SHIELD_MAX_MS-shieldUsedMs)/SHIELD_MAX_MS)*100).toFixed(0)+'%</span>'
        : ' <span style="color:#88ffff">[SPACE: shield]</span>';
    document.getElementById('hScore').textContent = displayedScore;
  elInfo.innerHTML = '  weapon: <span style="color:'+wColors[currentWeapon]+'">'+wNames[currentWeapon]+(weaponSpread>0 ? ' m'+(weaponSpread+1) : '')+'</span>'+
      shieldInfo+
      beamInfo+
      '  <span style="color:#888">Z/X/C/V/B/N/M: spawn</span>'+
      "   WASD-click-1/2/3/4-SPACE";
  }
}

const aimLine = new PIXI.Graphics();

function drawAimLine() {
  aimLine.clear();
  if (!player||!player.alive||gameOver) return;
  const dx=mouse.x-player.x, dy=mouse.y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dx/dist, ny=dy/dist;
  const lineLen = Math.min(dist, 120);

  // Línea discontinua: segmentos alternados
  const dashLen = 8, gapLen = 6, total = dashLen + gapLen;
  let traveled = 14;  // arranca un poco más allá del sprite
  aimLine.lineStyle(1, 0xffffff, 0.55);
  while (traveled < lineLen) {
    const segEnd = Math.min(traveled + dashLen, lineLen);
    aimLine.moveTo(player.x + nx*traveled, player.y + ny*traveled);
    aimLine.lineTo(player.x + nx*segEnd,   player.y + ny*segEnd);
    traveled += total;
  }

  // Pequeño círculo en el cursor
  aimLine.lineStyle(1, 0xffffff, 0.55);
  aimLine.drawCircle(mouse.x, mouse.y, 5);
  // Cruz interior del cursor
  aimLine.moveTo(mouse.x-3, mouse.y); aimLine.lineTo(mouse.x+3, mouse.y);
  aimLine.moveTo(mouse.x, mouse.y-3); aimLine.lineTo(mouse.x, mouse.y+3);
}

const playerBarsGfx = new PIXI.Graphics();
worldContainer.addChild(playerBarsGfx);

function drawPlayerBars(now) {
  playerBarsGfx.clear();
  if (!player) return;
  const hpActive = now < playerHPBarExpiry;
  const shActive = now < shieldBarExpiry;
  if (!hpActive && !shActive) return;
  const longestT = Math.max(
    hpActive ? (playerHPBarExpiry - now) / PLAYER_HP_BAR_DURATION : 0,
    shActive ? (shieldBarExpiry   - now) / PLAYER_HP_BAR_DURATION : 0
  );
  const alpha = longestT < 0.25 ? longestT / 0.25 : 1.0;
  const BW=80, BH=6, GAP=3, bx=player.x-BW/2;
  const byHP=player.y-player.halfH-18, bySH=byHP+BH+GAP;

  // HP bar
  const hpFrac=Math.max(0,player.energy/player.maxEnergy);
  playerBarsGfx.beginFill(0x1a0000, 0.75*alpha);
  playerBarsGfx.drawRect(bx,byHP,BW,BH); playerBarsGfx.endFill();
  const hpR=Math.round(255*(1-hpFrac)), hpG=Math.round(255*hpFrac);
  playerBarsGfx.beginFill((hpR<<16)|(hpG<<8), alpha);
  playerBarsGfx.drawRect(bx,byHP,BW*hpFrac,BH); playerBarsGfx.endFill();
  playerBarsGfx.lineStyle(1,0xff6666,0.6*alpha);
  playerBarsGfx.drawRect(bx,byHP,BW,BH);

  // Shield bar — shows remaining charge (1 = full, 0 = empty)
  const shFrac  = Math.max(0, 1 - shieldUsedMs / SHIELD_MAX_MS);
  const shColor = shieldActive ? 0x00ffff : 0x0088ff;
  playerBarsGfx.lineStyle(0);
  playerBarsGfx.beginFill(0x001a33, 0.75*alpha);
  playerBarsGfx.drawRect(bx,bySH,BW,BH); playerBarsGfx.endFill();
  playerBarsGfx.beginFill(shColor, alpha);
  playerBarsGfx.drawRect(bx,bySH,BW*shFrac,BH); playerBarsGfx.endFill();
  playerBarsGfx.lineStyle(1,0x44ccff,0.6*alpha);
  playerBarsGfx.drawRect(bx,bySH,BW,BH);
}

const shieldGfx = new PIXI.Graphics();
worldContainer.addChild(shieldGfx);

function drawShield(now) {
  shieldGfx.clear();
  if (!player||!player.alive||!shieldActive) return;
  const pulse=0.18+0.12*Math.sin(now/80);
  shieldGfx.lineStyle(2,0x88ffff,0.85);
  shieldGfx.drawCircle(player.x,player.y,SHIELD_RADIUS);

  shieldGfx.drawCircle(player.x,player.y,SHIELD_RADIUS);
  shieldGfx.endFill();
}

// ================================================================
// SETUP  —  paredes interiores generadas aleatoriamente
// ================================================================

function randBetween(a, b) { return a + Math.random() * (b - a); }

function wallsOverlap(ax, ay, aw, ah, bx, by, bw, bh, margin) {
  // AABB con margen de seguridad
  return Math.abs(ax-bx) < (aw+bw)/2 + margin &&
         Math.abs(ay-by) < (ah+bh)/2 + margin;
}

function generateInteriorWalls(sw, sh) {
  const count   = WALL_COUNT_MIN + Math.floor(Math.random()*(WALL_COUNT_MAX - WALL_COUNT_MIN + 1));
  const placed  = [];  // { x, y, w, h }
  const maxTries = 200;

  for (let i = 0; i < count; i++) {
    let tries = 0;
    while (tries++ < maxTries) {
      // Orientación aleatoria: horizontal o vertical
      const horizontal = Math.random() > 0.5;
      const ww = horizontal
        ? randBetween(WALL_MIN_LONG,  WALL_MAX_LONG)
        : randBetween(WALL_MIN_SHORT, WALL_MAX_SHORT);
      const wh = horizontal
        ? randBetween(WALL_MIN_SHORT, WALL_MAX_SHORT)
        : randBetween(WALL_MIN_LONG,  WALL_MAX_LONG);

      const x = randBetween(WALL_MARGIN + ww/2, sw - WALL_MARGIN - ww/2);
      const y = randBetween(WALL_MARGIN + wh/2, sh - WALL_MARGIN - wh/2);

      // Verificar separación respecto a paredes ya colocadas
      const ok = placed.every(p => !wallsOverlap(x,y,ww,wh, p.x,p.y,p.w,p.h, WALL_MIN_SEP));
      if (ok) {
        placed.push({ x, y, w: ww, h: wh });
        break;
      }
    }
  }
  return placed;
}

function setup() {
  // Re-attach persistent gfx layers (safe to call multiple times)
  if (!worldContainer.children.includes(warpGridGfx))  worldContainer.addChildAt(warpGridGfx, 0);
  if (!worldContainer.children.includes(aimLine))       worldContainer.addChild(aimLine);
  if (!worldContainer.children.includes(playerBarsGfx)) worldContainer.addChild(playerBarsGfx);
  if (!worldContainer.children.includes(shieldGfx))     worldContainer.addChild(shieldGfx);
  if (!worldContainer.children.includes(autoBeamGfx))   worldContainer.addChild(autoBeamGfx);
  const sw=WW(), sh=WH(), WS=Math.round(14*MS);
  // Paredes perimetrales
  spawnWall(sw/2,    WS/2,    sw, WS);
  spawnWall(sw/2,    sh-WS/2, sw, WS);
  spawnWall(WS/2,    sh/2,    WS, sh);
  spawnWall(sw-WS/2, sh/2,    WS, sh);

  // Paredes interiores aleatorias
  const walls = generateInteriorWalls(sw, sh);
  for (const w of walls) spawnWall(w.x, w.y, w.w, w.h);

  player = spawnPlayer();
}

// ================================================================
// AUTO-BEAM (arma 4)
// ================================================================
function updateAutoBeam(now) {
  autoBeamGfx.clear();
  if (!autoBeamOn || !player || !player.alive) return;

  // If target just died, hold beam at last position for AUTOBEAM_MIN_SHOW ms
  const inDeathHold = autoBeamLastPos && (now - autoBeamDeathTime) < AUTOBEAM_MIN_SHOW;

  if (!autoBeamTarget || !autoBeamTarget.alive) {
    if (!inDeathHold) {
      // Death hold expired — search for next target
      autoBeamTarget = null;
      let best = AUTOBEAM_RADIUS, bestE = null;
      for (const e of pool) {
        if (!e.alive || e.type !== TYPE.ENEMY) continue;
        const d = Math.hypot(e.x - player.x, e.y - player.y);
        if (d < best) { best = d; bestE = e; }
      }
      autoBeamTarget = bestE;
      autoBeamLastPos = autoBeamTarget ? { x: autoBeamTarget.x, y: autoBeamTarget.y } : null;
    }
    // During hold: draw fading beam to last position and return
    if (inDeathHold && autoBeamLastPos) {
      const fade = 1 - (now - autoBeamDeathTime) / AUTOBEAM_MIN_SHOW;
      const tx = autoBeamLastPos.x, ty = autoBeamLastPos.y;
      const px = player.x, py = player.y;
      autoBeamGfx.lineStyle(6,   0x0044ff, 0.18 * fade);
      autoBeamGfx.moveTo(px,py); autoBeamGfx.lineTo(tx,ty);
      autoBeamGfx.lineStyle(3,   0x2288ff, 0.45 * fade);
      autoBeamGfx.moveTo(px,py); autoBeamGfx.lineTo(tx,ty);
      autoBeamGfx.lineStyle(1.5, 0xaaddff, 0.95 * fade);
      autoBeamGfx.moveTo(px,py); autoBeamGfx.lineTo(tx,ty);
      return;
    }
  }

  if (!autoBeamTarget) return;

  // Track last known position
  autoBeamLastPos = { x: autoBeamTarget.x, y: autoBeamTarget.y };

  // Apply periodic damage
  if (now - autoBeamLastTick >= AUTOBEAM_TICK_MS) {
    autoBeamLastTick = now;
    autoBeamTarget.energy -= AUTOBEAM_DAMAGE;
    showEnergyBar(autoBeamTarget, now);
    spawnFragments(autoBeamTarget.x, autoBeamTarget.y, 0, 0, 0x44aaff, 4);
    if (autoBeamTarget.variant === 'enemy_basic' || autoBeamTarget.variant === 'enemy_heavy' || autoBeamTarget.variant === 'enemy_boss') {
      autoBeamTarget._hitActivated = true;
    }
    if (autoBeamTarget.energy <= 0) {
      autoBeamTarget.alive = false;
      onEnemyDeath(autoBeamTarget, true);
      autoBeamDeathTime = now;
      autoBeamTarget = null;
      return;
    }
  }

  // Draw neon blue beam
  const tx = autoBeamTarget.x, ty = autoBeamTarget.y;
  const px = player.x,         py = player.y;
  const pulse = 0.7 + 0.3 * Math.sin(now / 60);

  autoBeamGfx.lineStyle(6,   0x0044ff, 0.18 * pulse);
  autoBeamGfx.moveTo(px, py); autoBeamGfx.lineTo(tx, ty);
  autoBeamGfx.lineStyle(3,   0x2288ff, 0.45 * pulse);
  autoBeamGfx.moveTo(px, py); autoBeamGfx.lineTo(tx, ty);
  autoBeamGfx.lineStyle(1.5, 0xaaddff, 0.95);
  autoBeamGfx.moveTo(px, py); autoBeamGfx.lineTo(tx, ty);
  autoBeamGfx.lineStyle(0);
  autoBeamGfx.beginFill(0x88ccff, 0.8 * pulse);
  autoBeamGfx.drawCircle(tx, ty, 4 + 2 * pulse);
  autoBeamGfx.endFill();
}

// ================================================================
// WARPED GRID (HUD cosmético permanente)
// ================================================================
function drawWarpGrid() {
  warpGridGfx.clear();
  // Only draw grid for the visible area (+ padding for warp displacement)
  const pad = 200; // extra padding for blackhole warp effect
  const vx0 = cam.x - pad, vy0 = cam.y - pad;
  const vx1 = cam.x + W() + pad, vy1 = cam.y + H() + pad;
  // Snap to grid step boundaries
  const gx0 = Math.max(0, Math.floor(vx0 / GRID_STEP) * GRID_STEP);
  const gy0 = Math.max(0, Math.floor(vy0 / GRID_STEP) * GRID_STEP);
  const gx1 = Math.min(WW(), Math.ceil(vx1 / GRID_STEP) * GRID_STEP);
  const gy1 = Math.min(WH(), Math.ceil(vy1 / GRID_STEP) * GRID_STEP);

  const blackholes = pool.filter(e => e.alive && e.variant === 'enemy_blackhole');

  // Efecto "bola sobre tela":
  // Cada vértice de la rejilla se hunde en profundidad Z proporcional a 1/(1+d²/R²).
  // Esa depresión en Z se proyecta en pantalla: el vértice se desplaza radialmente
  // hacia el blackhole por la tangente del ángulo de inclinación de la tela,
  // y además se escala la posición proyectada (perspectiva cónica).
  // El resultado visual es la característica forma de embudo/cuenco.
  // Fabric warp params defined in config: FABRIC_DEPTH, FABRIC_SPREAD, FABRIC_VIEW

  const warp = (px, py) => {
    let wx = px, wy = py;
    for (const bh of blackholes) {
      if (!bh._massAbsorbed) bh._massAbsorbed = 0;
      const bhR = BLACKHOLE_BASE_RADIUS + (bh._massAbsorbed ?? 0) * BLACKHOLE_RADIUS_PER_MASS;
      const R = bhR * FABRIC_SPREAD;
      const dx = px - bh.x, dy = py - bh.y;
      const d  = Math.sqrt(dx*dx + dy*dy) || 0.001;
      if (d >= R) continue;

      // Depresión en Z: forma de cuenco suave — máxima en el centro, cero en el borde
      const t  = 1 - d / R;                          // 0 en borde, 1 en centro
      const dz = FABRIC_DEPTH * t * t * t;           // cúbica → cuenco pronunciado en el centro

      // Proyección perspectiva: el vértice se aleja del "ojo" → parece más pequeño
      // y se acerca al centro de la depresión
      const scale = FABRIC_VIEW / (FABRIC_VIEW + dz);    // <1 cerca del centro

      // Nuevo punto proyectado: escala alrededor del blackhole
      wx += (px - bh.x) * (scale - 1);  // mueve hacia bh.x
      wy += (py - bh.y) * (scale - 1);  // mueve hacia bh.y
    }
    return [wx, wy];
  };

  // Grid appearance constants defined in config block

  // Dibujar segmento a segmento para poder variar el alpha con la distancia
  for (let gy = gy0; gy <= gy1 + GRID_STEP; gy += GRID_STEP) {
    const row = Math.min(gy, WH());
    for (let gx = gx0; gx < gx1; gx += GRID_STEP) {
      const x0 = gx, x1 = Math.min(gx + GRID_STEP, WW());
      const [ax, ay] = warp(x0, row);
      const [bx, by] = warp(x1, row);
      // Alpha proporcional al desplazamiento — líneas más deformadas son más visibles
      const def = Math.hypot(ax - x0, ay - row) + Math.hypot(bx - x1, by - row);
      const extra = Math.min(def / GRID_DEFORM_DIV, GRID_EXTRA_MAX);
      warpGridGfx.lineStyle(1, GRID_COLOR, GRID_ALPHA + extra);
      warpGridGfx.moveTo(ax, ay);
      warpGridGfx.lineTo(bx, by);
    }
  }
  // Vertical lines
  for (let gx = gx0; gx <= gx1 + GRID_STEP; gx += GRID_STEP) {
    const col = Math.min(gx, WW());
    for (let gy = gy0; gy < gy1; gy += GRID_STEP) {
      const y0 = gy, y1 = Math.min(gy + GRID_STEP, WH());
      const [ax, ay] = warp(col, y0);
      const [bx, by] = warp(col, y1);
      const def = Math.hypot(ax - col, ay - y0) + Math.hypot(bx - col, by - y1);
      const extra = Math.min(def / GRID_DEFORM_DIV, GRID_EXTRA_MAX);
      warpGridGfx.lineStyle(1, GRID_COLOR, GRID_ALPHA + extra);
      warpGridGfx.moveTo(ax, ay);
      warpGridGfx.lineTo(bx, by);
    }
  }
}

const HERO_PREFIXES = ['Iron','Shadow','Storm','Nova','Blaze','Frost','Thunder','Venom',
  'Cosmic','Hyper','Omega','Steel','Dark','Neon','Solar','Lunar','Turbo','Plasma','Void','Titan',
  'Cyber','Quantum','Inferno','Cryo','Photon','Astro','Null','Surge','Apex','Drift',
  'Zenith','Flux','Rogue','Phantom','Echo','Nexus','Prism','Vector','Ember','Grim'];
const ANIMAL_NAMES  = ['Wolf','Falcon','Shark','Jaguar','Cobra','Hawk','Panther','Viper',
  'Eagle','Tiger','Fox','Bear','Raven','Lynx','Hydra','Mantis','Kraken','Phoenix','Bison','Orca',
  'Mamba','Condor','Narwhal','Wolverine','Cheetah','Scorpion','Gorilla','Barracuda','Tarantula','Komodo',
  'Warthog','Stingray','Cassowary','Piranha','Hammerhead','Mongoose','Salamander','Puma','Dingo','Vulture'];

function randomName() {
  const h = HERO_PREFIXES[Math.floor(Math.random()*HERO_PREFIXES.length)];
  const a = ANIMAL_NAMES [Math.floor(Math.random()*ANIMAL_NAMES.length)];
  return h + a;
}

function loadLB(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
}
function saveLB(key, arr) {
  localStorage.setItem(key, JSON.stringify(arr));
}

function recordRun(scoreVal, elapsedMs) {
  const name = randomName();
  const timeS = Math.round(elapsedMs / 1000);

  const scores = loadLB('lb_scores');
  scores.push({ name, score: scoreVal });
  scores.sort((a,b)=>b.score-a.score);
  const scoreRank = scores.findIndex(r=>r.name===name && r.score===scoreVal);
  saveLB('lb_scores', scores.slice(0,20));

  const times = loadLB('lb_times');
  times.push({ name, time: timeS });
  times.sort((a,b)=>b.time-a.time);
  const timeRank = times.findIndex(r=>r.name===name && r.time===timeS);
  saveLB('lb_times', times.slice(0,20));

  return { name, scoreVal, timeS, scoreRank, timeRank };
}

function renderLB(lastRun) {
  const scores = loadLB('lb_scores');
  const times  = loadLB('lb_times');
  const tbS = document.getElementById('tbScores');
  const tbT = document.getElementById('tbTimes');
  const glow = 'style="color:#00ffcc;text-shadow:0 0 8px #00ffcc,0 0 2px #fff"';

  // Limit records to fit screen — reserve ~200px for title/headers/hint
  const rowH = 22;
  const maxRows = Math.max(3, Math.floor((window.innerHeight - 200) / rowH));
  const visScores = scores.slice(0, maxRows);
  const visTimes  = times.slice(0, maxRows);

  tbS.innerHTML = visScores.length
    ? visScores.map((r,i)=>{
        const hi = lastRun && i===lastRun.scoreRank && i<20;
        return `<tr><td ${hi?glow:''}>${i+1}</td><td ${hi?glow:''}>${r.name}</td><td ${hi?glow:''}>${r.score}</td></tr>`;
      }).join('')
    : '<tr><td colspan="3" style="color:#555">sin registros</td></tr>';

  tbT.innerHTML = visTimes.length
    ? visTimes.map((r,i)=>{
        const hi = lastRun && i===lastRun.timeRank && i<20;
        return `<tr><td ${hi?glow:''}>${i+1}</td><td ${hi?glow:''}>${r.name}</td><td ${hi?glow:''}>${formatTime(r.time)}</td></tr>`;
      }).join('')
    : '<tr><td colspan="3" style="color:#555">sin registros</td></tr>';

  // On small screens, stack tables vertically and shrink fonts
  const tablesDiv = document.querySelector('#overlay .tables');
  if (tablesDiv && window.innerHeight < 500) {
    tablesDiv.style.gap = '12px';
    tablesDiv.style.fontSize = '0.65rem';
  }

  // Last run summary below tables
  const prev = document.getElementById('lastRunInfo');
  if (prev) prev.remove();
  if (lastRun) {
    const div = document.createElement('div');
    div.id = 'lastRunInfo';
    div.style.cssText = 'margin-top:10px;text-align:center;font-size:0.78rem;line-height:1.8;';
    div.innerHTML = `<span style="color:#aaa">Tu última partida —</span>
      <span style="color:#00ffcc;text-shadow:0 0 10px #00ffcc"> ${lastRun.name}</span><br>
      <span style="color:#ffdd44;text-shadow:0 0 8px #ffdd44">SCORE: ${lastRun.scoreVal}</span>
      &nbsp;·&nbsp;
      <span style="color:#88ccff;text-shadow:0 0 8px #88ccff">Tiempo: ${formatTime(lastRun.timeS)}</span>`;
    document.getElementById('overlay').insertBefore(div, document.querySelector('.click-hint'));
  }
}

function formatTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function showOverlay(isGameOver, lastRun) {
  // Reset camera for intro animation
  cam.x = 0; cam.y = 0;
  worldContainer.x = 0; worldContainer.y = 0;
  renderLB(lastRun);
  const ov = document.getElementById('overlay');
  const h1 = ov.querySelector('h1');
  if (isGameOver) {
    h1.textContent = 'GAME OVER';
    h1.className = 'gameover-title';
  } else {
    h1.textContent = 'SPACE SHOOTER';
    h1.className = '';
  }
  ov.style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ================================================================
// INTRO ANIMATION (background enemies before game starts)
// ================================================================
const introEnemies = [];
let lastIntroSpawn = 0;
const INTRO_VARIANTS = ['enemy_basic','enemy_heavy','enemy_boss','enemy_follower','enemy_hitter','enemy_spawner'];

function updateIntroAnimation(now) {
  // Spawn intro enemies periodically
  if (now - lastIntroSpawn > 1200 && introEnemies.length < 18) {
    lastIntroSpawn = now;
    const variant = INTRO_VARIANTS[Math.floor(Math.random() * INTRO_VARIANTS.length)];
    const [ew, eh] = ENEMY_SIZE[variant] ?? [12,12];
    const col = ENEMY_COLOR[variant] ?? 0x888888;
    const side = Math.floor(Math.random()*4);
    const sw = W(), sh = H();
    let sx, sy, vx, vy;
    if (side === 0) { sx=Math.random()*sw; sy=-30; vx=(Math.random()-.5)*2; vy=1+Math.random()*1.5; }
    else if (side===1) { sx=sw+30; sy=Math.random()*sh; vx=-(1+Math.random()*1.5); vy=(Math.random()-.5)*2; }
    else if (side===2) { sx=Math.random()*sw; sy=sh+30; vx=(Math.random()-.5)*2; vy=-(1+Math.random()*1.5); }
    else { sx=-30; sy=Math.random()*sh; vx=1+Math.random()*1.5; vy=(Math.random()-.5)*2; }

    const g = new PIXI.Graphics();
    // Draw simple enemy shape
    g.beginFill(col, 0.75);
    if (variant === 'enemy_follower') {
      g.drawPolygon([ew/2,0, ew,eh/2, ew/2,eh, 0,eh/2]);
    } else {
      g.drawRect(0,0,ew,eh);
    }
    g.endFill();
    g.pivot.x = ew/2; g.pivot.y = eh/2;
    g.x = sx; g.y = sy;
    worldContainer.addChild(g);
    introEnemies.push({ gfx:g, x:sx, y:sy, vx, vy, w:ew, h:eh, rot:Math.random()*0.04-.02 });
  }

  const sw = W(), sh = H();
  for (let i = introEnemies.length-1; i >= 0; i--) {
    const e = introEnemies[i];
    e.x += e.vx; e.y += e.vy;
    e.gfx.x = e.x; e.gfx.y = e.y;
    e.gfx.rotation += e.rot;
    // gentle wander
    e.vx += (Math.random()-.5)*0.05; e.vy += (Math.random()-.5)*0.05;
    e.vx = Math.max(-2.5, Math.min(2.5, e.vx));
    e.vy = Math.max(-2.5, Math.min(2.5, e.vy));
    // Remove if far out of bounds
    if (e.x < -120 || e.x > sw+120 || e.y < -120 || e.y > sh+120) {
      worldContainer.removeChild(e.gfx); e.gfx.destroy();
      introEnemies.splice(i, 1);
    }
  }
}

function clearIntroEnemies() {
  for (const e of introEnemies) { worldContainer.removeChild(e.gfx); e.gfx.destroy(); }
  introEnemies.length = 0;
}

// ================================================================
// GAME LOOP
// ================================================================
let prevTime = null;
app.ticker.add(() => {
  const now = performance.now();
  if (prevTime===null) { prevTime=now; return; }
  const dt = Math.min((now-prevTime)/16.6667, 3);
  prevTime = now;

  if (!gameStarted) {
    updateIntroAnimation(now);
    return;
  }
  if (currentPhase===0 && !gameOver) startPhase(1, now);

  phaseUpdate(now);
  phase7Update(now);
  phase7RepeatCheck(now);
  if (!gameOver && !paused) {
    enemyAI(now);
    emitAllEnemyFx(now);
    // Update aim direction relative to current player position (mobile)
    if (aimVector.active && player && player.alive) {
      mouse.x = player.x + aimVector.x * 400;
      mouse.y = player.y + aimVector.y * 400;
    }
    inputUpdate(now);
    updateBulletFade();
    physicsStep(dt, now);
    updateSerpents(now);
    purge();
    syncGraphics();
    updateCamera();
    updateEnergyBars(now);
    updateFragments(dt);
    updateEnemyParticles(dt);
    updateBirthEffects();
    updateMissiles(dt, now);
    updateMissileExhaust(dt);
    updateMissileAuto(now);
    updatePowerups(now);
    updateLockReticles(now);
    updatePulses();
    updateImpulseFlashes();
    spawnExhaust(now);
    updateExhaust(dt);
    drawWarpGrid();
    updateAutoBeam(now);
    drawShield(now);
    drawAimLine();
    drawPlayerBars(now);
    if (player && !player.alive && !gameOver) {
      gameOver = true;
      // Remove player sprite immediately
      if (player.gfx) { worldContainer.removeChild(player.gfx); player.gfx.destroy(); player.gfx = null; }
      const lastRun = recordRun(score, performance.now() - sessionStartTime);
      // Show big death explosion for 5s, then overlay
      showDeathExplosion(player.x - cam.x, player.y - cam.y, () => showOverlay(true, lastRun));
    }
  }
  hudUpdate(now);
});

window.addEventListener("resize", () => { app.renderer.resize(window.innerWidth, window.innerHeight); });

function showDeathExplosion(px, py, callback) {
  const canvas = document.getElementById('deathExplosion');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';

  const particles = [];
  const TOTAL_TIME = 5000;
  let elapsed = 0;
  let last = performance.now();

  // Generate lots of explosion particles
  for (let i = 0; i < 300; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 14;
    const r = Math.random();
    const color = r < 0.33 ? `hsl(${10+Math.random()*20},100%,${50+Math.random()*30}%)` :
                  r < 0.66 ? `hsl(${30+Math.random()*20},100%,${60+Math.random()*20}%)` :
                              `hsl(${0},0%,${80+Math.random()*20}%)`;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      size: 3 + Math.random() * 18,
      life: 0.4 + Math.random() * 0.6,
      maxLife: 0.4 + Math.random() * 0.6,
      color, gravity: 0.05 + Math.random()*0.1,
    });
  }

  function render(now) {
    const dt = (now - last) / 1000;
    last = now;
    elapsed += dt;
    const progress = Math.min(elapsed / (TOTAL_TIME/1000), 1);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Shockwave ring
    const swR = progress * Math.max(canvas.width, canvas.height) * 0.9;
    const swAlpha = Math.max(0, 0.6 - progress * 0.65);
    ctx.save();
    ctx.strokeStyle = `rgba(255,180,50,${swAlpha})`;
    ctx.lineWidth = 8 * (1 - progress);
    ctx.beginPath();
    ctx.arc(px, py, swR, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();

    // Second wave
    if (progress > 0.1) {
      const sw2 = (progress - 0.1) * Math.max(canvas.width, canvas.height) * 0.7;
      const sw2A = Math.max(0, 0.4 - (progress-0.1) * 0.5);
      ctx.save();
      ctx.strokeStyle = `rgba(255,100,30,${sw2A})`;
      ctx.lineWidth = 5 * Math.max(0, 1 - (progress-0.1)*2);
      ctx.beginPath();
      ctx.arc(px, py, sw2, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // Central glow
    const glowAlpha = Math.max(0, 0.9 - progress * 0.9);
    const glowR = 80 + progress * 300;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, glowR);
    grad.addColorStop(0, `rgba(255,220,100,${glowAlpha})`);
    grad.addColorStop(0.3, `rgba(255,80,20,${glowAlpha*0.7})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, glowR, 0, Math.PI*2);
    ctx.fill();

    // Draw particles
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) continue;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.97; p.vy *= 0.97;
      const t = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = t * t;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.5 + t*0.5), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    if (elapsed < TOTAL_TIME/1000) {
      requestAnimationFrame(render);
    } else {
      canvas.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      callback();
    }
  }
  requestAnimationFrame(render);
}

function startGame() {
  // Kill all existing pool entities and their gfx
  for (const e of pool) {
    if (e.gfx)     { worldContainer.removeChild(e.gfx);     e.gfx.destroy();     e.gfx = null; }
    if (e._ringGfx){ worldContainer.removeChild(e._ringGfx); e._ringGfx.destroy(); e._ringGfx = null; }
  }
  for (const s of serpents) {
    worldContainer.removeChild(s.lineGfx); s.lineGfx.destroy();
    for (const seg of s.segs) {
      if (seg.entity.gfx) { worldContainer.removeChild(seg.entity.gfx); seg.entity.gfx.destroy(); }
    }
  }
  serpents.length = 0;
  pool.length = 0;
  // Reset state
  clearIntroEnemies();
  score = 0;
  displayedScore = 0;
  targetScore = 0;
  if (scoreAnimInterval) { clearInterval(scoreAnimInterval); scoreAnimInterval = null; }
  document.getElementById('hScore').textContent = '0';
  currentPhase = 0;
  gameOver = false;
  paused = false;
  weaponSpread = 0;
  autoBeamOn = false;
  autoBeamTarget = null;
  autoBeamLastTick = 0;
  currentWeapon = "normal";
  prevTime = null;
  phase7Started = false;
  phase7Count   = 0;
  phase7NextSpawn = 0;
  shieldActive = false;
  shieldUsedMs = 0;
  clearPowerups();
  warpGridGfx.clear();
  sessionStartTime = performance.now();
  setup();  // re-creates player, walls, re-adds persistent gfx layers
  // Center camera on player
  if (_isTouchDevice && player) {
    cam.x = Math.max(0, Math.min(player.x - app.screen.width/2, WW() - app.screen.width));
    cam.y = Math.max(0, Math.min(player.y - app.screen.height/2, WH() - app.screen.height));
    worldContainer.x = -cam.x;
    worldContainer.y = -cam.y;
  }
  gameStarted = true;
  hideOverlay();
}

document.getElementById('overlay').addEventListener('click', () => {
  startGame();
});

(function initMobileControls() {
  if (!isMobileControlsActive) return;

  // Apply touch-action only to the PIXI canvas
  app.view.style.touchAction = 'none';

  const zoneLeft  = document.getElementById('zone-left');
  const zoneRight = document.getElementById('zone-right');
  zoneLeft.style.display  = 'block';
  zoneRight.style.display = 'block';

  // Adjust HUD for mobile — avoid overlaps with joystick zones
  const scoreHud = document.getElementById('scoreHud');
  if (scoreHud) {
    scoreHud.style.bottom = 'auto'; scoreHud.style.right = 'auto';
    scoreHud.style.top = '6px'; scoreHud.style.left = '50%';
    scoreHud.style.transform = 'translateX(-50%)';
    scoreHud.style.fontSize = '32px';
    scoreHud.style.textAlign = 'center';
  }
  const massHud = document.getElementById('massHud');
  if (massHud) {
    massHud.style.bottom = 'auto';
    massHud.style.top = '6px'; massHud.style.left = '10px';
    massHud.style.fontSize = '14px';
  }
  const phaseTimer = document.getElementById('phaseTimer');
  if (phaseTimer) { phaseTimer.style.fontSize = '40px'; phaseTimer.style.top = '4px'; }
  const phaseLabel = document.getElementById('phaseLabel');
  if (phaseLabel) { phaseLabel.style.top = '48px'; phaseLabel.style.fontSize = '11px'; }
  // Hide verbose weapon info on mobile (no keyboard)
  const hud = document.getElementById('hud');
  if (hud) hud.style.display = 'none';

  const clickHint = document.querySelector('#overlay .click-hint');
  if (clickHint) clickHint.textContent = 'TOCA para comenzar';

  // Prevent context menu / pinch-zoom / double-tap zoom
  document.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  let lastTapTime = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTapTime < 300) e.preventDefault();
    lastTapTime = now;
  }, { passive: false });

  // Load nipplejs dynamically to avoid blocking page render
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.min.js';
  script.onload = function() {
    createJoysticks();
  };
  script.onerror = function() {
    console.warn('nipplejs failed to load — touch controls unavailable');
  };
  document.head.appendChild(script);

  function createJoysticks() {
    // ---- LEFT JOYSTICK: MOVEMENT ----
    const joyLeft = nipplejs.create({
      zone: zoneLeft, mode: 'dynamic',
      position: { left: '50%', top: '50%' },
      color: 'rgba(0, 255, 200, 0.35)',
      size: 110, threshold: 0.05, fadeTime: 150,
      multitouch: true, maxNumberOfNipples: 1,
      dataOnly: false, restOpacity: 0.25,
    });

    let touchKeys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
    function clearTouchKeys() {
      for (const k in touchKeys) { if (touchKeys[k]) { keys[k] = false; touchKeys[k] = false; } }
    }

    joyLeft.on('move', function(evt, data) {
      if (!player || !player.alive || gameOver || paused) return;
      const vx = data.vector.x, vy = data.vector.y;
      const dz = 0.25;
      clearTouchKeys();
      if (vx > dz)  { keys.KeyD = true; touchKeys.KeyD = true; }
      if (vx < -dz) { keys.KeyA = true; touchKeys.KeyA = true; }
      if (vy > dz)  { keys.KeyW = true; touchKeys.KeyW = true; }
      if (vy < -dz) { keys.KeyS = true; touchKeys.KeyS = true; }
    });
    joyLeft.on('end', clearTouchKeys);

    // ---- RIGHT JOYSTICK: AIM + FIRE ----
    const joyRight = nipplejs.create({
      zone: zoneRight, mode: 'dynamic',
      position: { left: '50%', top: '50%' },
      color: 'rgba(255, 255, 100, 0.35)',
      size: 110, threshold: 0.05, fadeTime: 150,
      multitouch: true, maxNumberOfNipples: 1,
      dataOnly: false, restOpacity: 0.25,
    });

    joyRight.on('move', function(evt, data) {
      if (!player || !player.alive || gameOver || paused) return;
      aimVector.x = data.vector.x;
      aimVector.y = -data.vector.y; // flip for screen coords
      aimVector.active = true;
      mouse.down = true;
    });
    joyRight.on('end', function() {
      aimVector.active = false;
      mouse.down = false;
    });
  }
})();
</script>
